<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BY4048 Study Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Load data first -->
    <script src="data.js"></script>
    <!-- Load lecture notes (split out to keep app.jsx under 500KB) -->
    <script src="notes-data.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset('custom-preset', {
            presets: [[Babel.availablePresets['react'], { modules: false }]]
        });
    </script>
    <script type="text/babel" data-presets="custom-preset" src="app.jsx"></script>
</body>
</html>
