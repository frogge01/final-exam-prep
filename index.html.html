# Table of Contents

# Lecture 7: Post-Translational Modification of Proteins

## Complete Exam Study Notes

These notes explain protein synthesis and post-translational modifications in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture is of high exam priority, as it formed the basis of a 40-mark essay question in the 2019 exam. The material covers the complete journey from DNA to functional protein, including transcription, translation, ER translocation, and the crucial post-translational modifications, with special emphasis on N-linked glycosylation and the quality control mechanisms that ensure proper protein folding.

# 1. Protein Synthesis Overview: From DNA to Protein

This section covers the entire journey from gene to functional protein, which is exactly what the 2019 exam question asked students to explain. Understanding this complete pathway is essential for appreciating how proteins are made, modified, and quality-controlled before they perform their cellular functions.

## 1.1 Transcription in the Nucleus

The first step in protein synthesis is transcription, the process by which DNA is converted to messenger RNA. During initiation, RNA polymerase II binds to the promoter region of a gene. Transcription factors assemble at this site. The DNA double helix unwinds, and the template strand is exposed.

During elongation, RNA polymerase reads the DNA template strand in the 3' to 5' direction while synthesizing mRNA in the 5' to 3' direction. It adds complementary RNA nucleotides. In RNA, uracil pairs with adenine instead of thymine.

Termination occurs when RNA polymerase reaches a termination sequence. The newly synthesized mRNA is released, and RNA polymerase dissociates from the DNA.

## 1.2 mRNA Processing in the Nucleus

The initial RNA transcript, called pre-mRNA, must be processed before it can be exported from the nucleus. Three major modifications occur.

First, 5' capping occurs. A 7-methylguanosine cap is added to the 5' end of the pre-mRNA. This cap protects the mRNA from degradation, is required for translation initiation, and helps the ribosome recognize the mRNA.

Second, 3' polyadenylation occurs. A poly-A tail consisting of approximately 200 adenine nucleotides is added to the 3' end. This tail protects the mRNA from degradation, aids in export from the nucleus, and enhances translation efficiency.

Third, splicing removes introns, which are non-coding sequences, and joins together exons, which are the coding sequences. The spliceosome, a large molecular machine, performs this splicing. Alternative splicing allows the same gene to produce different proteins by including or excluding different exons. This creates protein diversity and allows tissue-specific isoforms to be produced from a single gene.

## 1.3 Nuclear Export

Once processing is complete, the mature mRNA is exported from the nucleus through nuclear pore complexes. This requires export factors that recognize the mRNA and facilitate its passage. Once in the cytoplasm, the mRNA is ready for translation.

## 1.4 Translation in the Cytoplasm or ER

Translation is the process by which mRNA is decoded to produce a protein. There are two main pathways for translation, depending on the protein's destination.

Cytosolic proteins are translated on free ribosomes in the cytoplasm. These proteins either remain in the cytoplasm or are imported into the nucleus, mitochondria, or peroxisomes through post-translational import, which occurs after synthesis is complete.

Secretory and membrane proteins follow a different pathway. These proteins have an N-terminal signal sequence. They are translated on ER-bound ribosomes through a process called co-translational translocation, meaning translocation occurs during synthesis. These proteins enter the secretory pathway. This lecture focuses primarily on this second pathway because it involves extensive post-translational modifications.

# 2. ER Translocation Mechanisms

For proteins destined for the secretory pathway, a critical question is how they enter the endoplasmic reticulum. Two main mechanisms exist: co-translational translocation and post-translational translocation.

## 2.1 Co-Translational Translocation

Co-translational translocation is the main pathway for proteins with an N-terminal signal sequence. The process unfolds in several coordinated steps.

First, the ribosome begins translation on a free ribosome in the cytoplasm. The first approximately 20 to 30 amino acids form the signal sequence, which consists of hydrophobic amino acids. As translation proceeds, this signal sequence emerges from the ribosome.

Second, the signal recognition particle, abbreviated SRP, recognizes and binds to the signal sequence. SRP is a protein-RNA complex. When SRP binds, it temporarily pauses translation. This prevents the protein from being fully synthesized in the cytoplasm, where it might misfold.

Third, the SRP-ribosome complex diffuses through the cytoplasm to the ER membrane. There, SRP binds to the SRP receptor on the ER membrane. This delivers the ribosome to the translocon.

Fourth, the ribosome docks onto the translocon, which is also called the Sec61 channel. SRP and the SRP receptor dissociate following GTP hydrolysis. SRP is recycled for another round of targeting. Translation resumes.

Fifth, as translation continues, the growing polypeptide chain threads through the translocon channel and enters the ER lumen. An enzyme called signal peptidase cleaves and removes the signal sequence, which is then degraded.

Sixth, translation completes. The protein is released into the ER lumen or, in the case of transmembrane proteins, remains anchored in the membrane. The ribosome dissociates and is recycled.

## 2.2 Post-Translational Translocation

An alternative pathway exists for some proteins. In post-translational translocation, the protein is fully synthesized on free ribosomes in the cytoplasm before being transported to the ER.

To prevent premature folding, the newly synthesized protein is kept unfolded by cytosolic chaperones, particularly HSP70 and HSP40, which are heat shock proteins. The signal sequence is recognized by the Sec62/63 complex, which is associated with the translocon. The protein is then threaded through the translocon after synthesis is complete. BiP, which is the ER homolog of HSP70, pulls the protein through from the ER lumen side, providing the driving force for translocation.

## 2.3 Membrane Protein Insertion

Transmembrane proteins have special hydrophobic transmembrane domains, abbreviated TMDs. These domains exit laterally from the translocon directly into the lipid bilayer. The hydrophobic residues interact favorably with membrane lipids. Stop-transfer sequences halt translocation, ensuring that the protein spans the membrane. The resulting topology can have the N-terminus in either the lumen or the cytoplasm, depending on the orientation of the signal sequence. Proteins with multiple TMDs can have complex topologies.

# 3. Post-Translational Modifications

After translation, proteins undergo various modifications that alter their properties, localization, and function. These modifications are collectively called post-translational modifications, or PTMs.

## 3.1 Types of Post-Translational Modifications

Glycosylation is the addition of carbohydrate or sugar groups to proteins. This is the most important modification for this lecture. N-linked glycosylation involves attachment to asparagine residues, while O-linked glycosylation involves attachment to serine or threonine residues. These will be covered in detail in the following sections.

Phosphorylation is the addition of a phosphate group to serine, threonine, or tyrosine residues. This modification is reversible. Kinases add phosphate groups, while phosphatases remove them. Phosphorylation is a major regulatory mechanism in cell signaling.

Methylation is the addition of a methyl group to lysine or arginine residues. This is particularly important for histones, as discussed in Lecture 4. Methylation regulates protein-protein interactions.

Acetylation is the addition of an acetyl group to lysine residues. This neutralizes the positive charge on lysine and is important in histone regulation.

Ubiquitination is the addition of ubiquitin, a 76 amino acid protein, to target proteins. This can tag proteins for degradation by the proteasome or can alter their function or localization. Mono-ubiquitination and poly-ubiquitination have different effects.

Sumoylation is the addition of SUMO protein, which stands for small ubiquitin-like modifier. This regulates nuclear transport and transcription.

Lipidation is the addition of lipid groups. Types include palmitoylation, which adds palmitic acid; myristoylation, which adds myristic acid; and farnesylation, which adds a farnesyl group, as seen with lamin A in Lecture 4. Lipidation anchors proteins to membranes.

Hydroxylation is the addition of a hydroxyl group. This is common in collagen, where proline and lysine residues are hydroxylated. This modification requires vitamin C.

Disulfide bond formation creates covalent bonds between two cysteine residues, forming S-S bridges. This stabilizes protein structure and occurs in the ER, which provides an oxidizing environment.

Proteolytic cleavage involves cutting peptide bonds to remove signal sequences or pro-peptides. This can activate or inactivate proteins. Examples include insulin maturation and caspase activation.

# 4. N-Linked Glycosylation

N-linked glycosylation is the major post-translational modification in the secretory pathway. It is critical for protein folding, quality control, and function. Understanding this pathway in detail is essential for exam success.

## 4.1 What Is N-Linked Glycosylation?

N-linked glycosylation is the addition of an oligosaccharide, or sugar chain, to the nitrogen atom of asparagine residues. The N refers to nitrogen, hence N-linked. This modification occurs in both the endoplasmic reticulum and the Golgi apparatus.

The consensus sequence for N-linked glycosylation is N-X-S/T, where N is asparagine, X is any amino acid except proline, and S/T is either serine or threonine. However, not all N-X-S/T sites are actually glycosylated in practice. Whether a site is glycosylated depends on the local protein structure and accessibility.

## 4.2 The N-Linked Glycosylation Pathway

The first step is synthesis of the dolichol precursor. This occurs on the cytoplasmic face of the ER membrane. Dolichol is a long-chain lipid embedded in the ER membrane. Sugars are added sequentially to dolichol-phosphate. Two N-acetylglucosamine molecules, abbreviated GlcNAc, are added first. Then nine mannose molecules, abbreviated Man, are added. Finally, three glucose molecules, abbreviated Glc, are added. This creates the oligosaccharide Glc3Man9GlcNAc2, which contains fourteen sugar residues. This precursor is then flipped from the cytoplasmic face to the ER lumen.

The second step is en bloc transfer. The entire 14-sugar oligosaccharide is transferred to the protein in one step. The enzyme responsible is oligosaccharyltransferase, abbreviated OST. This is a large multi-subunit complex embedded in the ER membrane. OST recognizes the N-X-S/T consensus sequence on the nascent polypeptide. It transfers the oligosaccharide from dolichol to the asparagine residue. This process is called en bloc transfer because the entire sugar chain is transferred as a unit. Importantly, this occurs co-translationally, meaning while the protein is still being synthesized and entering the ER.

The third step is glucose trimming in the ER. The three glucose residues are removed sequentially. Glucosidase I removes the first glucose, creating Glc2Man9GlcNAc2. Glucosidase II removes the second glucose, creating Glc1Man9GlcNAc2. This structure is important because it creates a binding site for calnexin and calreticulin, which are ER chaperones.

The fourth step is the quality control cycle. The Glc1Man9GlcNAc2 structure binds to calnexin or calreticulin. These are ER chaperone proteins that assist in protein folding. Glucosidase II then removes the third and final glucose, creating Man9GlcNAc2. This causes the protein to be released from the chaperones.

At this point, the cell checks whether the protein is properly folded. If the protein is properly folded, it exits the ER and continues to the Golgi. However, if the protein is not properly folded, an enzyme called UGGT, which stands for UDP-glucose:glycoprotein glucosyltransferase, re-adds one glucose. This recreates the Glc1Man9GlcNAc2 structure. The protein rebinds to calnexin or calreticulin and gets another chance to fold correctly. This cycle repeats until the protein is either properly folded or is marked for degradation.

The fifth step involves mannose trimming. In the ER, mannosidase I removes one mannose, creating Man8GlcNAc2. Further trimming occurs in the Golgi.

The sixth step is processing in the Golgi. More mannose residues are removed. New sugars are added, including additional GlcNAc, galactose, and sialic acid, which is often the terminal sugar. This creates complex N-glycans. The final structure varies depending on the specific protein and cell type.

## 4.3 Types of N-Glycans

High-mannose type glycans retain many mannose residues and undergo minimal processing in the Golgi. Complex type glycans are extensively processed with multiple different sugars arranged in branched structures, often terminated with sialic acid. Hybrid type glycans are intermediate, with one branch remaining high-mannose while another branch is fully processed to a complex structure.

## 4.4 Functions of N-Glycosylation

N-glycosylation serves multiple important functions. It assists in protein folding through the chaperone system involving calnexin and calreticulin. It provides quality control, as sensors can detect misfolding through the glycan structure. Glycosylation increases protein stability by protecting proteins from proteases. It enhances solubility by adding hydrophilic sugar groups. Glycans on the cell surface mediate cell-cell recognition through binding to lectins. They are important for immune function, as antibodies themselves are glycoproteins. Finally, glycans can serve as trafficking signals for protein sorting and localization.

# 5. O-Linked Glycosylation

O-linked glycosylation involves attachment of sugars to the oxygen atom of serine or threonine residues. Unlike N-linked glycosylation, there is no strict consensus sequence. O-glycosylation occurs in the Golgi apparatus rather than the ER. Sugars are added one at a time rather than en bloc. Common O-linked sugars include N-acetylgalactosamine, which is often the first sugar added, followed by galactose and sialic acid. O-glycosylation is particularly abundant in mucins, the glycoproteins that form mucus.

# 6. ER Quality Control and Protein Folding

The endoplasmic reticulum has sophisticated quality control mechanisms to ensure that only properly folded proteins are exported. Several molecular chaperones assist in this process.

BiP, which stands for binding immunoglobulin protein, is the ER homolog of HSP70. It binds to hydrophobic patches on unfolded proteins, preventing aggregation and assisting folding. Calnexin and calreticulin, as discussed in the glycosylation section, bind to monoglucosylated glycans and assist folding. Protein disulfide isomerase, abbreviated PDI, catalyzes formation and rearrangement of disulfide bonds.

If proteins fail to fold properly despite multiple attempts, they are targeted for ER-associated degradation, or ERAD. Misfolded proteins are retrotranslocated back to the cytoplasm, ubiquitinated, and degraded by the proteasome.

# 7. Vesicle Transport Systems

Proteins move between organelles in the secretory pathway via membrane-bound vesicles. Three main types of coat proteins define the major vesicle transport routes.

COPII vesicles transport cargo from the ER to the Golgi in the anterograde or forward direction. This is the export pathway from the ER.

COPI vesicles transport cargo from the Golgi back to the ER in the retrograde or return direction. This retrieves ER resident proteins that have escaped to the Golgi.

Clathrin-coated vesicles are the most versatile, mediating transport from the Golgi to endosomes and from the plasma membrane to endosomes.

An important exam tip: know the directions. COPII moves forward from ER to Golgi. COPI returns from Golgi to ER. Clathrin goes to endosomes.

# 8. COPII Vesicles: ER to Golgi

COPII vesicles mediate the critical step of exporting proteins from the ER to the Golgi. The process begins when Sar1, a small GTPase, is activated by its GEF, which is Sec12 on the ER membrane. Sar1-GTP inserts into the ER membrane and recruits the Sec23/24 complex. Sec24 acts as the cargo receptor, recognizing and binding cargo proteins. The Sec13/31 complex then assembles, forming the outer coat and inducing membrane curvature. The vesicle buds from the ER. After budding, the coat disassembles through GTP hydrolysis. The vesicle can then fuse with the Golgi membrane, delivering its cargo.

# 9. COPI Vesicles: Retrograde Transport

COPI vesicles retrieve ER resident proteins that have escaped to the Golgi and return them to the ER. ER resident proteins typically have a C-terminal KDEL sequence, which stands for Lys-Asp-Glu-Leu. This sequence is recognized by KDEL receptors in the Golgi. The process begins with activation of Arf1, another small GTPase. Arf1-GTP recruits the coatomer complex, which is the COPI coat. This coat assembles, cargo is selected based on KDEL signals or other retrieval signals, and vesicles bud from the Golgi. These vesicles then transport cargo back to the ER.

# 10. Clathrin-Coated Vesicles

Clathrin-coated vesicles mediate multiple transport routes, including from the trans-Golgi network to endosomes and from the plasma membrane to endosomes during endocytosis. Clathrin forms a distinctive cage-like lattice structure composed of triskelions, which are three-legged structures. Adaptor proteins such as AP-1 at the Golgi and AP-2 at the plasma membrane link clathrin to cargo receptors and to the membrane. These vesicles are involved in receptor-mediated endocytosis, where specific receptors bind cargo and are internalized. After budding, the clathrin coat is rapidly removed by uncoating factors, allowing the vesicle to fuse with endosomes.

# 11. The Secretory Pathway

The complete secretory pathway integrates all these components. A protein with a signal sequence is synthesized and translocated into the ER co-translationally. In the ER, it undergoes N-linked glycosylation, folding assisted by chaperones, disulfide bond formation, and quality control. Properly folded proteins are packaged into COPII vesicles and transported to the Golgi. In the Golgi, glycans are processed and modified, O-linked glycosylation may occur, and proteins are sorted to their final destinations. Some proteins are packaged into secretory vesicles and transported to the plasma membrane, where they are released by exocytosis. Others are sent to lysosomes or remain as resident Golgi proteins.

# 12. Prion Proteins and Disease

Prions represent a unique class of infectious agents. The word prion stands for proteinaceous infectious particles. Remarkably, prions are protein-only pathogens with no nucleic acid component.

## 12.1 Normal Prion Protein

The normal cellular prion protein is designated PrPc, where the superscript c stands for cellular. It is anchored to the plasma membrane through a GPI anchor. It is N-glycosylated at two sites. Its normal function is unclear, though it may play a role in neuroprotection. Structurally, normal PrPc is rich in alpha-helices.

## 12.2 Disease Prion Protein

The disease form is designated PrPsc, where the superscript sc stands for scrapie, a prion disease of sheep. The remarkable and frightening property of PrPsc is that it has the same amino acid sequence as normal PrPc but adopts a different three-dimensional fold. Instead of being alpha-helix rich, PrPsc is rich in beta-sheets. This misfolded form is prone to aggregation and is resistant to protease digestion.

## 12.3 Prion Propagation

The catastrophic property of prions is that PrPsc acts as a template. When PrPsc encounters normal PrPc, it induces PrPc to misfold into the PrPsc conformation. This is an autocatalytic process, meaning it is self-propagating. Once started, PrPsc molecules convert more PrPc molecules, which in turn convert even more.

The misfolded PrPsc aggregates into amyloid fibrils. These aggregates spread from cell to cell and from neuron to neuron. Because the amino acid sequence is identical to normal PrPc, the immune system does not recognize PrPsc as foreign and mounts no immune response. The accumulation of prion aggregates kills neurons, leading to spongiform degeneration, where the brain develops a sponge-like appearance with numerous holes.

## 12.4 Glycosylation in Prions

Prion protein has two N-glycosylation sites. Depending on which sites are glycosylated, the protein can be unglycosylated, monoglycosylated at one site, or diglycosylated at both sites. These are called glycoforms. The ratio of these glycoforms differs between different prion strains. This glycoform signature helps identify the specific prion strain. Glycosylation patterns may also affect the infectivity of prions and their targeting to specific brain regions.

## 12.5 Prion Diseases

Several prion diseases affect humans and animals. In humans, Creutzfeldt-Jakob disease, abbreviated CJD, is the most common. Variant CJD, or vCJD, results from consumption of beef infected with bovine spongiform encephalopathy, commonly known as mad cow disease. Kuru was a prion disease spread through ritualistic cannibalism in Papua New Guinea. Fatal familial insomnia is an inherited prion disease. In animals, mad cow disease or BSE affects cattle, and scrapie affects sheep. All prion diseases are fatal neurodegenerative diseases with no effective treatment.

# 13. Summary: Must-Know Facts

The protein synthesis pathway proceeds from DNA through transcription to pre-mRNA, which undergoes processing including addition of a 5' cap, 3' poly-A tail, and splicing. The mature mRNA is exported to the cytoplasm where translation occurs.

For ER translocation, the co-translational pathway involves SRP recognizing the signal sequence, targeting the ribosome to the ER, docking at the translocon, and signal peptidase cleavage. The post-translational pathway involves full synthesis, maintenance in an unfolded state by HSP70 and HSP40, recognition by Sec62/63, and BiP pulling the protein through the translocon.

N-linked glycosylation occurs at the N-X-S/T consensus sequence. The Glc3Man9GlcNAc2 precursor is assembled on dolichol. OST transfers the oligosaccharide en bloc to asparagine. Glucose trimming creates the binding site for calnexin and calreticulin. The UGGT quality control cycle ensures proper folding. Golgi processing creates complex glycans.

For vesicle transport, COPII vesicles move from ER to Golgi in the anterograde direction. COPI vesicles move from Golgi to ER in the retrograde direction, retrieving proteins with KDEL sequences. Clathrin-coated vesicles transport from Golgi to endosomes and from plasma membrane to endosomes.

Prions are unique in that PrPc is the normal cellular form with an alpha-helix-rich structure, while PrPsc is the disease form with the same sequence but a beta-sheet-rich structure. PrPsc acts as a template, converting PrPc in an autocatalytic manner. Glycoform ratios serve as strain signatures. All prion diseases are fatal neurodegenerative disorders.

# 14. Exam-Style Questions You Might See

## Question 1: Describe the complete pathway of protein synthesis from DNA in the nucleus to a secreted protein.

This was the 2019 40-mark essay question. A complete answer should cover: transcription of DNA to pre-mRNA in the nucleus; processing including 5' cap addition, 3' polyadenylation, and splicing to create mature mRNA; export through nuclear pore complexes; translation beginning on free ribosomes with signal sequence emergence; SRP binding and pausing of translation; targeting to the ER and SRP receptor binding; docking at the translocon; resumption of translation with polypeptide entering the ER; signal peptidase cleavage; N-glycosylation by OST; folding with assistance from BiP, calnexin, and calreticulin; UGGT quality control cycle; transport in COPII vesicles to the Golgi; Golgi processing including further glycosylation and modifications; packaging into secretory vesicles; transport to the plasma membrane; and exocytosis to release the protein.

## Question 2: Explain the N-linked glycosylation pathway and its role in quality control.

The dolichol precursor Glc3Man9GlcNAc2 is synthesized on the ER membrane. OST transfers this oligosaccharide en bloc to N-X-S/T consensus sequences on nascent proteins. Glucosidases remove glucose residues sequentially. When Glc1Man9GlcNAc2 is created, it binds to calnexin or calreticulin, which are ER chaperones. The final glucose is then removed, releasing the protein. If the protein is misfolded, UGGT re-adds one glucose, recreating the calnexin/calreticulin binding site and giving the protein another chance to fold. Properly folded proteins exit the ER. Chronically misfolded proteins are targeted for ERAD degradation.

## Question 3: Compare COPII and COPI vesicles.

COPII vesicles transport from ER to Golgi in the anterograde or forward direction. They export proteins from the ER. Cargo receptors recognize and bind ER export signals. The GTPase Sar1 initiates coat assembly. COPI vesicles transport from Golgi to ER in the retrograde or return direction. They retrieve ER resident proteins that have escaped to the Golgi. They recognize the KDEL sequence that marks ER residents. The GTPase Arf1 initiates coat assembly. Both systems involve coat assembly, cargo selection, budding, and uncoating after fusion.

## Question 4: What makes prion diseases unique and how do they propagate?

Prion diseases are unique because they are caused by a protein-only pathogen with no nucleic acid. PrPc is the normal cellular form with an alpha-helix-rich structure. PrPsc is the disease form with the same amino acid sequence but a beta-sheet-rich structure. PrPsc acts as a template that converts PrPc to the misfolded PrPsc conformation through induced misfolding. This is an autocatalytic and self-propagating process. Aggregates spread from cell to cell. Because the amino acid sequence is identical to normal protein, there is no immune response. The accumulation kills neurons. Glycoform ratios, meaning the distribution of un-, mono-, and di-glycosylated forms, differ between prion strains and serve as strain signatures.

# Final Exam Focus

This lecture formed the basis of a 40-mark essay question in 2019, making it extremely high priority. Focus on being able to describe the complete pathway from DNA to secreted protein, including all steps of transcription, mRNA processing, translation, ER translocation via the SRP pathway, N-linked glycosylation with the complete quality control cycle involving calnexin, calreticulin, and UGGT, vesicle transport with clear understanding of COPII going forward and COPI going backward, and prion propagation mechanisms. Practice writing out the complete pathway from memory, as this demonstrates comprehensive understanding of cellular protein processing.`,

# Table of Contents

# Lecture 8: ER Stress in Pathologies

## Complete Exam Study Notes

These notes explain ER stress and the unfolded protein response in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers the critical topic of endoplasmic reticulum stress, focusing on how cells detect and respond to accumulation of misfolded proteins through the unfolded protein response, with special emphasis on the master regulator GRP78/BiP and the three signaling branches of the UPR. Understanding these mechanisms is essential because ER stress contributes to many human diseases including Alzheimer's disease, Parkinson's disease, and diabetes.

# 1. ER Functions and Homeostasis

The endoplasmic reticulum is critical for protein synthesis and quality control in eukaryotic cells. Understanding the normal functions of the ER is essential for appreciating what happens when these functions become disrupted.

## 1.1 ER Functions

The ER serves as the site of synthesis for secretory and membrane proteins. Approximately thirty percent of all cellular proteins are made in the ER. As discussed in Lecture 7, these proteins are translocated into the ER through the Sec61 translocon.

Protein folding is a major ER function. Several chaperone proteins assist in this process. BiP, also called GRP78, is the major ER chaperone and is absolutely central to this lecture. Calnexin and calreticulin assist glycoprotein folding. Protein disulfide isomerase, abbreviated PDI, catalyzes disulfide bond formation. GRP94 is another important chaperone. The ER provides an oxidizing environment that favors disulfide bond formation, which is critical for stabilizing many proteins.

Post-translational modifications occur in the ER. N-linked glycosylation, as covered in Lecture 7, is performed here. Disulfide bonds are formed. Specific proteolytic cleavages activate or process certain proteins.

Quality control ensures that only properly folded proteins leave the ER and proceed to the Golgi. The ER retains or degrades misfolded proteins. The ERAD pathway, which stands for ER-associated degradation, handles proteins that cannot be properly folded.

Calcium storage is another critical ER function. The ER is the major calcium reservoir in the cell. The calcium concentration in the ER lumen is approximately 0.1 to 1 millimolar, while the cytoplasmic calcium concentration is only about 100 nanomolar. This creates a ten-thousand-fold concentration gradient. This calcium gradient is critical for cell signaling.

Finally, the ER is the site of lipid synthesis. Phospholipids, cholesterol, and ceramide are all synthesized in the ER.

# 2. What Is ER Stress?

ER stress occurs when the protein folding capacity of the ER is overwhelmed, leading to accumulation of misfolded proteins in the ER lumen. This is a state of cellular dysfunction that must be resolved or it will lead to cell death.

## 2.1 Causes of ER Stress

Several conditions can cause ER stress. An increased protein load occurs when there is a high rate of protein synthesis or overproduction of secretory proteins. Viral infection can hijack the ER machinery for viral protein production, overwhelming its capacity.

Impaired protein folding can result from mutations that produce inherently misfolded proteins, reduced chaperone activity, or oxidative stress that damages proteins.

Disrupted calcium homeostasis is a particularly important cause. ER calcium depletion impairs protein folding because calcium is required for proper chaperone function. Loss of calcium from the ER directly impairs the folding machinery.

An altered redox state disrupts the balance between reducing and oxidizing conditions. This impairs disulfide bond formation, which is essential for proper protein structure.

Altered lipid composition in the ER membrane can affect ER structure and function. Nutrient deprivation, including glucose deprivation or amino acid starvation, impairs both protein synthesis and glycosylation.

Various toxins and drugs can induce ER stress. Tunicamycin blocks N-glycosylation. Brefeldin A disrupts ER-to-Golgi transport. Thapsigargin depletes ER calcium stores. Parkinsonian toxins including 6-OHDA, MPP+, and rotenone all cause ER stress.

## 2.2 Consequences of ER Stress

When ER stress occurs, unfolded and misfolded proteins accumulate in the ER lumen. This accumulation activates the unfolded protein response, abbreviated UPR. If the ER stress cannot be resolved, the result is cell death.

# 3. GRP78/BiP: The Master Regulator

GRP78, also called BiP, is the key sensor and regulator of ER stress. It is absolutely central to this lecture and to understanding how cells detect and respond to ER stress.

## 3.1 Names and Function

This protein has several names. GRP78 stands for glucose-regulated protein 78 kilodaltons. BiP stands for binding immunoglobulin protein. The gene name is HSPA5, which stands for heat shock protein A5. All these names refer to the same protein.

GRP78 is the major ER chaperone and is a member of the HSP70 family of heat shock proteins. It binds to hydrophobic regions of unfolded proteins, preventing aggregation and assisting proper folding. It functions through an ATP-dependent cycle, binding to unfolded proteins, hydrolyzing ATP, and then releasing the protein.

## 3.2 GRP78 as the UPR Sensor

Under normal conditions when there is no ER stress, GRP78 binds to three ER transmembrane proteins: PERK, IRE1, and ATF6. By binding to these proteins, GRP78 keeps them inactive. It acts like a brake on the stress response.

During ER stress, misfolded proteins accumulate in the ER lumen. GRP78 preferentially binds to these misfolded proteins because they expose more hydrophobic regions than properly folded proteins. As GRP78 binds to misfolded proteins, it releases from PERK, IRE1, and ATF6. Once released, these three proteins become active and initiate the unfolded protein response.

This is a critical concept: GRP78 release from PERK, IRE1, and ATF6 is the trigger that activates the UPR. This represents the cell's detection system for misfolded protein accumulation.

## 3.3 GRP78 Upregulation

GRP78 itself is upregulated during the UPR. This provides more chaperone capacity to help resolve ER stress. Elevated GRP78 levels serve as a marker of ER stress. When researchers detect high GRP78 expression, it indicates that ER stress is present.

## 3.4 Protective Effects

Overexpression of GRP78 has protective effects. It protects against ischemia in stroke models. It protects astrocytes from glucose deprivation. It reduces cell death. It dampens pro-stress signaling, including reduced ATF4 expression. These findings suggest that GRP78 has therapeutic potential.

# 4. The Unfolded Protein Response

The unfolded protein response is a coordinated signaling pathway activated to restore ER homeostasis when misfolded proteins accumulate.

## 4.1 Three Branches of the UPR

The UPR has three distinct branches, each controlled by one of the three transmembrane sensors.

The PERK pathway is named for PERK, which stands for PKR-like ER kinase. The main function of this pathway is to reduce protein synthesis, preventing more proteins from entering the already overwhelmed ER.

The IRE1 pathway is named for IRE1, which stands for inositol-requiring enzyme 1. The main function of this pathway is to increase chaperone production. This is the most evolutionarily conserved UPR branch, found from yeast to humans.

The ATF6 pathway is named for ATF6, which stands for activating transcription factor 6. The main function is to increase ER capacity. ATF6 is itself a transcription factor that activates genes.

## 4.2 Goals of the UPR

The UPR has both adaptive, protective responses and maladaptive, death-promoting responses.

Adaptive responses aim to resolve ER stress. These include reducing protein load by decreasing translation, increasing folding capacity by upregulating chaperones, increasing degradation by upregulating ERAD components, and expanding the ER by increasing membrane synthesis. If these adaptive responses work, ER stress is resolved and the cell survives.

However, if ER stress is chronic or severe and cannot be resolved, the UPR switches to maladaptive responses that promote cell death. The key event is activation of CHOP, a pro-apoptotic transcription factor. This leads to caspase activation and apoptosis. If ER stress is unresolvable, the cell undergoes programmed cell death.

# 5. PERK Pathway: Translational Attenuation

The PERK pathway reduces protein synthesis to give the ER a break from incoming protein load.

## 5.1 Mechanism

When GRP78 releases from PERK, PERK oligomerizes, meaning multiple PERK molecules come together. The PERK molecules then autophosphorylate, activating themselves. Active PERK phosphorylates eIF2alpha, which stands for eukaryotic initiation factor 2 alpha. Phosphorylated eIF2alpha inhibits global translation. With less protein synthesis occurring, less protein load enters the ER.

## 5.2 Downstream Effects

The PERK pathway induces G1 cell cycle arrest, stopping cell division during stress. Paradoxically, while global translation is inhibited, translation of ATF4 actually increases. ATF4 is a transcription factor. ATF4 induces several important targets including CHOP, which is a pro-apoptotic transcription factor, genes involved in amino acid metabolism, and antioxidant genes.

CHOP is particularly important. It is a pro-apoptotic transcription factor. Elevated CHOP indicates a shift toward the cell death program. It serves as a marker of maladaptive UPR.

# 6. IRE1 Pathway: Increasing Chaperone Capacity

The IRE1 pathway is the most conserved UPR branch and focuses on increasing the cell's protein folding capacity.

## 6.1 Mechanism

When GRP78 releases from IRE1, IRE1 oligomerizes and autophosphorylates. This activates its endoribonuclease activity. Active IRE1 performs unconventional splicing of XBP1 mRNA. XBP1 stands for X-box binding protein 1. The unspliced form is called XBP1u. IRE1 removes a 26-nucleotide intron from XBP1u mRNA, creating XBP1s, where the s stands for spliced. This splicing causes a frameshift that produces a different, active transcription factor.

## 6.2 Downstream Effects

XBP1s is a potent transcription factor that activates many genes. It upregulates ER chaperones including GRP78, GRP94, PDI, and others. It increases ERAD components to enhance degradation of misfolded proteins. It promotes lipid synthesis to expand the ER membrane. It increases protein entry into the ER. Overall, XBP1s increases the ER's capacity to handle protein folding.

# 7. ATF6 Pathway: Expanding ER Capacity

The ATF6 pathway also works to expand ER capacity but through a different mechanism involving proteolytic cleavage.

## 7.1 Mechanism

When GRP78 releases from ATF6, ATF6 is transported from the ER to the Golgi apparatus in COPII vesicles. In the Golgi, ATF6 is cleaved sequentially by two proteases: S1P, which stands for site-1 protease, and S2P, which stands for site-2 protease. These cleavages release the N-terminal cytoplasmic domain of ATF6. This released fragment is the active transcription factor, designated ATF6f, where f stands for fragment. The active ATF6f transcription factor translocates to the nucleus.

## 7.2 Downstream Effects

ATF6f activates transcription of many genes. It upregulates ER chaperones including GRP78 and GRP94. It increases ERAD components to enhance degradation capacity. It promotes lipid synthesis to expand the ER membrane. Overall, ATF6 helps increase the ER's capacity to handle protein folding.

# 8. ERAD: ER-Associated Degradation

When proteins cannot be properly folded despite assistance from chaperones, they must be removed from the ER through ER-associated degradation, or ERAD.

The ERAD process begins with recognition of terminally misfolded proteins. EDEM, which stands for ER degradation-enhancing alpha-mannosidase-like protein, recognizes misfolded glycoproteins. GRP78 also participates in substrate recognition. The misfolded protein is then retrotranslocated, meaning it is transported backward through the Sec61 translocon from the ER lumen to the cytoplasm. In the cytoplasm, the protein is ubiquitinated by E3 ubiquitin ligases. The ubiquitinated protein is then recognized and degraded by the proteasome. This process clears the ER of proteins that cannot be salvaged.

# 9. ER Stress and Calcium Signaling

Calcium signaling and ER stress are intimately connected because the ER serves as the major calcium storage organelle.

ER calcium depletion can trigger ER stress because calcium is required for proper chaperone function. Many chaperones, including GRP78, calnexin, and calreticulin, require calcium for their activity. When ER calcium is depleted, protein folding becomes impaired.

Conversely, ER stress can disrupt calcium homeostasis. The UPR affects expression of calcium channels and pumps. Prolonged ER stress can cause calcium leakage from the ER. This creates a vicious cycle where ER stress worsens calcium dysregulation, which in turn worsens ER stress.

# 10. ER Stress in Disease

## 10.1 Neurodegenerative Diseases

In Alzheimer's disease, ER stress markers are elevated in patient brains. Increased XBP1 splicing indicates IRE1 activation. CHOP levels are elevated, indicating activation of pro-death pathways. Cleaved caspases including caspase-12, caspase-4, and caspase-3 are detected, indicating apoptosis. Amyloid plaques may trigger ER stress. UPR activation is found in neurons near plaques, suggesting that beta-amyloid aggregates contribute to neuronal death through ER stress mechanisms.

In Parkinson's disease, Parkinsonian toxins activate ER stress. These toxins include 6-OHDA, which is 6-hydroxydopamine; MPP+, which is the toxic metabolite of MPTP; and rotenone, which is a complex I inhibitor. In neuronal models, these toxins activate both PERK and IRE1 pathways. eIF2alpha phosphorylation increases. ATF4 and CHOP are induced. Interestingly, PERK knockout neurons are more sensitive to these toxins, showing increased death. This demonstrates that PERK can be protective initially, even though chronic activation becomes harmful.

Other neurodegenerative conditions also involve ER stress. In prion diseases, misfolded PrP protein triggers ER stress. In amyotrophic lateral sclerosis, mutant SOD1 causes ER stress. In Huntington's disease, polyglutamine aggregates activate ER stress pathways.

## 10.2 Metabolic Diseases

In diabetes, pancreatic beta-cells produce insulin, which is a secretory protein. The high demand for insulin production creates ER stress in these cells. Chronic ER stress leads to beta-cell death, contributing to diabetes progression. This is especially relevant in type 2 diabetes where beta-cells are under sustained stress.

## 10.3 COVID-19

SARS-CoV-2 spike protein, specifically the S1 subunit, triggers ER stress in infected cells. This activates all branches of the UPR. MAPK pathways are activated, including ERK, p38, and JNK. NF-kappaB is activated, leading to inflammation. CHOP is induced. Cytokine production increases. These ER stress responses contribute to the inflammatory damage seen in severe COVID-19.

# 11. Therapeutic Targeting

Understanding ER stress mechanisms opens therapeutic possibilities. Chemical chaperones such as 4-phenylbutyric acid and tauroursodeoxycholic acid can stabilize protein folding and reduce ER stress. Specific UPR modulators can enhance protective branches while inhibiting pro-death pathways. For example, PERK inhibitors can reduce chronic translational attenuation, while IRE1 inhibitors can prevent excessive stress signaling. GRP78 overexpression or enhancement represents another therapeutic approach. Antioxidants can reduce the oxidative stress component of ER dysfunction. These strategies are being explored for neurodegenerative diseases, diabetes, and other ER stress-related conditions.

# 12. Summary: Must-Know Facts

The ER performs multiple critical functions including protein synthesis, folding, modification, quality control, and calcium storage.

ER stress occurs when misfolded proteins accumulate because the folding capacity is overwhelmed. Causes include increased protein load, decreased chaperone activity, calcium depletion, and various toxins.

GRP78, also called BiP, is the master ER chaperone and UPR sensor. Normally it binds to PERK, IRE1, and ATF6, keeping them inactive. During stress, GRP78 releases from these proteins to bind misfolded proteins, thereby activating the UPR. GRP78 is upregulated during the UPR. Overexpression of GRP78 is protective against various stresses.

The UPR has three branches. The PERK pathway phosphorylates eIF2alpha to decrease translation, induces ATF4, and ultimately CHOP, which is pro-apoptotic. This causes translational attenuation and G1 arrest. The IRE1 pathway splices XBP1 mRNA to create the active XBP1s transcription factor, which increases chaperones and ERAD components. This is the most conserved branch. The ATF6 pathway involves cleavage by S1P and S2P in the Golgi to release an active transcription factor that increases chaperones, ERAD, and lipid synthesis, thereby expanding ER capacity.

ERAD involves retrotranslocation of misfolded proteins to the cytoplasm, followed by ubiquitination and proteasomal degradation. EDEM and GRP78 are involved in substrate recognition.

ER stress contributes to multiple diseases. In Alzheimer's disease, there is increased XBP1 splicing, elevated CHOP, and cleaved caspases in patient brains. In Parkinson's disease, toxins activate PERK and IRE1, and PERK knockout neurons are more vulnerable. In diabetes, beta-cell ER stress contributes to disease progression. In COVID-19, spike protein triggers UPR activation and inflammation.

CHOP is a pro-apoptotic transcription factor. Elevated CHOP indicates maladaptive UPR and the shift toward cell death pathways.

# 13. Exam-Style Questions You Might See

## Question 1: Explain how GRP78/BiP functions as a sensor of ER stress.

GRP78 is an ER chaperone that normally binds to PERK, IRE1, and ATF6, keeping them inactive. During ER stress, misfolded proteins accumulate. GRP78 preferentially binds to these misfolded proteins and releases from PERK, IRE1, and ATF6. This release activates these three sensors, initiating the unfolded protein response.

## Question 2: Describe the three branches of the UPR and their main functions.

The PERK pathway phosphorylates eIF2alpha to reduce translation, induces ATF4, which leads to CHOP expression. Its main function is translational attenuation. The IRE1 pathway splices XBP1 mRNA to create the active XBP1s transcription factor, which activates chaperone and ERAD genes. Its main function is increasing folding capacity. The ATF6 pathway involves cleavage in the Golgi by S1P and S2P, releasing an active transcription factor that promotes chaperone expression, ERAD, and lipid synthesis. Its main function is expanding ER capacity.

## Question 3: What is CHOP and why is it significant?

CHOP, which stands for C/EBP homologous protein, is a pro-apoptotic transcription factor induced by ATF4 in the PERK pathway. Elevation of CHOP indicates a shift from adaptive to maladaptive UPR. High CHOP levels indicate chronic or severe ER stress that is leading to apoptosis. It serves as a marker of the cell death program.

## Question 4: How does ER stress connect to Alzheimer's disease?

Alzheimer's disease patient brains show elevated ER stress markers. These include increased XBP1 splicing, indicating IRE1 activation; CHOP elevation; and cleaved caspases including caspase-12, caspase-4, and caspase-3. UPR activation is found near amyloid plaques. This suggests that beta-amyloid aggregates may trigger ER stress, contributing to neuronal death.

## Question 5: Why are PERK knockout neurons more vulnerable to Parkinsonian toxins?

PERK knockout neurons show reduced survival when exposed to toxins such as 6-OHDA, MPP+, and rotenone. PERK normally provides a protective response by reducing translation during acute stress, which prevents additional ER load. Without PERK, cells cannot attenuate translation. They become overwhelmed and die. This shows that PERK is initially protective, even though chronic activation can be harmful.

# Final Exam Focus

For the final exam, focus on understanding GRP78 as the master sensor that releases from PERK, IRE1, and ATF6 during stress. Know the three UPR branches in detail: PERK phosphorylates eIF2alpha and induces CHOP; IRE1 splices XBP1 to create the active transcription factor; and ATF6 is cleaved to release its active fragment. Remember that CHOP is the pro-death marker. Understand the disease connections, particularly that Alzheimer's disease shows increased XBP1 splicing and CHOP, while Parkinson's disease models show that PERK knockout increases vulnerability to toxins. These connections demonstrate how ER stress contributes to neurodegeneration.`,

# Table of Contents

# Lecture 9: Cell Cycle and p53

## Complete Exam Study Notes

These notes explain the cell cycle and p53 tumor suppressor in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers the fundamental mechanisms that control cell division, with particular emphasis on cyclin-CDK complexes that drive progression through the cell cycle phases, the pRB/E2F pathway that controls the critical G1/S transition, and p53, the guardian of the genome that responds to DNA damage by triggering cell cycle arrest, apoptosis, or senescence. Understanding these mechanisms is essential because loss of cell cycle control leads to cancer.

# 1. Cell Cycle Overview

The cell cycle is the series of events that leads to cell division, producing two daughter cells from one parent cell. This fundamental process is essential for life.

## 1.1 Why Cell Division Matters

Cell division serves multiple critical functions. Growth occurs as organisms increase cell number. Development transforms a single fertilized egg into a complex multicellular organism. Tissue renewal replaces dead or damaged cells. Repair processes including wound healing depend on cell division. In reproduction, cell division produces gametes through meiosis.

## 1.2 Duration

The duration of the cell cycle varies dramatically depending on cell type. In human somatic cells, the total cycle typically takes eighteen to twenty-four hours. However, this varies considerably. Some cells, such as intestinal epithelial cells, divide rapidly. Others, such as neurons, rarely if ever divide. In embryonic cells, the cycle is much faster. For example, in Xenopus frog embryos, the cell cycle takes only about thirty minutes. This acceleration is achieved through shortened G1 and G2 phases, allowing rapid cell number expansion during early development.

## 1.3 Cell Cycle Control

Cell cycle control is tightly regulated to ensure proper cell division. The cell must complete each phase properly before proceeding to the next. DNA must be replicated once and only once per cycle. Damaged DNA must not be passed to daughter cells. Chromosomes must be distributed equally to both daughters.

Loss of cell cycle control leads to cancer. Cells proliferate uncontrollably when regulatory mechanisms fail. Notably, p53, a key regulator that will be discussed extensively in this lecture, is mutated in more than fifty percent of human cancers.

# 2. The Four Phases: G1, S, G2, M

## 2.1 G1 Phase: Gap 1

G1 is the first gap phase. Its duration is the most variable of all phases, typically lasting six to twelve hours or more. During G1, the cell grows, increasing in size. It accumulates nutrients and ATP. It synthesizes proteins needed for S phase, including enzymes for DNA replication. Organelles such as mitochondria and ribosomes are duplicated.

A critical regulatory point occurs in late G1 called the restriction point, often abbreviated R point. This represents a point of no return. Before the restriction point, cells can still exit to G0, the quiescent state. After passing the restriction point, the cell is committed to complete the division cycle. This decision point is controlled by the pRB/E2F pathway, which will be discussed in detail later.

## 2.2 S Phase: Synthesis

S phase typically lasts six to eight hours. The defining event of S phase is DNA replication. The entire genome is duplicated. DNA content increases from 2n to 4n, though the cell still has the diploid number of chromosomes. Histones are synthesized to package the newly replicated DNA. Centriole duplication also occurs.

A critical requirement is that each chromosome must be replicated exactly once and only once per cycle. A licensing system prevents re-replication of already-replicated regions. Errors during replication lead to mutations and genomic instability.

## 2.3 G2 Phase: Gap 2

G2 phase typically lasts three to four hours. Further cell growth occurs. Protein synthesis continues. The cell prepares specifically for mitosis, synthesizing proteins such as tubulin for the mitotic spindle. Organelle replication completes.

The G2/M checkpoint ensures that DNA replication is complete before mitosis begins. It checks for DNA damage. It verifies that the cell has grown large enough to support two daughter cells.

## 2.4 M Phase: Mitosis and Cytokinesis

M phase typically lasts about one hour. It is the shortest phase but the most visually dramatic. M phase consists of mitosis, the division of the nucleus, followed by cytokinesis, the division of the cytoplasm.

Mitosis proceeds through distinct stages. During prophase, chromatin condenses into visible chromosomes. Each chromosome consists of two sister chromatids joined at the centromere. Centrioles move to opposite poles of the cell. The spindle apparatus forms. The nuclear envelope breaks down.

During metaphase, chromosomes align at the metaphase plate, which is the cell's equator. Kinetochores, protein structures on the centromeres, attach to spindle microtubules. The spindle checkpoint verifies that all chromosomes are properly attached before proceeding.

During anaphase, sister chromatids separate and move to opposite poles. The cell elongates. During telophase, chromosomes decondense back into chromatin. Nuclear envelopes reform around each chromosome set. The spindle apparatus disassembles.

Cytokinesis divides the cytoplasm. A contractile ring composed of actin and myosin forms. The cleavage furrow deepens, eventually pinching the cell in two. Two daughter cells are formed, each with a complete set of chromosomes.

# 3. G0: The Quiescent State

G0 designates cells that have exited the cell cycle. These cells are not actively dividing but remain metabolically active, alive, and functional. They perform their specialized cellular functions.

## 3.1 Types of G0 Cells

Some cells enter a reversible G0 state from which they can re-enter the cell cycle when appropriate signals are received. Liver cells are normally quiescent but can divide if the liver is damaged. Lymphocytes are activated by infection and re-enter the cycle to proliferate. Fibroblasts divide when needed for wound healing.

Other cells enter an irreversible G0 state and are permanently exited from the cell cycle. These are called post-mitotic cells. Neurons are the classic example; they do not divide after differentiation. Cardiac muscle cells are mostly post-mitotic. Senescent cells, which will be discussed in detail in Section 11, represent another form of irreversible G0.

## 3.2 Entry into G0

Cells enter G0 from G1, before they pass the restriction point. Several conditions trigger G0 entry including lack of growth signals, contact inhibition when cells become too crowded, nutrient deprivation, and terminal differentiation into specialized cell types.

# 4. Cyclins and CDKs

The cell cycle is driven by cyclin-CDK complexes. Understanding these molecular drivers is critical for exam success.

## 4.1 What Are CDKs?

CDK stands for cyclin-dependent kinase. CDKs are protein kinases, meaning they add phosphate groups to target proteins. However, CDKs are inactive on their own. They require binding to a cyclin partner to become active. Once activated, they phosphorylate target proteins to drive cell cycle progression.

## 4.2 What Are Cyclins?

Cyclins are regulatory proteins that bind to and activate CDKs. The concentrations of cyclins oscillate during the cell cycle. Each cyclin peaks at a specific phase and is then degraded after performing its function. This oscillating pattern of cyclin expression drives the sequential progression through cell cycle phases.

## 4.3 The Cyclin-CDK Complexes

Each phase of the cell cycle has characteristic cyclin-CDK pairs. In G1 phase, cyclin D binds to either CDK4 or CDK6. This complex peaks during G1. Its main target is pRB, the retinoblastoma protein. Cyclin D/CDK4 or CDK6 initiates G1 progression.

At the G1/S transition, cyclin E binds to CDK2. This complex peaks at the G1/S boundary. It also phosphorylates pRB, helping commit the cell to enter S phase.

During S phase, cyclin A binds to CDK2. This complex peaks during S phase and is required for DNA replication to proceed.

At the G2/M transition and during M phase, cyclin A can bind to CDK1, also called Cdc2, and cyclin B binds to CDK1. Cyclin B peaks during M phase and drives entry into mitosis.

A helpful way to memorize the sequence is: cyclin D drives G1, cyclin E drives the G1/S transition, cyclin A drives S phase and early G2, and cyclin B drives M phase.

## 4.4 Regulation of Cyclin-CDK Complexes

Cyclin-CDK activity is regulated at multiple levels. Cyclin synthesis is controlled transcriptionally. Different cyclins are made at different times during the cycle. Cyclin degradation occurs through the ubiquitin-proteasome system. The anaphase-promoting complex, abbreviated APC/C, targets cyclins for rapid destruction after they have performed their function.

CDK activity is also regulated by phosphorylation. Activating phosphorylation is performed by CAK kinase. Inhibitory phosphorylation is performed by Wee1 kinase. The Cdc25 phosphatase removes inhibitory phosphates to activate CDKs.

Finally, CDK inhibitors, which will be discussed in Section 6, can bind to and inactivate cyclin-CDK complexes. These include proteins such as p21, p27, p15, p16, p19, and p57.

# 5. G1/S Checkpoint: The Restriction Point

The G1/S checkpoint, also called the restriction point, is the most important decision point in the cell cycle. This is where the cell commits to division or remains in G0. The molecular mechanism controlling this checkpoint centers on the pRB/E2F pathway, which will be explained in detail in Section 9.

# 6. CDK Inhibitors

CDK inhibitors, abbreviated CKIs, are proteins that bind to and inactivate cyclin-CDK complexes. They serve as brakes on cell cycle progression.

There are two families of CDK inhibitors. The INK4 family includes p15, p16, and p19. These proteins specifically inhibit CDK4 and CDK6. The CIP/KIP family includes p21, p27, and p57. These are broad-spectrum inhibitors that can inhibit multiple cyclin-CDK complexes. p21 is particularly important and will be discussed extensively in Section 8.

# 7. p53: Guardian of the Genome

p53 is the most important tumor suppressor protein in human cells. It is mutated in more than fifty percent of human cancers. p53 serves as the master regulator of cell fate decisions in response to stress.

## 7.1 p53 Basics

p53 is a transcription factor. It is a 53 kilodalton protein, hence its name. The gene encoding p53 is called TP53. p53 has earned the nickname 'guardian of the genome' because it protects genomic integrity.

## 7.2 p53 Activation

Multiple stresses can trigger p53 activation. The most important trigger is DNA damage, which can be caused by UV radiation, ionizing radiation, or chemical mutagens. Other triggers include oncogene activation, hypoxia, nutrient deprivation, and ribosomal stress.

The activation mechanism begins when DNA damage is detected by kinases called ATM and ATR. These kinases phosphorylate p53. Phosphorylation stabilizes p53, preventing its degradation. p53 accumulates in the nucleus where it functions as a transcription factor, activating or repressing hundreds of target genes.

## 7.3 p53 Outcomes

p53 decides the fate of stressed cells. There are three main possible outcomes.

The first outcome is cell cycle arrest. p53 induces p21, which is a CDK inhibitor. p21 blocks cyclin-CDK complexes. The cell cycle halts at either G1/S or G2/M checkpoints. This gives the cell time to repair DNA damage. If repair is successful, the cell can resume cycling.

The second outcome is apoptosis, or programmed cell death. If damage is too severe to repair, p53 activates pro-apoptotic genes including BAX, PUMA, and NOXA. These proteins activate caspases, the executioners of apoptosis. The cell commits suicide. This prevents transmission of mutations to daughter cells.

The third outcome is senescence, which is permanent cell cycle arrest. p53 induces p21, which causes sustained arrest. The cell remains alive but cannot divide. Senescence will be discussed in detail in Section 11.

## 7.4 p53 in Cancer

The TP53 gene is mutated in more than fifty percent of human cancers. Loss of p53 function means loss of the DNA damage checkpoint, loss of the apoptosis pathway, and loss of senescence induction. Cells accumulate mutations that drive cancer progression. p53 mutations are associated with poor prognosis in cancer patients.

# 8. p21: The Universal CDK Inhibitor

p21, also known as WAF1, is a universal CDK inhibitor and one of the most important p53 target genes. p21 is induced by p53 in response to DNA damage or other stresses. Once expressed, p21 binds to and inhibits multiple cyclin-CDK complexes.

p21 particularly targets cyclin E/CDK2, which controls the G1/S transition, and cyclin A and cyclin B complexes with their CDKs, which control progression through S, G2, and M phases. By inhibiting these complexes, p21 blocks pRB phosphorylation, keeping E2F sequestered. It also directly blocks CDKs at later cell cycle phases. The result is cell cycle arrest at G1/S or G2/M checkpoints, allowing time for DNA repair or triggering senescence if damage persists.

# 9. pRB/E2F Pathway

The pRB/E2F pathway is the molecular switch that controls the G1/S transition and passage through the restriction point. Understanding this pathway is essential for understanding cell cycle control.

pRB stands for retinoblastoma protein, named after the childhood eye cancer in which it was first discovered as a tumor suppressor. E2F is a family of transcription factors. In the unphosphorylated state, pRB binds tightly to E2F, forming an inactive complex. This binding blocks E2F from activating its target genes, which include genes required for S phase such as DNA replication enzymes and cyclins.

When cells receive growth signals, cyclin D/CDK4 or CDK6 complexes form. These complexes phosphorylate pRB. As the cell approaches the restriction point, cyclin E/CDK2 also phosphorylates pRB. Hyperphosphorylated pRB releases E2F. Free E2F then activates transcription of S-phase genes. The cell passes the restriction point and enters S phase, committed to complete the division cycle.

This pathway explains how p53 and p21 cause cell cycle arrest. When p53 induces p21, p21 inhibits cyclin E/CDK2 and cyclin D/CDK4 or CDK6. Without these kinases active, pRB cannot be phosphorylated. pRB remains bound to E2F. S-phase genes are not activated. The cell cannot pass the restriction point and remains arrested in G1.

# 10. Cell Cycle Checkpoints

The cell cycle has multiple checkpoints that ensure proper progression. The G1/S checkpoint, or restriction point, checks for cell size, nutrients, growth signals, and DNA damage. The G2/M checkpoint ensures DNA replication is complete and checks for DNA damage. The spindle checkpoint during metaphase verifies that all chromosomes are properly attached to the spindle before allowing anaphase to proceed. These checkpoints prevent cells with damaged DNA or incomplete replication from dividing, thereby maintaining genomic integrity.

# 11. Cellular Senescence

Senescence is a state of permanent cell cycle arrest. Senescent cells are irreversibly arrested, usually in G0 or G1. They remain metabolically active and alive but cannot divide.

## 11.1 Characteristics

Senescent cells have several characteristic features. The arrest is irreversible. Cells are metabolically active and perform many normal functions. They are resistant to apoptosis. Their morphology changes, becoming enlarged and flattened. Importantly, they develop what is called the senescence-associated secretory phenotype, abbreviated SASP, in which they secrete numerous factors including cytokines, growth factors, and proteases.

## 11.2 Triggers

Senescence can be triggered by different stimuli. Replicative senescence occurs due to telomere shortening. Normal somatic cells can divide approximately fifty to seventy times, a limit called the Hayflick limit, before telomeres become critically short and trigger senescence. Stress-induced senescence can be triggered by DNA damage, oncogene activation, or oxidative stress.

## 11.3 Molecular Markers

Two main pathways mediate senescence. The p53/p21 pathway involves increased p53 leading to increased p21, which inhibits CDKs and causes arrest. The p16/pRB pathway involves increased p16, which inhibits CDK4 and CDK6, keeping pRB in its active, E2F-binding state and causing arrest.

A classic marker of senescence is senescence-associated beta-galactosidase, abbreviated SA-beta-gal. This is a lysosomal enzyme that is active at pH 6. It can be detected by histochemical staining and serves as a widely used senescence marker.

## 11.4 Functions

Senescence has both beneficial and detrimental effects. Beneficial effects include tumor suppression, as senescence prevents damaged cells from dividing and potentially becoming cancerous. The SASP factors can promote wound healing. Senescence also plays roles in embryonic development, helping to sculpt tissues.

However, senescence also has detrimental effects. Accumulation of senescent cells contributes to aging and age-related diseases. The SASP can be pro-inflammatory, contributing to chronic inflammation. Senescent cells can cause tissue dysfunction when they accumulate in sufficient numbers.

# 12. Senescence versus Apoptosis

Both senescence and apoptosis prevent damaged cells from proliferating, but they achieve this through different mechanisms with different outcomes.

In senescence, the cell undergoes permanent arrest but remains alive. The cell is metabolically active. Morphology becomes enlarged and flattened. The SASP develops. SA-beta-gal is positive. p53, p21, and p16 are elevated. The cell can be thought of as imprisoned.

In apoptosis, the cell undergoes programmed death. The cell dies. DNA becomes fragmented. Caspases are activated. The cell shrinks and forms apoptotic bodies. The cell is phagocytosed by neighboring cells or macrophages. The cell can be thought of as executed.

Both mechanisms prevent the proliferation of damaged cells but represent fundamentally different cellular fates.

# 13. p53 Isoforms

The TP53 gene can produce multiple isoforms through alternative splicing and alternative promoter usage. Different isoforms can have different or even opposing functions. Some isoforms lack specific functional domains. This complexity adds another layer of regulation to p53 function, though the full-length p53 protein remains the most important form for tumor suppression.

# 14. Methods to Assess Cell Cycle

Several experimental methods can distinguish between proliferating and non-proliferating cells. Ki67 is a protein present in cells that are in G1, S, G2, or M phases but absent in G0. Ki67 immunostaining therefore marks proliferating cells. BrdU is a thymidine analog that incorporates into DNA during replication. BrdU incorporation specifically marks cells in S phase. PCNA, which stands for proliferating cell nuclear antigen, is another marker of proliferating cells.

For senescence, SA-beta-galactosidase staining is the classic marker. Senescent cells also show elevated p53, p21, and p16, enlarged morphology, and expression of SASP factors. Flow cytometry can measure DNA content to determine what proportion of cells are in G1, S, or G2/M phases.

# 15. Summary: Must-Know Facts

The cell cycle consists of four phases. G1 is the growth phase. S phase is when DNA replication occurs. G2 is preparation for mitosis. M phase is mitosis and cytokinesis. G0 is the quiescent state where cells have exited the cycle. The typical duration is eighteen to twenty-four hours for somatic cells but only thirty minutes for embryonic cells.

Cyclin-CDK complexes drive the cell cycle. Cyclin D with CDK4 or CDK6 drives G1. Cyclin E with CDK2 drives the G1/S transition. Cyclin A with CDK2 drives S phase. Cyclin B with CDK1 drives M phase. Cyclins oscillate in concentration while CDKs remain constant. The main target in G1 is pRB phosphorylation.

The pRB/E2F pathway controls the G1/S transition. pRB binds E2F, blocking S-phase genes. Cyclin D/CDK4 or CDK6 and cyclin E/CDK2 phosphorylate pRB. Hyperphosphorylated pRB releases E2F. Free E2F activates S-phase genes, and DNA replication begins.

p53 is the guardian of the genome. It is activated by DNA damage through ATM and ATR kinases. The outcomes are cell cycle arrest via p21 induction, apoptosis through activation of pro-death genes, or senescence. p53 is mutated in more than fifty percent of cancers.

p21 is a universal CDK inhibitor induced by p53. It blocks cyclin E/CDK2 and cyclin A and B complexes with their CDKs. It causes G1/S and G2/M arrest.

CDK inhibitors include the INK4 family with p15, p16, and p19, which inhibit CDK4 and CDK6, and the CIP/KIP family with p21, p27, and p57, which are broad inhibitors.

Senescence markers include SA-beta-galactosidase, which is a pH 6 lysosomal enzyme; elevated p53, p21, and p16; the SASP; and enlarged cell morphology.

Proliferation markers include Ki67, which is present in G1, S, G2, and M but absent in G0; BrdU incorporation during S phase; and PCNA.

# 16. Exam-Style Questions You Might See

## Question 1: Describe the pRB/E2F pathway and how it controls the G1/S transition.

pRB, the retinoblastoma protein, binds to E2F transcription factor, blocking expression of S-phase genes. Cyclin D/CDK4 or CDK6 and cyclin E/CDK2 phosphorylate pRB. Hyperphosphorylated pRB releases E2F. Free E2F activates genes required for DNA replication including cyclins and replication enzymes. The cell enters S phase.

## Question 2: How does p53 respond to DNA damage and what are the possible outcomes?

DNA damage is detected by ATM and ATR kinases. These kinases phosphorylate p53, stabilizing it. p53 accumulates and acts as a transcription factor. Outcomes include: cell cycle arrest, where p53 induces p21 which blocks CDKs, causing G1/S or G2/M arrest to allow time for repair; apoptosis, where if damage is severe, p53 activates BAX and PUMA, leading to caspase activation and cell death; and senescence, which is permanent arrest. These mechanisms prevent transmission of mutations.

## Question 3: What is p21 and how does it cause cell cycle arrest?

p21, also known as WAF1, is a universal CDK inhibitor induced by p53. It binds and inhibits cyclin E/CDK2 at the G1/S transition and cyclin A and B with their CDKs at later phases. It blocks pRB phosphorylation, keeping E2F sequestered and preventing S-phase entry. It also directly blocks CDKs. The result is cell cycle arrest at G1/S or G2/M checkpoints.

## Question 4: Compare senescence and apoptosis.

Senescence involves permanent arrest but the cell remains alive. Cells are metabolically active with enlarged morphology. They show SASP, are SA-beta-gal positive, and have elevated p53, p21, and p16. Apoptosis involves programmed death where the cell dies. DNA becomes fragmented, caspases are activated, and the cell is phagocytosed. Both prevent damaged cell proliferation but through different mechanisms. Senescence can be thought of as imprisonment while apoptosis is execution.

## Question 5: What are the markers used to distinguish proliferating versus senescent cells?

Proliferating cells are Ki67 positive, indicating they are in G1, S, G2, or M phases. They incorporate BrdU during S phase. They express PCNA. They have low or absent p21, low p53, and no SA-beta-gal. Senescent cells are Ki67 negative, indicating they are in G0. They do not incorporate BrdU. They are SA-beta-gal positive, showing lysosomal beta-galactosidase activity at pH 6. They have high p53, high p21, and high p16. They express SASP factors and show enlarged morphology.

# Final Exam Focus

For the final exam, focus on the cyclin-CDK pairs and their sequence through the cell cycle: cyclin D for G1, cyclin E for G1/S, cyclin A for S, and cyclin B for M. Understand the pRB/E2F pathway in detail, as this is the molecular switch controlling the restriction point. Know that p53 is activated by DNA damage through ATM/ATR phosphorylation and can trigger three outcomes: arrest through p21, apoptosis through BAX/PUMA, or senescence. Remember that p21 is the universal CDK inhibitor that mediates p53-induced arrest. Finally, know the markers that distinguish proliferating cells from senescent cells, particularly SA-beta-galactosidase, Ki67, and the elevation of p53, p21, and p16 in senescence.`,
