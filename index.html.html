# Lecture 13: Mitochondrial Cardiolipin and Neuroglobin

## Complete Exam Study Notes

These notes explain cardiolipin and neuroglobin in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This final lecture covers two interconnected topics: cardiolipin, the unique mitochondrial phospholipid essential for respiration and apoptosis, and neuroglobin, a neuroprotective oxygen-binding protein. Understanding these molecules is essential because cardiolipin oxidation is required for cytochrome c release and apoptosis, while neuroglobin protects against this process. Both are altered in Alzheimer's disease and aging, making them important therapeutic targets.

# Part 1: Cardiolipin

# 1. What Is Cardiolipin?

Cardiolipin, abbreviated CL, is a unique phospholipid found exclusively in the inner mitochondrial membrane. It is critical for respiration and apoptosis.

## 1.1 Key Facts

Cardiolipin is a phospholipid unique to mitochondria. It is found only in the inner mitochondrial membrane, where it comprises approximately twenty percent of the total lipids. The name comes from its original discovery in heart tissue. Cardiolipin is essential for mitochondrial function.

## 1.2 Why Cardiolipin Matters

Cardiolipin is critical for electron transport chain complex assembly and function. It is essential for cristae structure. It is required for mitochondrial protein import. It regulates apoptosis. It participates in mitochondrial fusion and fission.

# 2. Cardiolipin Structure

Cardiolipin has a unique structure that distinguishes it from all other phospholipids.

## 2.1 Chemical Structure

Cardiolipin is a dimeric phospholipid consisting of two phosphatidylglycerol molecules joined together. It contains two phosphate groups, whereas most phospholipids have only one. It contains four fatty acid chains, whereas most phospholipids have only two. It has three glycerol backbones. The formula can be described as glycerol-phosphate-glycerol with four fatty acids attached, creating a unique dimeric structure.

## 2.2 Properties

Cardiolipin is anionic, meaning it carries a negative charge. Its two phosphate groups provide two negative charges. This negative charge attracts positively charged proteins, which is important for its functions.

Cardiolipin has a cone shape that promotes membrane curvature. This shape is important for cristae formation in the inner mitochondrial membrane.

## 2.3 Fatty Acid Composition

Cardiolipin typically contains highly unsaturated fatty acids. Linoleic acid, designated 18:2, is common. The composition varies by tissue type. Because of this high degree of unsaturation, cardiolipin is prone to oxidation.

# 3. Cardiolipin Synthesis

Cardiolipin is synthesized by the enzyme CRLS1, which stands for cardiolipin synthase 1.

## 3.1 The Synthesis Pathway

Cardiolipin synthesis occurs in the inner mitochondrial membrane. The reaction combines phosphatidylglycerol with CDP-diacylglycerol to produce cardiolipin. CRLS1 catalyzes this final step. Phosphatidylglycerol is either imported from the ER or synthesized within mitochondria.

## 3.2 Remodeling

Newly synthesized cardiolipin has an immature fatty acid composition. Remodeling enzymes change the fatty acids to create mature, functional cardiolipin. The enzyme tafazzin is involved in this remodeling. Defects in tafazzin cause Barth syndrome, a genetic disorder affecting cardiolipin composition.

## 3.3 CRLS1 Dysfunction

When CRLS1 is dysfunctional, cardiolipin levels are reduced. This leads to mitochondrial dysfunction. Electron transport chain complex activity decreases. Membrane potential decreases. ATP production decreases. Oxidative stress increases.

CRLS1 dysfunction is found in Alzheimer's disease. CRLS1 expression also decreases with normal aging. It is associated with various metabolic disorders.

# 4. Cardiolipin Functions

## 4.1 ETC Complex Assembly and Function

Cardiolipin plays a structural role in the electron transport chain. It is required for proper ETC complex assembly. It binds to Complexes I, III, IV, and V. It stabilizes supercomplex formation, which creates structures called respirasomes. It is required for optimal electron transfer.

The functional impact is significant. Decreased cardiolipin leads to decreased complex activity, which leads to decreased ATP production. Complexes I and IV are especially affected by cardiolipin deficiency.

## 4.2 Cristae Structure

Cardiolipin's cone shape promotes membrane curvature. This is essential for cristae formation. Cristae provide increased surface area for the electron transport chain. Loss of cardiolipin leads to disrupted cristae structure.

## 4.3 Protein Import

Cardiolipin is required for TIM and TOM complex function. These complexes facilitate protein translocation into mitochondria.

## 4.4 Apoptosis Regulation

This is a critical function. Cardiolipin binds cytochrome c through electrostatic interactions. Cardiolipin is negatively charged while cytochrome c is positively charged. This binding keeps cytochrome c in the mitochondria and prevents apoptosis.

During apoptosis, cardiolipin gets oxidized, as will be explained in detail shortly. Oxidized cardiolipin has reduced affinity for cytochrome c. Cytochrome c detaches and is released to the cytoplasm, triggering apoptosis.

# 5. Cardiolipin and Cytochrome c

The cardiolipin-cytochrome c interaction is central to apoptosis regulation. This is one of the most important concepts in this lecture.

## 5.1 Normal Conditions

Cytochrome c is a small heme-containing protein. It functions in the electron transport chain, transferring electrons between Complex III and Complex IV. Cytochrome c is bound to cardiolipin on the inner mitochondrial membrane via electrostatic interactions. Cardiolipin's negative charges interact with positively charged lysine residues on cytochrome c. Approximately fifteen percent of the cytochrome c pool is bound to cardiolipin.

## 5.2 Functions

In electron transport, cytochrome c serves as a mobile electron carrier. It accepts electrons from Complex III and delivers them to Complex IV. For apoptosis prevention, sequestration of cytochrome c on the inner membrane means it cannot activate apoptosis while bound to cardiolipin.

# 6. Cardiolipin Oxidation and Apoptosis

This is the key mechanism of apoptosis initiation. Understanding this process is essential for the exam.

## 6.1 The Complete Process

The first step is receiving an apoptotic trigger. A death signal is received, such as DNA damage or oxidative stress. Reactive oxygen species increase. Hydrogen peroxide accumulates.

The second step involves cytochrome c becoming a peroxidase. Hydrogen peroxide partially unfolds cytochrome c. This converts cytochrome c into a peroxidase enzyme. Cytochrome c-peroxidase uses cardiolipin as its substrate and oxidizes it.

The third step is cardiolipin oxidation. Cytochrome c-peroxidase oxidizes the fatty acids of cardiolipin. This creates oxidized cardiolipin, abbreviated CLox. The unsaturated fatty acids are especially vulnerable to this oxidation.

The fourth step involves reduced affinity. Oxidized cardiolipin has greatly reduced affinity for cytochrome c. The electrostatic interaction is weakened. Cytochrome c detaches from the membrane.

The fifth step is translocation. Oxidized cardiolipin appears in the outer mitochondrial membrane. It attracts tBID, which stands for truncated BID and is a pro-apoptotic protein. tBID recruits BAX and BAK.

The sixth step is MOMP. BAX and BAK oligomerize, forming pores in the outer mitochondrial membrane. This creates mitochondrial outer membrane permeabilization, abbreviated MOMP.

The seventh and final step is cytochrome c release. Cytochrome c is released to the cytoplasm. It binds Apaf-1 and forms the apoptosome. This activates caspase-9, which activates caspase-3. Apoptosis proceeds.

The critical concept is that cardiolipin oxidation is required for cytochrome c release and apoptosis. Without cardiolipin oxidation, apoptosis cannot proceed through this pathway.

# 7. Cardiolipin in Alzheimer's Disease

## 7.1 Cardiolipin Changes in Alzheimer's Disease

Total cardiolipin levels are reduced in Alzheimer's disease brains. CRLS1 expression is decreased. Cardiolipin composition is altered. Importantly, these changes occur early in the disease process.

## 7.2 Consequences

Mitochondrial dysfunction results from cardiolipin deficiency. Electron transport chain complex activity decreases. ATP production decreases. Membrane potential decreases. Respiration is impaired.

Structural changes occur. Cristae become disrupted. Mitochondrial morphology is altered.

Apoptosis regulation becomes dysregulated. Paradoxically, decreased cardiolipin can mean decreased apoptosis in some contexts. With less cardiolipin, there is less substrate for oxidation. This may explain apoptosis resistance in some Alzheimer's disease neurons. However, the overall dysfunction still leads to neurodegeneration.

## 7.3 Synaptic Mitochondria

Cardiolipin changes are especially prominent in synaptic mitochondria. Synapses are the most vulnerable structures in Alzheimer's disease. Energy deficits at synapses contribute to synaptic loss, which is an early feature of the disease.

# 8. Cardiolipin in Parkinson's Disease

In Parkinson's disease, alpha-synuclein, the protein that aggregates in Lewy bodies, interacts with cardiolipin. Alpha-synuclein can bind to cardiolipin in membranes. This interaction may contribute to alpha-synuclein aggregation and mitochondrial dysfunction in Parkinson's disease.

# Part 2: Neuroglobin

# 9. What Is Neuroglobin?

Neuroglobin, abbreviated Ngb, is a neuroprotective oxygen-binding protein found in neurons. It protects mitochondria and prevents apoptosis.

## 9.1 Discovery and Basics

Neuroglobin was discovered in the year 2000. It is a member of the globin family, which includes hemoglobin and myoglobin. It is expressed primarily in neurons, including those in the brain, retina, and spinal cord. Like other globins, it is a heme-containing protein that can bind oxygen.

## 9.2 Localization

Neuroglobin is found mainly in the cytoplasm but is also present in mitochondria and the nucleus. Importantly, it can translocate to mitochondria under stress conditions.

# 10. Neuroglobin Structure and Function

## 10.1 Structure

Neuroglobin is a globular protein with a molecular weight of approximately seventeen kilodaltons. It contains a heme group with iron at its center. It binds oxygen reversibly and has higher oxygen affinity than hemoglobin.

## 10.2 Functions

Neuroglobin has multiple functions. For oxygen homeostasis, it binds and stores oxygen. It may facilitate oxygen diffusion to mitochondria. It maintains oxygen supply during hypoxia.

Neuroprotection is the most important function. Neuroglobin protects neurons from hypoxia and ischemia, oxidative stress, amyloid-beta toxicity in Alzheimer's disease, and mitochondrial dysfunction.

For mitochondrial protection, neuroglobin preserves mitochondrial function, maintains membrane potential, prevents cytochrome c release, and inhibits apoptosis.

Neuroglobin also has ROS scavenging activity. It possesses antioxidant properties that reduce oxidative damage.

# 11. Neuroglobin Neuroprotection Mechanisms

Neuroglobin protects neurons through multiple interconnected mechanisms.

First, neuroglobin prevents cytochrome c release. It translocates to mitochondria under stress. It interacts with cytochrome c. It prevents cytochrome c detachment from the inner membrane. This blocks apoptosis initiation.

Second, neuroglobin may inhibit cardiolipin oxidation. It may prevent cardiolipin oxidation, maintaining cardiolipin-cytochrome c binding and preserving mitochondrial integrity.

Third, neuroglobin activates survival pathways. It activates the PI3K/Akt pathway. Akt phosphorylates pro-apoptotic proteins, inactivating them and promoting cell survival.

Fourth, neuroglobin maintains mitochondrial function. It preserves membrane potential, maintains ATP production, reduces ROS production, and alleviates mitochondrial dysfunction.

# 12. Neuroglobin Signaling Pathways

## 12.1 The PI3K/Akt Pathway

Neuroglobin activates PI3K, which stands for phosphatidylinositol 3-kinase. PI3K produces PIP3. PIP3 activates Akt, also called protein kinase B or PKB.

Activated Akt has multiple pro-survival effects. It phosphorylates and inactivates BAD, a pro-apoptotic protein. It activates mTOR, promoting cell survival and protein synthesis. It activates CREB, promoting neuroprotective gene expression. Overall, this pathway provides survival signaling.

## 12.2 Other Signaling Pathways

Neuroglobin can interact with G-protein coupled receptors, integrating steroid, oxygen, and GPCR signals in a complex regulatory network. It also affects MAPK pathways including p38/MAPK and ERK pathways, which are involved in stress responses and survival.

# 13. Neuroglobin in Alzheimer's Disease

## 13.1 Protective Effects Against Amyloid-Beta

Neuroglobin attenuates amyloid-beta-induced apoptosis. It inhibits caspase activation. It activates the PI3K/Akt survival pathway. Overall, it protects neurons from amyloid-beta neurotoxicity.

## 13.2 Mechanisms in Alzheimer's Disease

Neuroglobin provides mitochondrial protection. It improves mitochondrial function, alleviates apoptosis, and preserves neuronal viability.

In transgenic Alzheimer's disease mouse models, neuroglobin overexpression attenuates the Alzheimer's disease phenotype. It reduces neurodegeneration, improves cognitive function, and reduces amyloid-beta toxicity.

## 13.3 Therapeutic Potential

Neuroglobin upregulation could be therapeutic for Alzheimer's disease. Potential approaches include developing small molecules that increase neuroglobin expression or gene therapy to express neuroglobin. Neuroglobin represents a promising neuroprotective target.

# 14. Neuroglobin and Aging

## 14.1 Changes with Normal Aging

Neuroglobin expression changes during aging. Some studies show decreased neuroglobin with age. This may contribute to age-related neuronal vulnerability.

CRLS1, the cardiolipin synthase, also decreases with aging. The combination of decreased cardiolipin plus decreased neuroglobin creates a double hit. This increases mitochondrial vulnerability and increases apoptosis susceptibility.

## 14.2 Astrocyte Reactivity

Normal aging induces A1-like astrocyte reactivity. Reactive astrocytes show altered neuroglobin and CRLS1 expression. This contributes to age-related neuroinflammation.

# 15. Summary: Must-Know Facts

Cardiolipin is a unique dimeric phospholipid with four fatty acids, two phosphates, and three glycerols. It is found only in the inner mitochondrial membrane and is synthesized by CRLS1.

Cardiolipin functions include ETC complex assembly and function, cristae structure maintenance, and binding cytochrome c to prevent apoptosis.

In the cardiolipin-apoptosis pathway, under normal conditions cytochrome c is bound to cardiolipin on the inner membrane. During stress, hydrogen peroxide converts cytochrome c to a peroxidase that oxidizes cardiolipin. Oxidized cardiolipin has reduced affinity for cytochrome c, so cytochrome c detaches. Oxidized cardiolipin appears on the outer membrane and attracts tBID, which recruits BAX and BAK causing MOMP. Cytochrome c is released, forming the apoptosome and activating caspases, leading to apoptosis. Cardiolipin oxidation is required for apoptosis.

In disease, Alzheimer's disease shows decreased cardiolipin levels, decreased CRLS1, altered composition, and early synaptic dysfunction. Parkinson's disease involves alpha-synuclein affecting cardiolipin. Aging shows decreased CRLS1 expression.

Neuroglobin is an oxygen-binding protein in neurons that is neuroprotective. It translocates to mitochondria under stress.

Neuroglobin functions include preventing cytochrome c release, inhibiting apoptosis, activating the PI3K/Akt survival pathway, maintaining mitochondrial function including membrane potential and ATP, and ROS scavenging.

In disease, neuroglobin protects against amyloid-beta toxicity in Alzheimer's disease and attenuates the Alzheimer's disease phenotype in transgenic models. It decreases with aging along with CRLS1, creating vulnerability. It has significant therapeutic potential.

# 16. Exam-Style Questions You Might See

// FormattedLectureNotes Component - Parses and displays lecture notes with sections
function FormattedLectureNotes({ content, lectureTitle }) {
  const [expandedSections, setExpandedSections] = useState({});
  
  if (!content) return <p className="text-slate-600">No notes available for this lecture.</p>;
  
  // Parse the content into sections
  const lines = content.split('\n');
  const sections = [];
  let currentSection = null;
  let currentSubsection = null;
  let currentSubsubsection = null;
  let currentContent = [];
  
  lines.forEach((line, index) => {
    if (line.startsWith('### ')) {
      // H3 - Sub-subsection (handle BEFORE H2 and H1)
      if (currentSubsubsection) {
        currentSubsubsection.content = currentContent.join('\n');
        if (currentSubsection) {
          if (!currentSubsection.subsubsections) currentSubsection.subsubsections = [];
          currentSubsection.subsubsections.push(currentSubsubsection);
        }
      }
      currentSubsubsection = {
        id: `subsubsection-${index}`,
        title: line.replace(/^### /, ''),
        level: 3,
        content: ''
      };
      currentContent = [];
    } else if (line.startsWith('## ')) {
      // H2 - Subsection
      if (currentSubsubsection) {
        currentSubsubsection.content = currentContent.join('\n');
        if (currentSubsection) {
          if (!currentSubsection.subsubsections) currentSubsection.subsubsections = [];
          currentSubsection.subsubsections.push(currentSubsubsection);
        }
        currentSubsubsection = null;
      }
      if (currentSubsection && currentContent.length > 0 && !currentSubsubsection) {
        currentSubsection.content = currentContent.join('\n');
      }
      if (currentSubsection) {
        currentSection?.subsections.push(currentSubsection);
      }
      currentSubsection = {
        id: `subsection-${index}`,
        title: line.replace(/^## /, ''),
        level: 2,
        content: '',
        subsubsections: []
      };
      currentContent = [];
    } else if (line.startsWith('# ')) {
      // H1 - Main section
      if (currentSubsubsection) {
        currentSubsubsection.content = currentContent.join('\n');
        if (currentSubsection) {
          if (!currentSubsection.subsubsections) currentSubsection.subsubsections = [];
          currentSubsection.subsubsections.push(currentSubsubsection);
        }
        currentSubsubsection = null;
      }
      if (currentSubsection) {
        if (currentContent.length > 0 && !currentSubsubsection) {
          currentSubsection.content = currentContent.join('\n');
        }
        currentSection?.subsections.push(currentSubsection);
        currentSubsection = null;
      }
      if (currentSection) {
        if (currentContent.length > 0 && !currentSubsection) {
          currentSection.content = currentContent.join('\n');
        }
        sections.push(currentSection);
      }
      currentSection = {
        id: `section-${index}`,
        title: line.replace(/^# /, ''),
        level: 1,
        subsections: [],
        content: ''
      };
      currentContent = [];
    } else {
      currentContent.push(line);
    }
  });
  
  // Push the last items
  if (currentSubsubsection) {
    currentSubsubsection.content = currentContent.join('\n');
    if (currentSubsection) {
      if (!currentSubsection.subsubsections) currentSubsection.subsubsections = [];
      currentSubsection.subsubsections.push(currentSubsubsection);
    }
  } else if (currentSubsection) {
    currentSubsection.content = currentContent.join('\n');
    currentSection?.subsections.push(currentSubsection);
  } else if (currentSection && currentContent.length > 0) {
    currentSection.content = currentContent.join('\n');
  }
  if (currentSection) {
    sections.push(currentSection);
  }
  
  const toggleSection = (sectionId) => {
    setExpandedSections(prev => ({
      ...prev,
      [sectionId]: !prev[sectionId]
    }));
  };
  
  const renderContent = (text) => {
    if (!text || text.trim() === '') return null;
    return (
      <div className="whitespace-pre-wrap text-base leading-relaxed text-slate-700">
        {text}
      </div>
    );
  };
  
  return (
    <div className="space-y-4">
      {sections.map((section, idx) => {
        // Skip table of contents and title sections
        if (section.title.includes('Table of Contents') || 
            section.title.includes('Complete Exam Study Notes') ||
            idx === 0) {
          return null;
        }
        
        const isExpanded = expandedSections[section.id] !== false; // Default expanded
        
        return (
          <div key={section.id} className="rounded-2xl border border-slate-200 bg-white overflow-hidden">
            {/* Section Header */}
            <button
              onClick={() => toggleSection(section.id)}
              className="w-full flex items-center justify-between p-5 text-left hover:bg-slate-50 transition"
            >
              <h2 className="text-xl font-bold text-slate-900">{section.title}</h2>
              <ChevronDown 
                className={`h-5 w-5 text-slate-500 transition-transform ${isExpanded ? 'rotate-180' : ''}`}
              />
            </button>
            
            {/* Section Content */}
            {isExpanded && (
              <div className="px-5 pb-5 space-y-4">
                {renderContent(section.content)}
                
                {/* Subsections */}
                {section.subsections.map((subsection) => {
                  const subExpanded = expandedSections[subsection.id] !== false;
                  
                  return (
                    <div key={subsection.id} className="ml-4 rounded-xl border border-slate-200 bg-slate-50 overflow-hidden">
                      <button
                        onClick={() => toggleSection(subsection.id)}
                        className="w-full flex items-center justify-between p-4 text-left hover:bg-slate-100 transition"
                      >
                        <h3 className="text-lg font-semibold text-slate-800">{subsection.title}</h3>
                        <ChevronDown 
                          className={`h-4 w-4 text-slate-500 transition-transform ${subExpanded ? 'rotate-180' : ''}`}
                        />
                      </button>
                      
                      {subExpanded && (
                        <div className="px-4 pb-4 space-y-3">
                          {renderContent(subsection.content)}
                          
                          {/* Sub-subsections (H3 headers like Ceramide, Gangliosides) */}
                          {subsection.subsubsections?.map((subsubsection) => (
                            <div key={subsubsection.id} className="ml-2 p-4 rounded-lg bg-white border border-slate-200">
                              <h4 className="text-base font-semibold text-slate-800 mb-2">{subsubsection.title}</h4>
                              {renderContent(subsubsection.content)}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

                      </div>

                      <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                        {currentFlashcards.map((card, index) => (
                          <FlashCard key={index} question={card.q} answer={card.a} />
                        ))}
                      </div>

                      {currentFlashcards.length === 0 && (
                        <div className="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-12 text-center">
                          <p className="text-slate-600">No flashcards available for this lecture yet.</p>
                        </div>
                      )}
                    </CardContent>
                  </Card>

                  {/* Navigation to Next Mode */}
                  {activeContent?.nextMode && currentFlashcards.length > 0 && (
                    <div className="flex items-center justify-center">
                      <Button
                        onClick={handleNextMode}
                        className="group flex items-center gap-3 rounded-2xl bg-slate-900 px-8 py-4 text-base font-medium text-white hover:bg-slate-800"
                      >
                        <span>Continue to Testing</span>
                        <ArrowRight className="h-5 w-5 transition-transform group-hover:translate-x-1" />
                      </Button>
                    </div>
                  )}
                </div>
              )}

              {/* TESTING MODE */}
              {selectedContentType === "testing" && (
                <TestingSection 
                  selectedLecture={selectedLecture}
                  activeLecture={activeLecture}
                  examQuestions={examQuestions}
                  handleGoBack={handleGoBack}
                />
              )}
            </div>
          </main>
        </div>
      </div>
    );
  }

  // Selection View (Original Layout)
  return (
    <div className="min-h-screen bg-slate-100 text-slate-900">
      <ProgressMenu />
      <div className="flex min-h-screen">
        <aside
          className={`relative border-r border-slate-200 bg-white shadow-sm transition-all duration-300 ${
            menuOpen ? "w-72" : "w-20"
          }`}
        >
          <div className="flex h-16 items-center justify-between border-b border-slate-200 px-4">
            {menuOpen && (
              <div>
                <h1 className="text-lg font-semibold tracking-tight">Study Hub</h1>
                <p className="text-xs text-slate-500">Lectures 2–13</p>
              </div>
            )}
            <Button
              variant="ghost"
              size="icon"
              className="rounded-xl"
              onClick={() => setMenuOpen((value) => !value)}
              aria-label="Toggle lecture menu"
            >
              {menuOpen ? <X className="h-5 w-5" /> : <Menu className="h-5 w-5" />}
            </Button>
          </div>

          <nav className="space-y-2 p-3">
            {lectures.map((lecture) => {
              const isActive = lecture.id === selectedLecture;
              const isPriority = lecture.highPriority || lecture.topPriority;
              
              return (
                <button
                  key={lecture.id}
                  onClick={() => setSelectedLecture(lecture.id)}
                  className={`flex w-full items-center gap-3 rounded-2xl px-3 py-3 text-left transition relative ${
                    isActive
                      ? "bg-slate-900 text-white shadow-md"
                      : isPriority 
                        ? "text-slate-700 hover:bg-slate-100"
                        : "text-slate-700 hover:bg-slate-100"
                  }`}
                >
                  {isPriority && !isActive && (
                    <div className="absolute -top-1 -right-1 flex h-6 w-6 items-center justify-center">
                      <svg className="h-6 w-6 text-yellow-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2L1 21h22L12 2zm0 3.99L19.53 19H4.47L12 5.99zM11 16h2v2h-2v-2zm0-6h2v4h-2v-4z"/>
                      </svg>
                    </div>
                  )}
                  <div
                    className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-xl text-sm font-semibold ${
                      isActive 
                        ? "bg-white/15" 
                        : isPriority
                          ? "bg-yellow-100 text-yellow-900 border-2 border-yellow-400"
                          : "bg-slate-200"
                    }`}
                  >
                    {lecture.id}
                  </div>
                  {menuOpen && (
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center justify-between gap-2">
                        <p className="truncate text-sm font-medium">{lecture.title}</p>
                        <span className={`flex-shrink-0 text-xs font-medium ${
                          isActive ? "text-emerald-300" : "text-emerald-600"
                        }`}>
                          ~{lecture.studyTime}
                        </span>
                      </div>
                      <p className={`truncate text-xs ${
                        isActive 
                          ? "text-slate-300" 
                          : "text-slate-500"
                      }`}>
                        {lecture.subtitle}
                      </p>
                    </div>
                  )}
                </button>
              );
            })}
          </nav>
        </aside>

        <main className="flex-1 p-6 md:p-8">
          <div className="mx-auto max-w-5xl space-y-6">
            <section className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <div className="flex flex-col gap-5 md:flex-row md:items-start md:justify-between">
                <div>
                  <p className="mb-2 text-sm font-medium uppercase tracking-wide text-slate-500">
                    Opened lecture
                  </p>
                  <h2 className="text-3xl font-bold tracking-tight md:text-4xl">
                    {activeLecture?.title}
                  </h2>
                  <p className="mt-2 max-w-2xl text-slate-600">
                    Select a lecture from the left menu, then choose what kind of study material you want to view.
                  </p>
                </div>

                <div className="w-full md:w-72">
                  <label className="mb-2 block text-sm font-medium text-slate-700">
                    Choose study mode
                  </label>
                  <div className="relative">
                    <select
                      value={selectedContentType}
                      onChange={(event) => setSelectedContentType(event.target.value)}
                      className="w-full appearance-none rounded-2xl border border-slate-300 bg-white px-4 py-3 pr-10 text-sm font-medium outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
                    >
                      {contentTypes.map((content) => (
                        <option key={content.value} value={content.value}>
                          {content.label}
                        </option>
                      ))}
                    </select>
                    <ChevronDown className="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-500" />
                  </div>
                </div>
              </div>
            </section>

            <section className="grid gap-6 lg:grid-cols-[1fr_280px]">
              <Card className="rounded-3xl border-slate-200 shadow-sm">
                <CardContent className="p-6 md:p-8">
                  <div className="mb-6 flex items-start gap-4">
                    <div className="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-2xl bg-slate-900 text-white mt-1">
                      <ActiveIcon className="h-6 w-6" />
                    </div>
                    <div className="min-w-0 flex-1">
                      <h3 className="truncate text-xl font-semibold tracking-tight md:text-2xl">{activeContent?.heading}</h3>
                      <p className="truncate text-sm text-slate-500">{activeLecture?.title}</p>
                    </div>
                  </div>

                  <div className="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-6">
                    <p className="mb-4 text-base leading-7 text-slate-700">
                      {selectedContentType === "notes" && "Start by reading the complete lecture notes to understand all concepts."}
                      {selectedContentType === "flashcards" && `Practice with ${currentFlashcards.length} interactive flashcards for quick revision.`}
                      {selectedContentType === "testing" && "Test your knowledge with exam-style questions and MCQs."}
                    </p>
                    <div className="flex items-center gap-3">
                      <Button
                        onClick={handleOpenContent}
                        className="rounded-xl bg-slate-900 px-6 py-2 text-sm font-medium text-white hover:bg-slate-800"
                      >
                        Open {activeContent?.label}
                      </Button>
                      {selectedContentType === "flashcards" && (
                        <span className="text-sm text-slate-600">
                          {currentFlashcards.length} cards available
                        </span>
                      )}
                    </div>
                  </div>
                </CardContent>
              </Card>

              <div className="space-y-4">
                <Card className="rounded-3xl border-slate-200 shadow-sm">
                  <CardContent className="p-6">
                    <div className="mb-4 flex items-center justify-between">
                      <p className="text-sm font-semibold text-slate-900">Lecture {selectedLecture} Progress</p>
                      <Button
                        variant="ghost"
                        size="sm"
                        onClick={() => setProgressMenuOpen(true)}
                        className="h-8 gap-2 rounded-lg text-xs"
                      >
                        <BarChart3 className="h-4 w-4" />
                        All Progress
                      </Button>
                    </div>
                    <div className="space-y-3">
                      <button
                        onClick={() => toggleProgress(selectedLecture, 'notes')}
                        className="flex w-full items-center gap-3 rounded-lg p-2 text-left transition hover:bg-slate-50"
                      >
                        {progress[selectedLecture]?.notes ? (
                          <CheckSquare className="h-5 w-5 flex-shrink-0 text-emerald-600" />
                        ) : (
                          <Square className="h-5 w-5 flex-shrink-0 text-slate-300" />
                        )}
                        <div className="min-w-0 flex-1">
                          <p className="truncate text-sm font-medium text-slate-900">Notes</p>
                          <p className="text-xs text-slate-500">Read all material</p>
                        </div>
                      </button>
                      
                      <button
                        onClick={() => toggleProgress(selectedLecture, 'flashcards')}
                        className="flex w-full items-center gap-3 rounded-lg p-2 text-left transition hover:bg-slate-50"
                      >
                        {progress[selectedLecture]?.flashcards ? (
                          <CheckSquare className="h-5 w-5 flex-shrink-0 text-emerald-600" />
                        ) : (
                          <Square className="h-5 w-5 flex-shrink-0 text-slate-300" />
                        )}
                        <div className="min-w-0 flex-1">
                          <p className="truncate text-sm font-medium text-slate-900">Flashcards</p>
                          <p className="text-xs text-slate-500">Practice all cards</p>
                        </div>
                      </button>
                      
                      <button
                        onClick={() => toggleProgress(selectedLecture, 'testing')}
                        className="flex w-full items-center gap-3 rounded-lg p-2 text-left transition hover:bg-slate-50"
                      >
                        {progress[selectedLecture]?.testing ? (
                          <CheckSquare className="h-5 w-5 flex-shrink-0 text-emerald-600" />
                        ) : (
                          <Square className="h-5 w-5 flex-shrink-0 text-slate-300" />
                        )}
                        <div className="min-w-0 flex-1">
                          <p className="truncate text-sm font-medium text-slate-900">Testing</p>
                          <p className="text-xs text-slate-500">Complete exam prep</p>
                        </div>
                      </button>
                    </div>
                  </CardContent>
                </Card>

                <Card className="rounded-3xl border-slate-200 shadow-sm">
                  <CardContent className="p-6">
                    <p className="text-sm font-semibold text-slate-900">Study workflow</p>
                    <div className="mt-4 space-y-2 text-sm text-slate-600">
                      <div className="flex items-center gap-2">
                        <div className={`h-2 w-2 rounded-full ${selectedContentType === 'notes' ? 'bg-slate-900' : 'bg-slate-300'}`} />
                        <span>Read notes</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className={`h-2 w-2 rounded-full ${selectedContentType === 'flashcards' ? 'bg-slate-900' : 'bg-slate-300'}`} />
                        <span>Practice flashcards</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className={`h-2 w-2 rounded-full ${selectedContentType === 'testing' ? 'bg-slate-900' : 'bg-slate-300'}`} />
                        <span>Test yourself</span>
                      </div>
                    </div>
                  </CardContent>
                </Card>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
  );
}

        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(LectureStudyDashboard));
    </script>
</body>
</html>
