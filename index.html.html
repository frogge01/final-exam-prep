# Lecture 5: Migration and Transport Using Motor Proteins

## Complete Exam Study Notes

These notes explain the cytoskeleton, motor proteins, and cellular migration in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers the three major cytoskeletal systems, the motor proteins that move cargo along them, and the critical role of these processes in neuronal function and cell migration.

# 1. Cytoskeleton Overview

The cytoskeleton is a dynamic network of protein filaments that provides structural support to cells, enables cellular movement, organizes organelles, and serves as tracks for intracellular transport. Far from being a static scaffold, the cytoskeleton is constantly remodeling in response to cellular needs and signals.

## 1.1 Three Main Components

The cytoskeleton consists of three distinct types of filaments, each with unique properties and functions. Microtubules are the largest, with a diameter of approximately 25 nanometers. They are hollow tubes constructed from heterodimers of alpha-tubulin and beta-tubulin. Microtubules are the most dynamic of the three filament types, capable of rapid assembly and disassembly. Their polymerization depends on GTP. They are rigid and resist bending. Their functions include maintaining cell shape, serving as tracks for intracellular transport, and forming the mitotic spindle during cell division.

Actin filaments, also called microfilaments, have a diameter of approximately 7 nanometers. They are thin, flexible helical polymers of actin monomers. Their polymerization depends on ATP. Actin is the most abundant protein in many cell types. Actin filaments function in cell movement, muscle contraction, and cytokinesis.

Intermediate filaments have a diameter of approximately 10 nanometers, falling between microtubules and actin filaments in size. They are rope-like fibers constructed from various proteins depending on cell type. Intermediate filaments are the most stable and least dynamic of the three types. Unlike microtubules and actin, they do not bind nucleotides. Their primary functions are providing mechanical strength and maintaining tissue integrity.

## 1.2 Overall Functions

The cytoskeleton serves multiple essential cellular functions. It provides structural support by maintaining cell shape, providing mechanical strength, resisting deformation, and anchoring organelles in specific positions.

Intracellular transport is another critical function. Motor proteins walk along microtubules and actin filaments, delivering organelles, vesicles, and proteins to specific cellular locations. This is especially critical in neurons, where materials must travel long distances.

During cell division, the cytoskeleton plays essential roles. The mitotic spindle, composed of microtubules, separates chromosomes. The contractile ring, composed of actin and myosin, divides the cell during cytokinesis.

Cell migration requires coordinated protrusion, adhesion, and contraction, all driven by the cytoskeleton. This is important in development, wound healing, and immune responses.

Finally, the cytoskeleton participates in cellular signaling. It provides scaffolds for signaling complexes and participates in mechanotransduction, the process of converting physical forces into biochemical signals.

# 2. Microtubules: Structure and Dynamics

Microtubules are the largest cytoskeletal filaments and serve as tracks for motor protein transport. Understanding their structure and dynamic behavior is essential for understanding how cells organize their internal contents.

## 2.1 Structure

The basic building block of a microtubule is the tubulin heterodimer. This consists of alpha-tubulin and beta-tubulin bound tightly together. Both proteins can bind GTP. These heterodimers stack head-to-tail, forming linear protofilaments. Thirteen protofilaments then associate side-by-side and wrap into a hollow cylindrical tube. The outer diameter is approximately 25 nanometers, and the inner diameter is approximately 15 nanometers.

Microtubule polarity is a critical concept. Because tubulin heterodimers are oriented in the same direction along the protofilament, the microtubule as a whole has structural polarity. The minus end exposes alpha-tubulin and grows slowly. The plus end exposes beta-tubulin and grows rapidly. This polarity is crucial because it determines which direction motor proteins move along the microtubule.

## 2.2 Dynamic Instability

Microtubules can rapidly switch between phases of growth and shrinkage, a phenomenon called dynamic instability. This behavior depends on the GTP cap. When beta-tubulin is free in solution, it binds GTP. After a GTP-bound tubulin is added to the microtubule, the GTP is hydrolyzed to GDP. However, the very tip of a growing microtubule typically retains GTP-bound tubulin, forming a stabilizing cap.

If the GTP cap is lost, the microtubule undergoes catastrophe, meaning rapid depolymerization. An entire microtubule can shrink in seconds. Conversely, if new GTP-bound tubulin is added and restores the cap, the microtubule undergoes rescue and switches back to growth.

This dynamic instability matters for several reasons. It allows rapid reorganization of the microtubule network in response to cellular needs. It is essential for mitotic spindle dynamics during cell division. It also allows growth cones at the tips of developing neurons to explore their environment.

## 2.3 Organization

In most animal cells, microtubules are organized by the centrosome, which serves as the microtubule-organizing center, or MTOC. The centrosome contains a pair of centrioles surrounded by pericentriolar material. Within this material, gamma-tubulin ring complexes nucleate new microtubules. The minus ends of microtubules are anchored at the centrosome, while the plus ends radiate outward toward the cell periphery.

Neurons have a specialized organization. In axons, microtubules have uniform polarity, with their plus ends pointing toward the synapse. In dendrites, microtubules have mixed polarity. This organization is critical for directed cargo delivery within neurons.

# 3. Actin Filaments

Actin filaments are thin, flexible polymers that play central roles in cell movement and shape changes. Actin monomers polymerize in an ATP-dependent manner to form helical filaments. Like microtubules, actin filaments are polar, with a fast-growing plus end and a slower-growing minus end. The Arp2/3 complex can nucleate branched actin networks, which are particularly important for forming cellular protrusions during migration.

# 4. Intermediate Filaments

Intermediate filaments provide mechanical strength and are particularly important in tissues that experience mechanical stress. Unlike microtubules and actin, intermediate filaments do not have intrinsic polarity and do not use nucleotide hydrolysis. Different cell types express different intermediate filament proteins. For example, neurons express neurofilaments, epithelial cells express keratins, and the nuclear lamina is composed of lamins, which are type V intermediate filament proteins.

# 5. Motor Proteins: Kinesin

Kinesin is a motor protein that moves cargo from the minus end to the plus end of microtubules. This is called anterograde transport. In neurons, this means kinesin carries cargo from the cell body, or soma, toward the synapse, delivering fresh organelles and materials needed for synaptic function.

## 5.1 Structure

Kinesin has three main structural domains. The two motor heads, which are heavy chains, bind and hydrolyze ATP for energy. They also bind to the microtubule and generate force through ATP-driven conformational changes. The stalk is a coiled-coil structure that connects the motor heads to the tail. The tail, composed of light chains, binds cargo either directly or through adaptor proteins.

## 5.2 Walking Mechanism

Kinesin moves along microtubules using a hand-over-hand mechanism. Initially, one head is bound to the microtubule with ADP in its active site. When ATP binds to this head, a conformational change occurs. The second head swings forward approximately 16 nanometers and binds to the microtubule. The first head then releases and swings forward past the second head. This cycle repeats processively. Kinesin can take over one hundred steps before detaching from the microtubule. Its speed is approximately one micrometer per second.

## 5.3 Cargo

Kinesin transports various types of cargo. Mitochondria are especially important cargo in neurons, where they must be delivered to synapses that have high energy demands. Kinesin also transports vesicles derived from the endoplasmic reticulum and Golgi, synaptic vesicle precursors, mRNA-protein complexes, and signaling molecules.

# 6. Motor Proteins: Dynein

Dynein is a motor protein that moves cargo from the plus end to the minus end of microtubules. This is called retrograde transport. In neurons, dynein carries cargo from the synapse back toward the soma, returning old or damaged organelles for degradation or recycling.

## 6.1 Types of Dynein

There are two main types of dynein. Cytoplasmic dynein is responsible for cargo transport within cells. It requires the dynactin complex as a cofactor. Dynactin links dynein to cargo and increases the processivity of dynein movement. Axonemal dynein powers the beating of cilia and flagella by sliding microtubule doublets past each other.

## 6.2 Cargo

Dynein transports old or damaged mitochondria back to the soma for degradation. It also carries signaling endosomes, neurotrophic factors such as BDNF and NGF, autophagosomes, and lysosomes.

## 6.3 Balance Between Motors Is Critical

Often, both kinesin and dynein bind to the same cargo, such as a mitochondrion. These motors engage in a molecular tug-of-war. Local signals activate one motor over the other, determining the net direction of movement. The positioning of organelles depends critically on this balance.

For example, fresh mitochondria in neurons have kinesin dominance, so they move toward the synapse and are positioned at sites with high energy demand. When mitochondria become damaged, dynein becomes dominant, and they are returned to the soma for degradation.

# 7. Microtubule-Associated Proteins

Microtubule-associated proteins, or MAPs, bind to microtubules and regulate their dynamics, stability, and interactions with other proteins. The most important MAP for understanding disease is tau protein, which will be discussed in detail in the next section.

# 8. Tau Protein and Neurodegenerative Disease

Tau is the most important microtubule-associated protein in the context of human disease. Its dysfunction is central to Alzheimer's disease and several other neurodegenerative disorders.

## 8.1 Normal Tau Function

Tau is a microtubule-associated protein with a relatively low molecular weight, ranging from 55 to 62 kilodaltons. There are six isoforms of tau in the human brain, which differ in the number of microtubule-binding repeats they contain. These isoforms have either three or four microtubule-binding repeats.

Tau is found primarily in neurons and is concentrated in axons rather than dendrites. The dendritic equivalent of tau is a different MAP called MAP2.

Under normal conditions, tau stabilizes microtubules. It promotes microtubule assembly, regulates spacing between microtubules, and modulates interactions between microtubules and motor proteins.

## 8.2 Tau in Alzheimer's Disease

In Alzheimer's disease, tau undergoes a pathological cascade that leads to neuronal dysfunction and death. Understanding this cascade is essential for understanding Alzheimer's pathology.

The first step is hyperphosphorylation. Tau becomes excessively phosphorylated at many sites. This occurs because certain kinases, particularly GSK-3beta and CDK5, are overactive. At the same time, protein phosphatase 2A, or PP2A, which normally removes phosphate groups, has reduced activity. This imbalance leads to hyperphosphorylated tau.

In the second step, hyperphosphorylated tau detaches from microtubules. Hyperphosphorylated tau cannot bind to microtubules effectively. It falls off into the cytoplasm. Without tau stabilization, microtubules become unstable and begin to disassemble. The transport tracks are lost.

The third step involves aggregation. Free tau in the cytoplasm begins to aggregate. Tau oligomers form first. These oligomers are believed to be the most toxic species. Oligomers then assemble into paired helical filaments, abbreviated PHFs. These paired helical filaments bundle together to form neurofibrillary tangles, or NFTs.

The fourth step is cellular dysfunction. The microtubule network is disrupted, leading to transport failure. Mitochondria cannot reach synapses. Synaptic dysfunction develops, and energy becomes depleted.

The fifth and final step is neuronal death. Synapses are lost first. Neurons eventually die. Brain tissue atrophies, and cognitive decline becomes severe.

Neurofibrillary tangles are a hallmark of Alzheimer's disease and other tauopathies. Their presence and distribution correlate with disease severity.

## 8.3 Other Tauopathies

Besides Alzheimer's disease, tau pathology is central to several other neurodegenerative diseases. These include frontotemporal dementia, which can be caused by mutations in the tau gene itself; progressive supranuclear palsy; chronic traumatic encephalopathy, which results from repeated head trauma; and corticobasal degeneration.

# 9. Axonal Transport in Neurons

## 9.1 Why It Is Critical

Neurons are unique cells with extremely long axons. Some axons can extend up to one meter in humans. Protein synthesis occurs in the soma, or cell body, but the synapse is located far away at the end of the axon. Diffusion is far too slow to deliver materials over such distances. If cells relied on diffusion alone, it would take years for proteins to reach the synapse. The solution is active motor-driven transport.

## 9.2 Bidirectional Transport

Axonal transport is bidirectional. Anterograde transport, driven by kinesin, moves from the soma toward the synapse at speeds of 50 to 400 millimeters per day. This transport delivers fresh mitochondria, synaptic vesicle components, membrane proteins, and neurotransmitter synthesis enzymes.

Retrograde transport, driven by dynein, moves from the synapse back toward the soma at speeds of 50 to 300 millimeters per day. This transport returns old or damaged mitochondria, signaling endosomes, neurotrophic factors such as BDNF and NGF, and materials destined for degradation.

## 9.3 Transport Defects in Disease

Several factors can cause axonal transport defects. Microtubule disruption, such as that caused by tau pathology, eliminates the tracks. Mutations in motor proteins can impair their function. Impaired cargo binding prevents proper loading of transport vesicles. Energy depletion can prevent motors from functioning.

The consequences of transport failure are severe. Organelles become mislocalized. Synaptic energy failure occurs when mitochondria cannot reach their destinations. Damaged components accumulate because they cannot be returned for degradation. Synaptic dysfunction develops and eventually leads to neuronal death.

Several diseases involve axonal transport defects. In Alzheimer's disease, tau-mediated transport failure is a major contributor to neurodegeneration. In amyotrophic lateral sclerosis, or ALS, mutations in dynein and kinesin have been identified. Hereditary spastic paraplegia involves motor protein defects. Charcot-Marie-Tooth disease is a peripheral neuropathy with transport abnormalities.

# 10. Cell Migration and Focal Adhesions

Cell migration is a coordinated process involving the cytoskeleton, adhesion molecules, and motor proteins. Understanding the steps of migration is important for understanding development, wound healing, immune responses, and cancer metastasis.

## 10.1 The Four Steps of Migration

The first step is protrusion at the leading edge. Actin polymerizes at the front of the cell. The Arp2/3 complex creates branched actin networks. These networks form lamellipodia, which are sheet-like protrusions, and filopodia, which are finger-like protrusions. These structures push the membrane forward.

The second step is adhesion. Integrins, which are transmembrane receptors, bind to the extracellular matrix. Focal adhesions form at these sites. Talin links integrins to actin filaments. Vinculin strengthens the connection. Alpha-actinin crosslinks actin filaments. These adhesions provide traction that allows the cell to pull itself forward.

The third step is contraction. Myosin II, a motor protein, generates contractile force. It pulls on actin stress fibers that span the cell. This creates tension across the entire cell and drags the cell body forward.

The fourth step is retraction at the rear. Rear adhesions disassemble. Actin filaments depolymerize. The rear of the cell retracts, and the migration cycle repeats.

## 10.2 Role of Microtubules

Microtubules also participate in cell migration. They extend into the protrusions at the leading edge and provide stability. They guide the direction of migration. They deliver signals to the leading edge. They target focal adhesions for turnover, allowing controlled release of rear attachments.

# 11. RhoGTPase Signaling Pathways

RhoGTPases are master regulators of the cytoskeleton. They control actin dynamics, cell shape, and migration. Three RhoGTPases are particularly important: RhoA, Rac1, and Cdc42.

## 11.1 The Three Main Players

RhoA, often working through its effector ROCK kinase, promotes stress fiber formation. It increases actomyosin contractility by activating ROCK, which phosphorylates myosin to trigger contraction. RhoA also promotes microtubule disassembly.

Rac1 promotes lamellipodia formation. It activates the Arp2/3 complex through the WAVE protein complex. This creates branched actin networks that drive protrusion at the leading edge.

Cdc42 promotes filopodia formation. It establishes cell polarity and activates actin polymerization at specific sites, creating the finger-like filopodial protrusions.

## 11.2 Coordination in Migration

During cell migration, these RhoGTPases are spatially organized. At the front of a migrating cell, Rac1 is active, promoting lamellipodia extension. Cdc42 is also active, with filopodia sensing the environment. At the rear of the cell, RhoA is active, promoting contraction and retraction.

The balance among these GTPases is critical. Proper front-rear coordination results in efficient migration. An imbalance leads to impaired movement or abnormal cell morphology.

# 12. Cytoskeleton in Different Cell Types

Different cell types have specialized cytoskeletal organizations. Neurons have highly polarized microtubule arrays in their axons and dendrites. Muscle cells contain highly organized contractile arrays of actin and myosin. Epithelial cells have circumferential actin belts that maintain tissue integrity. Red blood cells have a spectrin-based cytoskeleton that provides flexibility. Each cell type adapts the basic cytoskeletal components to meet its specific functional needs.

# 13. Disease Connections

Defects in the cytoskeleton and motor proteins contribute to many diseases. Alzheimer's disease involves tau pathology leading to microtubule instability and transport failure. Amyotrophic lateral sclerosis involves motor protein mutations. Cancer cells often have abnormal cytoskeletal regulation that promotes metastasis. Muscular dystrophies can involve defects in intermediate filaments or their associated proteins. Understanding cytoskeletal biology is therefore central to understanding many human diseases.

# 14. Summary: Must-Know Facts

The cytoskeleton consists of three main types of filaments. Microtubules have a diameter of 25 nanometers and are composed of tubulin. They are dynamic and serve as transport tracks. Actin filaments have a diameter of 7 nanometers. They are flexible and mediate movement. Intermediate filaments have a diameter of 10 nanometers. They are the most stable and provide mechanical strength.

Microtubule polarity is critical. The minus end is slow-growing and is typically located at the centrosome. The plus end is fast-growing and extends toward the cell periphery. This polarity determines the direction in which motor proteins move.

Kinesin moves in the anterograde direction, from minus to plus. In neurons, this means toward the synapse. Kinesin delivers fresh organelles, especially mitochondria. It has two motor heads that walk hand-over-hand along the microtubule.

Dynein moves in the retrograde direction, from plus to minus. In neurons, this means toward the soma. Dynein returns old or damaged organelles. It requires the dynactin complex as a cofactor. Dynein also participates in mitosis and powers cilia movement.

Tau protein is a microtubule-associated protein that stabilizes neuronal microtubules. In Alzheimer's disease, tau becomes hyperphosphorylated, detaches from microtubules, and aggregates. It forms paired helical filaments and neurofibrillary tangles. This causes microtubule instability, transport failure, and ultimately neuronal death.

Axonal transport is critical for neuron survival because of the long distances involved. Anterograde transport delivers supplies to the synapse. Retrograde transport returns waste and signals to the soma. Defects in axonal transport cause neurodegeneration.

Cell migration involves four steps. First is protrusion, driven by actin polymerization. Second is adhesion, mediated by integrins and focal adhesions. Third is contraction, generated by myosin II. Fourth is retraction, in which rear adhesions are released and the rear retracts.

RhoGTPases coordinate cytoskeletal dynamics. RhoA and ROCK promote contraction, stress fibers, and microtubule disassembly. Rac1 promotes lamellipodia and protrusion. Cdc42 promotes filopodia and establishes polarity.

# 15. Exam-Style Questions You Might See

## Question 1: Explain the directionality of kinesin and dynein and why this matters in neurons.

Kinesin moves in the anterograde direction, from minus to plus, which means toward the synapse in neurons. It delivers fresh mitochondria and other organelles. Dynein moves in the retrograde direction, from plus to minus, which means toward the soma. It returns old or damaged organelles. The balance between these motors determines organelle positioning. This is critical for synaptic function and neuronal homeostasis.

## Question 2: Describe the pathological cascade of tau in Alzheimer's disease.

First, tau becomes hyperphosphorylated because GSK-3beta and CDK5 are overactive while PP2A activity is reduced. Second, hyperphosphorylated tau detaches from microtubules, causing microtubule instability. Third, free tau aggregates, forming oligomers, then paired helical filaments, and finally neurofibrillary tangles. Fourth, transport fails because the microtubule tracks are disrupted. Fifth, synaptic dysfunction and neuronal death occur. Neurofibrillary tangles are a hallmark of Alzheimer's disease.

## Question 3: What are the four steps of cell migration?

First is protrusion, in which actin polymerization forms lamellipodia and filopodia. Second is adhesion, in which integrins bind the extracellular matrix and focal adhesions form. Third is contraction, in which myosin II generates force. Fourth is retraction, in which rear adhesions release and the rear retracts. These steps require coordination of actin, myosin, and integrins.

## Question 4: How do RhoA and Rac1 have different effects on the cytoskeleton?

RhoA promotes stress fiber formation, actomyosin contractility, microtubule disassembly, and rear retraction during migration. Rac1 promotes lamellipodia formation, protrusion, and branched actin networks through the Arp2/3 complex. Both are needed for effective migration. Rac1 is active at the front to push the cell forward, while RhoA is active at the rear to pull and retract. The balance determines migration efficiency.

## Question 5: Why is axonal transport critical in neurons and what happens when it fails?

Neurons have extremely long axons, up to one meter in humans. Diffusion is far too slow to deliver materials over these distances. Motor proteins provide active transport. When transport fails, mitochondria cannot reach synapses, leading to energy depletion. Synaptic dysfunction develops, and neurons eventually die. This mechanism contributes to Alzheimer's disease, amyotrophic lateral sclerosis, and hereditary spastic paraplegia.

## Question 6: Compare the three types of cytoskeletal filaments.

Microtubules are 25 nanometers in diameter, composed of tubulin, and are GTP-dependent. They are the most dynamic and serve as transport tracks. Actin filaments are 7 nanometers in diameter, composed of actin, and are ATP-dependent. They are flexible and mediate cell movement. Intermediate filaments are 10 nanometers in diameter, composed of various proteins depending on cell type, and do not use nucleotides. They are the most stable and provide mechanical strength. Each type has distinct composition, dynamics, and functions.

# Final Exam Focus

For the final exam, focus on understanding motor protein directionality, specifically that kinesin moves from minus to plus toward the synapse while dynein moves from plus to minus toward the soma. Master the tau pathology cascade, from hyperphosphorylation through detachment, aggregation, and neurofibrillary tangle formation. Understand why axonal transport is critical in neurons and what happens when it fails. Know the four steps of cell migration and how they are coordinated. Finally, understand how RhoGTPases regulate the cytoskeleton, with RhoA promoting contraction and Rac1 promoting protrusion.`,

# Lecture 6: Alteration of Lysosomal Function in Diseases

## Complete Exam Study Notes

These notes explain lysosomal function and lysosomal storage disorders in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture focuses on lysosome structure and function, autophagy pathways, and Gaucher disease as the primary example of a lysosomal storage disorder, including its cellular mechanisms and connections to mitochondrial dysfunction.

# 1. Lysosomes: Structure and Function

Lysosomes are membrane-bound organelles that contain acid hydrolases. These enzymes degrade proteins, lipids, nucleic acids, and carbohydrates. Lysosomes serve as the cell's primary degradation machinery, breaking down worn-out cellular components and materials taken up from outside the cell.

## 1.1 Structure

Lysosomes are single membrane-bound organelles with diameters ranging from 0.1 to 1.2 micrometers. They are found in all eukaryotic cells and are particularly abundant in phagocytic cells such as macrophages.

The luminal environment inside the lysosome is highly acidic, with a pH of approximately 4.5 to 5.0. This contrasts sharply with the cytoplasm, which has a pH of approximately 7.2. The acidity is maintained by V-ATPase, a proton pump that uses ATP to pump hydrogen ions into the lumen.

## 1.2 Contents

Lysosomes contain more than sixty different acid hydrolases. These include proteases that degrade proteins, lipases that degrade lipids, nucleases that degrade DNA and RNA, glycosidases that degrade carbohydrates, phosphatases that remove phosphate groups, and sulfatases that remove sulfate groups.

These enzymes are called acid hydrolases because they have optimal activity at acidic pH, around pH 5. They are much less active at neutral pH. This serves as an important safety mechanism. If a lysosome ruptures and releases its contents into the cytoplasm, the enzymes remain largely inactive at the neutral cytoplasmic pH, limiting potential damage.

## 1.3 Functions

Lysosomes perform several essential functions. First, they degrade macromolecules. They break down worn-out organelles, digest engulfed particles such as bacteria and cell debris, recycle cellular components, and release building blocks such as amino acids and sugars for reuse.

Second, lysosomes are central to autophagy, the self-eating process by which cells degrade their own components. Autophagy removes damaged organelles such as mitochondria and endoplasmic reticulum, clears protein aggregates, and provides nutrients during starvation by recycling cellular components for energy.

Third, lysosomes participate in phagocytosis. Immune cells engulf pathogens into phagosomes, which then fuse with lysosomes to form phagolysosomes. Inside this compartment, bacteria are degraded.

Fourth, lysosomes handle endocytosed material. When cells take up material from outside through endocytosis, the endosome matures and eventually fuses with a lysosome. The endocytosed contents are then degraded.

Fifth, lysosomes participate in plasma membrane repair. They can fuse with the plasma membrane to repair damage, providing membrane material to patch holes.

# 2. Lysosomal Biogenesis

A critical question for understanding lysosomal function is how lysosomal enzymes reach the lysosome. These enzymes must be specifically targeted to lysosomes rather than being secreted or sent to other cellular compartments.

## 2.1 The Mannose-6-Phosphate Pathway

The targeting of lysosomal enzymes depends on the mannose-6-phosphate pathway, often abbreviated M6P pathway. This pathway begins with synthesis. Lysosomal enzymes are synthesized in the endoplasmic reticulum and then transported to the Golgi apparatus.

In the cis-Golgi, an enzyme called N-acetylglucosamine phosphotransferase adds a tag to these proteins. This tag consists of mannose-6-phosphate residues. M6P serves as the lysosomal targeting signal.

M6P receptors in the trans-Golgi recognize the M6P-tagged enzymes and bind to them. The enzyme-receptor complexes are then packaged into clathrin-coated vesicles that bud from the Golgi.

These vesicles transport the enzymes to early or late endosomes. The acidic pH in the endosome causes the enzyme to release from its receptor. The receptor is recycled back to the Golgi for reuse, while the enzyme remains in the endosome.

Finally, the late endosome matures into a lysosome. This involves further acidification and accumulation of additional hydrolases. The result is a fully functional lysosome.

This pathway is critical for lysosomal function. Defects in M6P tagging cause lysosomal enzymes to be secreted from the cell instead of being properly targeted to lysosomes. This can lead to lysosomal storage diseases.

# 3. Autophagy Pathways

Autophagy, meaning self-eating, is the process by which cells degrade their own components through lysosomes. This is essential for cellular homeostasis, allowing cells to remove damaged organelles, recycle nutrients during starvation, and maintain quality control over proteins and other macromolecules.

## 3.1 Three Types of Autophagy

There are three main types of autophagy. Macroautophagy is the most common and is usually what people mean when they simply say autophagy. It involves the formation of a double-membrane structure called an autophagosome that engulfs cytoplasmic material. The autophagosome then fuses with a lysosome to form an autolysosome, where the contents are degraded.

Microautophagy involves direct engulfment of material by the lysosome itself. The lysosomal membrane invaginates and pinches off vesicles inside the lysosome.

Chaperone-mediated autophagy is highly selective. Chaperone proteins recognize specific proteins containing a KFERQ motif. These proteins are then unfolded and translocated directly across the lysosomal membrane.

## 3.2 Macroautophagy Mechanism

Macroautophagy proceeds through several well-defined steps. Initiation is triggered by starvation, stress, or the presence of damaged organelles. A key event is inhibition of mTOR, which normally suppresses autophagy. When mTOR is inhibited, the ULK1 complex becomes activated. A PI3K complex containing VPS34 generates PIP3, which helps recruit other autophagy machinery.

During nucleation, an isolation membrane, also called a phagophore, begins to form. This membrane can originate from several sources including the endoplasmic reticulum, mitochondria, or plasma membrane.

Elongation and closure involve recruitment of ATG proteins. The ATG12-ATG5-ATG16L complex is assembled. A critical protein called LC3, which stands for microtubule-associated protein 1 light chain 3, is converted from its LC3-I form to LC3-II. LC3-II is a lipidated form that incorporates into the autophagosome membrane. The membrane expands to engulf cargo and then closes to form a complete double-membrane autophagosome.

Fusion occurs when the autophagosome fuses with a lysosome, forming an autolysosome. Finally, degradation proceeds as lysosomal hydrolases break down the autophagosome contents. Amino acids, fatty acids, and nucleotides are released and can be recycled for biosynthesis or used for energy.

## 3.3 Selective Autophagy

Autophagy can be selective for specific cargo. Mitophagy is the selective removal of mitochondria, which will be covered in detail in Lecture 10 with the PINK1/Parkin pathway. ER-phagy removes endoplasmic reticulum. Pexophagy removes peroxisomes. Aggrephagy removes protein aggregates.

## 3.4 Regulation by mTOR

mTOR, which stands for mechanistic target of rapamycin, is the master regulator of autophagy. When mTOR is active, autophagy is inhibited. This occurs when nutrients are abundant. When mTOR is inactive, autophagy is activated. This occurs during starvation.

Several compounds can activate autophagy. Rapamycin is an mTOR inhibitor. Low doses of lithium can induce autophagy. Valproic acid and verapamil also activate autophagy.

# 4. Lysosomal Storage Disorders Overview

Lysosomal storage disorders, often abbreviated LSDs, are genetic diseases caused by deficiency of lysosomal enzymes. This leads to accumulation of undegraded substrates inside lysosomes.

## 4.1 Common Features

There are over fifty different lysosomal storage disorders. Most are inherited in an autosomal recessive pattern. Each disorder is caused by deficiency of a specific lysosomal enzyme. Undigested material accumulates in lysosomes, causing them to enlarge. This leads to cellular dysfunction and progressive disease.

## 4.2 Major Categories

Lysosomal storage disorders can be grouped into several categories. Sphingolipidoses involve defective breakdown of sphingolipids. Gaucher disease, caused by glucocerebrosidase deficiency, is the most common example. Niemann-Pick disease results from sphingomyelinase deficiency. Tay-Sachs disease is caused by hexosaminidase A deficiency. Fabry disease results from alpha-galactosidase A deficiency.

Mucopolysaccharidoses, abbreviated MPS, involve accumulation of glycosaminoglycans. Hurler syndrome, or MPS I, is caused by alpha-L-iduronidase deficiency. Hunter syndrome, or MPS II, results from iduronate sulfatase deficiency.

Glycogen storage diseases affecting lysosomes include Pompe disease, which is caused by acid alpha-glucosidase deficiency and leads to glycogen accumulation.

This lecture focuses primarily on Gaucher disease, which is the most common lysosomal storage disorder.

# 5. Gaucher Disease: Complete Study

## 5.1 Basic Information

Gaucher disease is inherited in an autosomal recessive pattern. Both parents must be carriers for a child to be affected. Each child of two carrier parents has a twenty-five percent chance of being affected. The disease is caused by mutations in the GBA1 gene, which codes for the enzyme glucocerebrosidase.

Gaucher disease is the most common lysosomal storage disorder, occurring in approximately one in 40,000 to 60,000 births in the general population. It is much more common in the Ashkenazi Jewish population, where it occurs in approximately one in 850 individuals.

The enzyme deficiency in Gaucher disease involves glucocerebrosidase, also called beta-glucocerebrosidase or GCase. This is a lysosomal enzyme whose function is to break down glucocerebroside, also called glucosylceramide. The reaction is: glucocerebroside produces glucose plus ceramide, and this reaction requires glucocerebrosidase.

Without functional GCase, glucocerebroside accumulates in lysosomes. The accumulation is especially prominent in macrophages because these cells actively phagocytose cellular debris, which contains glycolipids including glucocerebroside. Macrophages become engorged with lipid. These enlarged, lipid-laden macrophages are called Gaucher cells.

## 5.2 Three Clinical Types

Gaucher disease is classified into three clinical types based on the presence and severity of neurological involvement.

Type 1 is non-neuronopathic and is the most common form, accounting for ninety percent of cases. There is no central nervous system involvement. Symptoms include hepatomegaly, or enlarged liver; splenomegaly, or enlarged spleen, often with hypersplenism; bone pain, which can be chronic or acute during bone crises; osteolytic lesions; pancytopenia, meaning low counts of all blood cell types; and easy bruising and bleeding. Onset can range from childhood to adulthood. Disease severity is variable. With treatment, patients can have a normal lifespan.

Type 2 is acute neuronopathic. It is rare but is the most severe form. Severe central nervous system involvement occurs. Onset is in infancy, typically before two years of age. Symptoms include neurodegeneration, seizures, abnormal eye movements, difficulty swallowing, and spasticity, in addition to the symptoms seen in Type 1. The disease is fatal by age two to four years.

Type 3 is chronic neuronopathic and represents an intermediate form. Central nervous system involvement occurs but progresses more slowly than in Type 2. Onset is in childhood. Patients have neurological symptoms in addition to Type 1 symptoms. Survival into adulthood is possible.

## 5.3 Gaucher Cells

Gaucher cells are enlarged macrophages, typically ranging from 20 to 100 micrometers in diameter. Their cytoplasm has a distinctive appearance often described as resembling wrinkled tissue paper or crumpled silk. The nucleus is displaced to one side, appearing eccentric. The cytoplasm is filled with accumulated glucocerebroside.

These cells stain positive with PAS, which stands for Periodic Acid-Schiff. This stain detects glycolipids. Gaucher cells are found primarily in bone marrow, which is the most common site for biopsy. They can also be found in liver, spleen, and lungs.

# 6. GBA1 versus GBA2 Enzymes

There are two different glucocerebrosidases in human cells: GBA1 and GBA2. Understanding the difference between these enzymes is critical for understanding Gaucher disease.

## 6.1 GBA1: Lysosomal Glucocerebrosidase

GBA1 is a lysosomal enzyme. It is located inside lysosomes. Its function is to break down glucocerebroside into glucose and ceramide. It has a pH optimum in the acidic range, around pH 5, which matches the lysosomal pH.

Deficiency of GBA1 causes Gaucher disease. When GBA1 is deficient, glucocerebroside accumulates in lysosomes, leading to all the pathological features of the disease.

## 6.2 GBA2: Cytosolic Glucocerebrosidase

GBA2 is a cytosolic enzyme. It is not located in lysosomes but rather in the cytoplasm and on the endoplasmic reticulum membrane. It also breaks down glucocerebroside, but it has a pH optimum at neutral pH, around pH 7, which matches the cytoplasmic pH. GBA2 is part of an alternative metabolic pathway.

In Gaucher disease, GBA2 is normal. There are no mutations in the GBA2 gene. GBA2 can partially compensate for GBA1 loss, but it cannot access the glucocerebroside that accumulates in lysosomes. It can only work on the cytosolic pool of glucocerebroside.

## 6.3 The Alternative Pathway

When GBA1 is deficient, glucocerebroside accumulates in lysosomes. Some of this accumulated material may leak to the cytosol. GBA2 can act on this cytosolic glucocerebroside, producing glucose and ceramide.

The ceramide produced can be further metabolized. Ceramidase can convert it to sphingosine. Sphingosine kinase then converts sphingosine to sphingosine-1-phosphate, abbreviated S1P.

S1P is an important signaling molecule. It binds to S1P receptors and affects cell survival, proliferation, and migration. The altered S1P signaling may contribute to some aspects of disease pathology.

An important exam tip: remember that GBA1 is the lysosomal enzyme that is deficient in Gaucher disease, while GBA2 is the cytosolic enzyme that provides an alternative pathway.

# 7. Pathological Mechanisms in Gaucher Disease

## 7.1 Primary Problem

The primary molecular problem in Gaucher disease is that GBA1 mutations reduce glucocerebrosidase activity. Glucocerebroside cannot be degraded efficiently. It accumulates progressively in lysosomes. The accumulation is especially prominent in macrophages, which actively take up cellular debris containing this lipid.

## 7.2 Cellular Consequences

Several cellular consequences follow from the primary defect. First, lysosomal enlargement occurs. Lysosomes swell with accumulated substrate. They can occupy most of the cell volume, creating the characteristic Gaucher cells.

Second, autophagy becomes impaired. The fusion between autophagosomes and lysosomes is impaired. Fewer autolysosomes form. As a result, damaged organelles cannot be properly degraded. p62, an autophagy adaptor protein, accumulates along with ubiquitinated proteins. The cellular proteostasis system becomes stressed.

Third, mitochondrial dysfunction develops. Mitochondrial membrane potential is reduced. Respiratory chain activity decreases. Oxygen consumption rate, abbreviated OCR, is reduced. Both basal and maximal respiration are impaired. Energy production becomes compromised.

Fourth, mitochondrial morphology becomes abnormal. Mitochondrial networks become fragmented rather than maintaining their normal tubular structure. The balance between fusion and fission is disrupted. Proteins involved in these processes are affected, including OPA1 and MFN2, which mediate fusion, and DRP1 and Fis1, which mediate fission.

Fifth, chronic inflammation develops. Gaucher cells release multiple cytokines including IL-1beta, IL-6, IL-13, TNF-alpha, IL-4, and CCL18. This chronic inflammatory state contributes to organ damage.

## 7.3 Organ-Level Pathology

At the organ level, several systems are affected. The spleen shows massive accumulation of Gaucher cells. Splenomegaly develops, and the spleen can become twenty to thirty times its normal size. Hypersplenism causes destruction of blood cells, leading to thrombocytopenia, or low platelet count, which causes bleeding problems.

The liver becomes infiltrated with Gaucher cells, leading to hepatomegaly and liver dysfunction. Bone marrow becomes replaced by Gaucher cells, impairing blood cell production. This causes anemia, leukopenia, and thrombocytopenia.

Bone problems are particularly severe. Bone infarcts occur when tissue dies due to lack of blood supply. Osteolytic lesions develop as bone is destroyed. Osteopenia and osteoporosis weaken bones. Patients experience chronic bone pain and acute bone crises. Fracture risk increases significantly. Avascular necrosis, especially of the femoral head, can occur.

Rarely, the lungs become involved, leading to restrictive lung disease.

# 8. Autophagy-Lysosome Dysfunction in Gaucher Disease

One of the key pathological mechanisms in Gaucher disease is dysfunction of the autophagy-lysosome axis. This represents a critical link between the primary lysosomal defect and broader cellular dysfunction.

## 8.1 Normal Autophagy-Lysosome Axis

Under normal conditions, the autophagy-lysosome axis functions smoothly. An autophagosome forms and engulfs cargo such as damaged organelles or protein aggregates. The autophagosome fuses with a lysosome to form an autolysosome. Cargo is degraded by lysosomal enzymes. The degradation products, including amino acids and other building blocks, are recycled.

## 8.2 Dysfunction in Gaucher Disease

In Gaucher disease, autophagosome-lysosome fusion is impaired. Fewer autolysosomes form. The mechanism is not fully understood but may involve several factors. Lipid accumulation may alter lysosomal membrane properties. pH regulation may be disrupted. SNARE proteins, which mediate membrane fusion, may not function properly. Rab GTPases, which regulate vesicle trafficking, may be defective.

The consequences are severe. Damaged mitochondria accumulate because they cannot be removed via mitophagy. These dysfunctional mitochondria produce less ATP and generate more reactive oxygen species. Protein aggregates accumulate. p62, also called SQSTM1, which is an autophagy adaptor protein, accumulates. Ubiquitinated proteins pile up. Endoplasmic reticulum stress develops.

## 8.3 Quality Control Failure

The overall result is a collapse of cellular proteostasis. The cell cannot degrade misfolded proteins effectively. It cannot remove damaged organelles. Cellular stress increases progressively. This may contribute to cell death.

This creates a vicious cycle. Lysosomal dysfunction leads to impaired autophagy. Impaired autophagy allows damaged mitochondria to accumulate. Dysfunctional mitochondria produce more cellular stress, which further impairs cellular function.

# 9. Mitochondrial Connections

An important concept in understanding Gaucher disease is that mitochondria are affected even though the primary defect is lysosomal. This illustrates the interconnected nature of organellar systems within cells.

## 9.1 Mitochondrial Phenotype in Gaucher Disease

Mitochondria in Gaucher disease cells show reduced function. Membrane potential is decreased. Respiratory chain activity is reduced, with complexes I, II, III, and IV potentially all impaired. ATP production becomes compromised.

Mitochondrial morphology is also altered. The normal tubular mitochondrial networks become fragmented. Mitochondria appear smaller and more spherical rather than maintaining their elongated structure.

The balance between fusion and fission is disrupted. Fission, mediated by DRP1 and Fis1, is increased. Fusion, mediated by MFN2 and OPA1, is decreased. The net result is fragmentation.

## 9.2 Mechanisms Linking Lysosomes to Mitochondria

Several mechanisms link lysosomal dysfunction to mitochondrial problems. First is impaired mitophagy. Under normal conditions, damaged mitochondria are removed through mitophagy, a selective form of autophagy. This process depends on the PINK1/Parkin pathway, which will be covered in detail in Lecture 10. Mitophagy requires autophagosome-lysosome fusion. In Gaucher disease, this fusion is impaired, so mitophagy fails. Damaged mitochondria accumulate rather than being cleared.

Second is lipid accumulation. Glucocerebroside accumulates not only in lysosomes but may also affect mitochondrial membranes. This can alter membrane properties and impair mitochondrial function.

Third is oxidative stress. Dysfunctional mitochondria produce excessive reactive oxygen species. ROS damage proteins, lipids, and DNA. This further impairs mitochondrial function, creating a vicious cycle.

Fourth is altered signaling. Sphingolipid metabolites such as ceramide and sphingosine-1-phosphate can affect mitochondria. They can trigger apoptotic pathways and affect mitochondrial dynamics.

## 9.3 Therapeutic Implications

Understanding these mitochondrial connections has therapeutic implications. Manipulating the fusion-fission machinery can partially rescue disease phenotypes in experimental models. Enhancing mitophagy could help clear damaged mitochondria. Antioxidants might reduce oxidative damage. These findings illustrate the interconnected nature of organellar systems in cells.

# 10. Clinical Features and Treatment

## 10.1 Clinical Presentation of Type 1 Gaucher Disease

Hematologic manifestations are common. Anemia causes fatigue and weakness. Thrombocytopenia leads to easy bruising and bleeding. Leukopenia increases susceptibility to infections.

Visceromegaly, meaning enlarged organs, is characteristic. Splenomegaly causes abdominal distention and early satiety because the enlarged spleen compresses the stomach. Hepatomegaly is also present.

Skeletal manifestations cause significant morbidity. Patients experience chronic bone pain as well as acute bone crises. Pathological fractures occur because bones are weakened. Children may have short stature. Avascular necrosis, particularly of the femoral head, can develop.

## 10.2 Diagnosis

Diagnosis begins with clinical suspicion based on the constellation of symptoms. An enzyme assay measuring glucocerebrosidase activity is diagnostic. Reduced GCase activity confirms the diagnosis. Genetic testing can identify specific GBA1 mutations. Bone marrow biopsy showing Gaucher cells provides additional confirmation.

## 10.3 Treatment Options

Enzyme replacement therapy, abbreviated ERT, involves intravenous infusion of recombinant glucocerebrosidase. Available drugs include imiglucerase, marketed as Cerezyme; velaglucerase alfa, marketed as VPRIV; and taliglucerase alfa, marketed as Elelyso. Treatment is typically given every two weeks.

ERT is very effective for Type 1 Gaucher disease. It reduces spleen and liver size, improves blood counts, and reduces bone pain. However, there is an important limitation. The enzyme does not cross the blood-brain barrier, so ERT has no effect on central nervous system symptoms. This means it cannot treat the neurological manifestations of Type 2 and Type 3 disease.

Substrate reduction therapy, abbreviated SRT, takes a different approach. It inhibits the synthesis of glucocerebroside. With less substrate produced, less accumulates. Available drugs include miglustat, marketed as Zavesca, and eliglustat, marketed as Cerdelga. These are oral medications and provide an alternative to ERT or can be used in patients who cannot receive intravenous therapy.

Supportive care is also important. Blood transfusions may be needed. Pain management addresses bone pain. Splenectomy can be performed in severe cases as a last resort. Orthopedic interventions may be needed for bone complications.

Experimental approaches under investigation include chaperone therapy to stabilize mutant enzyme, gene therapy, and autophagy enhancement.

# 11. Other Lysosomal Storage Disorders

Several other important lysosomal storage disorders exist. Tay-Sachs disease is caused by hexosaminidase A deficiency and leads to accumulation of GM2 ganglioside. It primarily affects neurons and causes severe neurodegeneration. A characteristic cherry-red spot appears in the retina. The disease is fatal in early childhood and is more common in the Ashkenazi Jewish population.

Niemann-Pick disease results from sphingomyelinase deficiency and causes accumulation of sphingomyelin. Types A and B are lysosomal diseases, while Type C involves a trafficking defect.

Fabry disease is caused by alpha-galactosidase A deficiency. Ceramide trihexoside accumulates. This is an X-linked disorder that affects kidneys, heart, skin, and nerves.

Krabbe disease results from beta-galactocerebrosidase deficiency, also called galactosylceramidase deficiency. Galactocerebroside accumulates, causing severe neurological disease.

Hurler syndrome, or MPS I, is caused by alpha-L-iduronidase deficiency. Dermatan and heparan sulfate accumulate. Patients develop coarse facial features and skeletal abnormalities.

# 12. Therapeutic Strategies

Therapeutic strategies for lysosomal storage disorders include enzyme replacement therapy, which provides the missing enzyme; substrate reduction therapy, which decreases production of the accumulating substrate; chaperone therapy, which stabilizes mutant enzymes; gene therapy, which corrects the genetic defect; and autophagy modulation, which enhances clearance of accumulated material.

# 13. Summary: Must-Know Facts

Lysosomes are acidic organelles with a pH of approximately 5. They contain more than sixty different hydrolases. The V-ATPase proton pump maintains the acidic pH. Lysosomes degrade proteins, lipids, nucleic acids, and carbohydrates. The mannose-6-phosphate pathway targets enzymes to lysosomes.

Autophagy involves macroautophagy, in which an autophagosome fuses with a lysosome to form an autolysosome. It is regulated by mTOR, which inhibits autophagy when active. Key proteins include ULK1, ATG proteins, and LC3. Autophagy removes damaged organelles and provides nutrients during starvation.

Lysosomal storage disorders are caused by genetic deficiency of lysosomal enzymes. Substrate accumulates in lysosomes. There are over fifty different disorders.

Gaucher disease is the most common lysosomal storage disorder. It is inherited in an autosomal recessive pattern. GBA1 mutations cause glucocerebrosidase deficiency. Glucocerebroside accumulates in macrophages, creating Gaucher cells.

There are three types of Gaucher disease. Type 1, representing ninety percent of cases, has no central nervous system involvement. It causes hepatosplenomegaly and bone disease. Type 2 is acute neuronopathic and fatal by age two to four. Type 3 is chronic neuronopathic.

GBA1 is the lysosomal enzyme that is deficient in Gaucher disease. GBA2 is a cytosolic enzyme that is normal in Gaucher disease and provides an alternative metabolic pathway.

Pathological mechanisms include lysosomal swelling, impaired autophagosome-lysosome fusion, mitochondrial dysfunction with reduced membrane potential and fragmentation, impaired mitophagy leading to accumulation of damaged mitochondria, accumulation of p62 and ubiquitinated proteins, and chronic inflammation.

Treatment includes enzyme replacement therapy using intravenous recombinant enzyme such as imiglucerase, and substrate reduction therapy using drugs such as eliglustat to reduce substrate synthesis. ERT is very effective for Type 1 but does not cross the blood-brain barrier and therefore has no central nervous system effect.

# 14. Exam-Style Questions You Might See

## Question 1: Describe the M6P pathway for targeting lysosomal enzymes.

Enzymes are synthesized in the endoplasmic reticulum and transported to the Golgi. N-acetylglucosamine phosphotransferase adds an M6P tag in the cis-Golgi. M6P receptors bind tagged enzymes in the trans-Golgi. Clathrin-coated vesicles transport enzyme-receptor complexes to endosomes. Acidic pH releases the enzyme from its receptor. The receptor is recycled while the enzyme stays. The endosome matures into a lysosome.

## Question 2: What is the genetic basis and biochemical defect in Gaucher disease?

Gaucher disease is autosomal recessive. Mutations in the GBA1 gene cause glucocerebrosidase deficiency. The enzyme cannot break down glucocerebroside to glucose plus ceramide. Glucocerebroside accumulates in lysosomes, especially in macrophages, creating Gaucher cells.

## Question 3: Explain the difference between GBA1 and GBA2.

GBA1 is lysosomal glucocerebrosidase with an acidic pH optimum. It is deficient in Gaucher disease. GBA2 is cytosolic glucocerebrosidase with a neutral pH optimum. It is normal in Gaucher disease and provides an alternative metabolic pathway. GBA2 can produce sphingosine, which is then converted to sphingosine-1-phosphate for signaling.

## Question 4: How does lysosomal dysfunction in Gaucher disease lead to mitochondrial problems?

Autophagosome-lysosome fusion is impaired, leading to fewer autolysosomes. Mitophagy fails, so damaged mitochondria accumulate. This results in reduced membrane potential, decreased respiratory chain activity, fragmented morphology, and increased reactive oxygen species production. The dysfunction links to altered fusion-fission proteins including DRP1, MFN2, and OPA1.

## Question 5: Describe the autophagy pathway and its regulation by mTOR.

Initiation occurs when mTOR is inhibited, activating the ULK1 complex. Nucleation involves formation of an isolation membrane. Elongation involves recruitment of ATG proteins and conversion of LC3-I to LC3-II, which is lipidated and incorporates into the autophagosome membrane. The membrane expands and closes to form an autophagosome. Fusion with a lysosome creates an autolysosome. Degradation occurs via acid hydrolases. When mTOR is active, autophagy is turned off because nutrients are present. When mTOR is inactive, autophagy is turned on during starvation.

## Question 6: What are the treatment options for Gaucher disease and their limitations?

Enzyme replacement therapy uses intravenous recombinant GCase such as imiglucerase, given every two weeks. It is very effective for Type 1, reducing organomegaly and bone disease. The limitation is that it does not cross the blood-brain barrier and therefore has no central nervous system effect. Substrate reduction therapy uses oral drugs such as eliglustat to reduce glucocerebroside synthesis. It provides an alternative for patients who cannot receive intravenous therapy.

# Final Exam Focus

For the final exam, focus on the M6P pathway for enzyme targeting, the fundamental facts about Gaucher disease including that it is caused by GBA1 mutations leading to glucocerebroside accumulation, the critical difference between GBA1 as the lysosomal enzyme and GBA2 as the cytosolic enzyme, how autophagy-lysosome dysfunction develops and its consequences, the connections between lysosomal dysfunction and mitochondrial problems including impaired mitophagy, and the treatment options with enzyme replacement therapy being highly effective for Type 1 but unable to cross the blood-brain barrier.`,
