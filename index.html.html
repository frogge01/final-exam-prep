# Lecture 10: Mitochondria - PINK1, Parkin, and Rotenone

## Complete Exam Study Notes

These notes explain mitochondrial quality control and Parkinson's disease in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers mitochondrial structure and function, oxidative phosphorylation, the critical importance of mitochondrial membrane potential, and the PINK1/Parkin pathway that removes damaged mitochondria through mitophagy. Understanding these mechanisms is essential because mutations in PINK1 and Parkin cause early-onset Parkinson's disease, and mitochondrial dysfunction is central to neurodegeneration.

# 1. Mitochondrial Structure and Function

Mitochondria are the powerhouses of the cell, generating ATP through oxidative phosphorylation. Mitochondrial dysfunction is central to Parkinson's disease and many other degenerative conditions.

## 1.1 Structure

Mitochondria have a distinctive double membrane structure. The outer mitochondrial membrane, abbreviated OMM, is permeable to small molecules and contains porins called VDACs. Between the outer and inner membranes lies the intermembrane space, abbreviated IMS.

The inner mitochondrial membrane, abbreviated IMM, is critically important and impermeable, forming a tightly sealed barrier. It contains the electron transport chain complexes. It is highly folded into structures called cristae, which increase surface area. The inner membrane also contains cardiolipin, a special lipid found almost exclusively in mitochondria.

The innermost compartment is the matrix. It contains mitochondrial DNA, which encodes some mitochondrial proteins. It is the site of the TCA cycle, also called the Krebs cycle. It also contains mitochondrial ribosomes for protein synthesis.

## 1.2 Functions

Mitochondria perform multiple essential cellular functions. ATP production through oxidative phosphorylation, abbreviated OXPHOS, generates approximately ninety percent of cellular ATP. This process couples electron transport to ATP synthesis.

Mitochondria are central to metabolism. The TCA cycle occurs in the matrix. Fatty acid beta-oxidation breaks down fatty acids. Amino acid metabolism also occurs in mitochondria.

Calcium homeostasis is another critical function. Mitochondria buffer calcium ions and regulate cytoplasmic calcium concentrations.

Mitochondria are central to apoptosis, or programmed cell death. They release cytochrome c, which activates caspases. Mitochondrial permeability transition can trigger cell death.

Reactive oxygen species, abbreviated ROS, are produced as a byproduct of OXPHOS. ROS can function in signaling at low levels but cause damage at high levels.

Finally, mitochondria perform various biosynthetic functions including heme synthesis, production of iron-sulfur clusters, and steroid synthesis in certain cell types.

# 2. Oxidative Phosphorylation

Oxidative phosphorylation is the process of ATP generation using oxygen. It occurs through the electron transport chain in the inner mitochondrial membrane.

## 2.1 The Electron Transport Chain

The electron transport chain consists of five protein complexes embedded in the inner mitochondrial membrane.

Complex I, also called NADH dehydrogenase, accepts electrons from NADH. The reaction converts NADH to NAD+ plus a proton and two electrons. Complex I pumps four protons from the matrix to the intermembrane space. Importantly, Complex I is the target of rotenone, which will be discussed extensively later in this lecture.

Complex II, also called succinate dehydrogenase, accepts electrons from FADH2. It is part of the TCA cycle. Unlike the other complexes, Complex II does not pump protons.

Complex III, also called cytochrome bc1, transfers electrons to cytochrome c. It pumps four protons across the membrane.

Complex IV, also called cytochrome c oxidase, is where oxygen serves as the final electron acceptor. The reaction converts oxygen to water. Complex IV pumps two protons. This is where oxygen is actually consumed during respiration.

Complex V, also called ATP synthase, uses the proton gradient to synthesize ATP. Protons flow back through ATP synthase from the intermembrane space to the matrix. This energy drives the phosphorylation of ADP to produce ATP.

## 2.2 The Proton Gradient

Complexes I, III, and IV pump protons from the matrix to the intermembrane space. This creates an electrochemical gradient with two components: a chemical component from the pH difference and an electrical component from the charge difference. This electrical component is the mitochondrial membrane potential, which is critical for mitochondrial function and will be discussed in detail in the next section. ATP synthase uses this gradient to drive ATP synthesis.

# 3. Mitochondrial Membrane Potential

Mitochondrial membrane potential, abbreviated as delta psi m, is the critical indicator of mitochondrial health. Loss of membrane potential equals mitochondrial dysfunction. This concept is absolutely central to this lecture.

## 3.1 What Is Membrane Potential?

Membrane potential is the voltage across the inner mitochondrial membrane. It is typically approximately negative 180 millivolts, with the matrix being negative relative to the intermembrane space. This potential is generated by proton pumping through Complexes I, III, and IV. It drives ATP synthesis through Complex V.

## 3.2 Why Membrane Potential Matters

Healthy mitochondria maintain high membrane potential. This enables efficient ATP production, proper calcium buffering, and controlled ROS production.

Damaged mitochondria show reduced or lost membrane potential. This leads to decreased ATP production, increased ROS generation, release of cytochrome c triggering apoptosis, and impaired protein import.

## 3.3 Measurement

Membrane potential can be measured using TMRM, which stands for tetramethylrhodamine methyl ester. This is a fluorescent dye that accumulates in mitochondria with high membrane potential. Decreased TMRM signal indicates decreased membrane potential and therefore damaged mitochondria.

## 3.4 Membrane Potential and PINK1

There is a critical connection between membrane potential and PINK1. Membrane potential determines PINK1's fate, which in turn determines whether mitophagy occurs.

In healthy mitochondria with high membrane potential, PINK1 is imported into the mitochondria. It is cleaved by the PARL protease and then degraded. No PINK1 accumulates.

In damaged mitochondria with low membrane potential, PINK1 cannot be imported. It accumulates on the outer mitochondrial membrane. This accumulated PINK1 recruits Parkin and initiates mitophagy. This mechanism will be explained in detail in later sections.

# 4. Reactive Oxygen Species

Reactive oxygen species, abbreviated ROS, are produced as byproducts of oxidative phosphorylation, particularly when electrons leak from the electron transport chain to oxygen. At low levels, ROS serve signaling functions. At high levels, they cause oxidative damage to lipids, proteins, and DNA. Damaged mitochondria with impaired electron transport produce excessive ROS, contributing to cellular damage and triggering quality control mechanisms.

# 5. Mitochondrial Dynamics: Fusion and Fission

Mitochondria are dynamic organelles that continuously undergo fusion and fission. Fusion is mediated by Mfn1 and Mfn2 on the outer membrane and OPA1 on the inner membrane. Fission is mediated by Drp1 and Fis1. Importantly, the PINK1/Parkin pathway targets Mfn1 and Mfn2 for degradation, blocking fusion and isolating damaged mitochondria for removal.

# 6. Mitophagy: Quality Control

Mitophagy is the selective autophagy of mitochondria. It is the quality control mechanism that removes damaged mitochondria from cells.

## 6.1 Why Mitophagy Is Necessary

Mitochondria accumulate damage over time. Mitochondrial DNA acquires mutations. Oxidative damage affects mitochondrial proteins and lipids. Protein aggregation occurs. Damaged mitochondria must be removed. If they are not removed, they produce excessive ROS, can trigger apoptosis, and contribute to cell death.

## 6.2 The Mitophagy Process

The mitophagy process proceeds through six main steps. First, damage is recognized when membrane potential drops and PINK1 accumulates on the outer mitochondrial membrane.

Second, Parkin is recruited from the cytoplasm. PINK1 phosphorylates ubiquitin on the outer membrane. This phospho-ubiquitin recruits Parkin. PINK1 then phosphorylates Parkin, activating it.

Third, ubiquitination occurs. Active Parkin ubiquitinates outer mitochondrial membrane proteins including Mfn1, Mfn2, VDAC, and others. This creates a ubiquitin coat on the mitochondrion.

Fourth, autophagy machinery is recruited. Autophagy receptors including p62, also called SQSTM1, OPTN, and NDP52 recognize the ubiquitin coat. These receptors link to LC3 on the autophagosome membrane.

Fifth, the autophagosome engulfs the damaged mitochondrion. Sixth, the autophagosome fuses with a lysosome. The mitochondrion is degraded by lysosomal enzymes, and its components are recycled.

# 7. PINK1: The Sensor

PINK1 stands for PTEN-induced kinase 1. It acts as the mitochondrial damage sensor. Mutations in PINK1 cause early-onset Parkinson's disease.

## 7.1 PINK1 Basics

PINK1 is a serine/threonine kinase. It is a 63 kilodalton protein. The gene encoding PINK1 is called PARK6. PINK1 has a mitochondrial targeting sequence at its N-terminus.

## 7.2 PINK1 in Healthy Mitochondria

In healthy mitochondria, PINK1 undergoes a series of processing steps that lead to its degradation. First, PINK1 is synthesized in the cytoplasm with its mitochondrial targeting sequence at the N-terminus.

Second, PINK1 is imported through the TOM and TIM complexes. This import requires high membrane potential. Third, the mitochondrial processing peptidase, abbreviated MPP, cleaves the mitochondrial targeting sequence.

Fourth, the PARL protease cleaves PINK1 in the inner mitochondrial membrane. This releases a 52 kilodalton fragment. Fifth, this 52 kilodalton PINK1 fragment is exported to the cytoplasm where it is degraded by the proteasome. The absence of PINK1 accumulation signals that the mitochondrion is healthy.

## 7.3 PINK1 in Damaged Mitochondria

When membrane potential drops due to damage, PINK1's fate changes dramatically. First, the membrane potential becomes insufficient for import. PINK1 cannot enter the mitochondria.

Second, PINK1 accumulates on the outer mitochondrial membrane. It becomes inserted into the TOM complex. Third, PINK1 becomes active through autophosphorylation.

Fourth, active PINK1 phosphorylates ubiquitin molecules on the outer mitochondrial membrane. This creates phospho-ubiquitin. Fifth, phospho-ubiquitin recruits Parkin from the cytoplasm. PINK1 then phosphorylates Parkin, activating it. Sixth, mitophagy is initiated. This switch from degradation to accumulation is how membrane potential drop is sensed and translated into a mitophagy signal.

## 7.4 PINK1 Mutations

Mutations in PINK1 cause autosomal recessive early-onset Parkinson's disease. Age of onset is typically in the twenties to forties. These are loss-of-function mutations. Mutant PINK1 cannot initiate mitophagy. As a result, damaged mitochondria accumulate in neurons, leading to neurodegeneration.

# 8. Parkin: The E3 Ubiquitin Ligase

Parkin is an E3 ubiquitin ligase that is recruited by PINK1 to ubiquitinate damaged mitochondria, marking them for degradation.

## 8.1 Parkin Basics

Parkin is an E3 ubiquitin ligase, meaning it adds ubiquitin tags to target proteins. It is a 52 kilodalton protein. The gene encoding Parkin is called PARK2. Parkin mutations are the most common genetic cause of early-onset Parkinson's disease.

## 8.2 Parkin in the Cytoplasm

Under basal conditions, Parkin resides in the cytoplasm. It is auto-inhibited, meaning it is in an inactive state. Its UBL domain blocks the active site. As a result, it has low E3 ligase activity.

## 8.3 Parkin Activation

Parkin activation proceeds through several steps. First, phospho-ubiquitin on damaged mitochondria recruits Parkin from the cytoplasm. The phospho-ubiquitin binds to Parkin's UBL domain.

Second, PINK1 phosphorylates Parkin at serine 65. This relieves the auto-inhibition. Parkin becomes fully active.

Third, active Parkin ubiquitinates outer mitochondrial membrane proteins. Major targets include Mfn1 and Mfn2, which are mitochondrial fusion proteins, as well as VDAC, TOM20, and others. Parkin adds K63-linked ubiquitin chains.

Fourth, a feed-forward amplification loop occurs. PINK1 phosphorylates the newly added ubiquitin. This creates more phospho-ubiquitin, which recruits more Parkin. This amplification ensures robust mitophagy signaling.

## 8.4 Parkin Targets

Mfn1 and Mfn2 are particularly important Parkin targets. These are mitochondrial fusion proteins on the outer membrane. Their ubiquitination leads to degradation. This blocks fusion, effectively isolating the damaged mitochondrion from the healthy mitochondrial network.

Other targets include VDAC, which is an outer membrane channel; TOM20, which is part of the protein import machinery; and Miro, which is a mitochondrial transport adaptor. The overall result is that the damaged mitochondrion becomes isolated and marked for degradation.

## 8.5 Parkin Mutations

Parkin mutations are the most common genetic cause of early-onset Parkinson's disease. The inheritance pattern is autosomal recessive. Age of onset is typically in the twenties to forties. These are loss-of-function mutations. Mutant Parkin cannot ubiquitinate mitochondria. Mitophagy is defective. Damaged mitochondria accumulate, leading to neuronal death.

# 9. The PINK1/Parkin Pathway

The PINK1/Parkin pathway is the complete mechanism by which damaged mitochondria are recognized and removed. Understanding this pathway in its entirety is crucial for exam success.

The pathway begins when mitochondrial damage causes membrane potential to drop. PINK1 accumulates on the outer mitochondrial membrane because it cannot be imported. Accumulated PINK1 phosphorylates ubiquitin molecules on the outer membrane. Phospho-ubiquitin recruits Parkin from the cytoplasm. PINK1 phosphorylates Parkin at serine 65, activating it. Active Parkin ubiquitinates outer membrane proteins including Mfn1, Mfn2, VDAC, and others. A feed-forward loop amplifies the signal as PINK1 phosphorylates newly added ubiquitin, recruiting more Parkin. Autophagy receptors such as p62, OPTN, and NDP52 recognize the ubiquitin coat and link to LC3 on autophagosomes. The autophagosome engulfs the damaged mitochondrion. Finally, fusion with a lysosome leads to degradation of the mitochondrion and recycling of its components.

# 10. Rotenone: Complex I Inhibitor

Rotenone is a pesticide that inhibits Complex I of the electron transport chain. It is widely used to model Parkinson's disease in laboratory studies.

## 10.1 Mechanism

Rotenone binds to Complex I, also known as NADH dehydrogenase. It blocks electron transfer from NADH. NADH cannot donate its electrons to the electron transport chain.

## 10.2 Effects

The immediate effects of rotenone include decreased ATP production because electron transport is blocked, decreased membrane potential as proton pumping is impaired, and increased ROS production as electrons leak directly to oxygen.

At the cellular level, rotenone causes oxidative stress and mitochondrial damage. The PINK1/Parkin pathway becomes activated in an attempt to remove damaged mitochondria. Alpha-synuclein, the protein that aggregates in Parkinson's disease, begins to accumulate.

At the neuronal level, rotenone causes selective death of dopaminergic neurons. This selectivity makes it an excellent model for Parkinson's disease.

## 10.3 Rotenone as a Parkinson's Disease Model

Rotenone is widely used in cell culture models including SH-SY5Y neuroblastoma cells and PC12 cells. It is also used in rodent models of Parkinson's disease. Rotenone treatment induces alpha-synuclein aggregation, dopaminergic neuron loss, and motor deficits. It provides a good model for studying mitochondrial dysfunction in Parkinson's disease.

## 10.4 Protection Against Rotenone

PDGF-BB, which stands for platelet-derived growth factor-BB, protects mitochondria from rotenone damage. It preserves mitochondrial morphology, maintains membrane potential, reduces ROS production, and improves cell viability. This suggests therapeutic potential.

Parkin overexpression also provides protection. Enhanced mitophagy removes damaged mitochondria more quickly, providing a protective effect against rotenone toxicity.

# 11. Parkinson's Disease Connection

## 11.1 Mitochondrial Dysfunction in Parkinson's Disease

Mitochondrial dysfunction is a central feature of Parkinson's disease. Complex I deficiency is found specifically in the substantia nigra, the brain region that degenerates in Parkinson's disease. This leads to reduced ATP production and increased oxidative stress. Dopaminergic neurons are particularly vulnerable to this mitochondrial dysfunction.

## 11.2 Genetic Forms

PINK1 mutations, designated PARK6, account for approximately one to two percent of early-onset Parkinson's disease cases. The inheritance is autosomal recessive. Loss of mitophagy results from these mutations.

Parkin mutations, designated PARK2, account for approximately fifty percent of familial early-onset Parkinson's disease. This makes Parkin the most common genetic cause of early-onset disease. The inheritance is autosomal recessive. Defective mitophagy results from these mutations.

## 11.3 Why Dopaminergic Neurons Are Vulnerable

Dopaminergic neurons are especially vulnerable to mitochondrial dysfunction for several reasons. They have high energy demands. Their axons are extremely long, requiring substantial ATP for axonal transport. Dopamine metabolism itself produces reactive oxygen species. These factors combine to make dopaminergic neurons particularly susceptible to mitochondrial dysfunction and therefore to degeneration in Parkinson's disease.

# 12. Other Mitochondrial Genes in Parkinson's Disease

Several other genes involved in mitochondrial function are associated with Parkinson's disease. DJ-1, also called PARK7, protects against oxidative stress. LRRK2, or PARK8, affects mitochondrial function and is the most common cause of familial Parkinson's disease overall. Alpha-synuclein itself can localize to mitochondria and impair their function. These genetic connections reinforce the central importance of mitochondrial dysfunction in Parkinson's disease pathogenesis.

# 13. Therapeutic Approaches

Several therapeutic strategies targeting mitochondrial dysfunction are being explored. Enhancing mitophagy through pharmacological activation of the PINK1/Parkin pathway could help clear damaged mitochondria. Mitochondrial antioxidants such as MitoQ could reduce oxidative damage. Compounds that enhance mitochondrial biogenesis could increase the healthy mitochondrial pool. PDGF-BB and similar growth factors show promise in protecting mitochondria. Gene therapy to restore PINK1 or Parkin function is being investigated for genetic forms of Parkinson's disease. These approaches aim to preserve mitochondrial function and prevent neurodegeneration.

# 14. Summary: Must-Know Facts

Mitochondria are the powerhouse organelles that produce ATP through oxidative phosphorylation. They have a double membrane structure consisting of an outer mitochondrial membrane and an inner mitochondrial membrane. The electron transport chain consists of Complexes I, II, III, and IV, which pump protons, and Complex V, which makes ATP.

Mitochondrial membrane potential is the voltage across the inner membrane, typically approximately negative 180 millivolts. It is generated by proton pumping and is critical for ATP synthesis. A drop in membrane potential indicates mitochondrial damage and determines PINK1's fate.

PINK1 is the mitochondrial damage sensor. In healthy mitochondria with high membrane potential, PINK1 is imported, cleaved by PARL, and degraded. In damaged mitochondria with low membrane potential, PINK1 accumulates on the outer membrane, phosphorylates ubiquitin, and recruits Parkin. Mutations in PINK1 cause early-onset Parkinson's disease.

Parkin is an E3 ubiquitin ligase. It is recruited by phospho-ubiquitin and activated by PINK1 phosphorylation. Active Parkin ubiquitinates outer membrane proteins including Mfn1, Mfn2, and VDAC. Parkin mutations are the most common genetic cause of early-onset Parkinson's disease.

Mitophagy is the selective removal of damaged mitochondria. The process proceeds through membrane potential drop, PINK1 accumulation, Parkin recruitment, ubiquitination, autophagosome engulfment, and lysosomal degradation. Mitophagy is defective when PINK1 or Parkin is mutated.

Rotenone is a Complex I inhibitor and pesticide. It decreases ATP, decreases membrane potential, and increases ROS. Rotenone models Parkinson's disease in cells and animals. It induces alpha-synuclein aggregation and dopaminergic neuron death.

Mitochondrial fusion is mediated by Mfn1, Mfn2, and OPA1. Fission is mediated by Drp1 and Fis1. Parkin targets Mfn1 and Mfn2 for degradation, blocking fusion and isolating damaged mitochondria.

# 15. Exam-Style Questions You Might See

## Question 1: Explain how PINK1 senses mitochondrial damage.

PINK1 has a mitochondrial targeting sequence. In healthy mitochondria with high membrane potential, PINK1 is imported via the TOM and TIM complexes, cleaved first by MPP and then by PARL, and degraded in the cytoplasm. In damaged mitochondria with low membrane potential, PINK1 cannot be imported. It accumulates on the outer membrane in the TOM complex, becomes active, and phosphorylates ubiquitin. Membrane potential acts as the sensor: when it drops, PINK1 switches from being degraded to accumulating and signaling.

## Question 2: Describe the PINK1/Parkin mitophagy pathway.

Damage drops membrane potential. PINK1 accumulates on the outer membrane. PINK1 phosphorylates ubiquitin. Phospho-ubiquitin recruits Parkin from the cytoplasm. PINK1 phosphorylates Parkin at serine 65, activating it. Active Parkin ubiquitinates outer membrane proteins including Mfn1, Mfn2, and VDAC. A feed-forward loop occurs as more phospho-ubiquitin recruits more Parkin. Autophagy receptors such as p62 recognize ubiquitin and link to LC3. The autophagosome engulfs the mitochondrion. Fusion with a lysosome leads to degradation.

## Question 3: What is rotenone and how does it model Parkinson's disease?

Rotenone is a pesticide that inhibits Complex I of the electron transport chain. It blocks electron transfer from NADH. This results in decreased ATP production, decreased membrane potential, and increased ROS. Rotenone causes oxidative stress, mitochondrial damage, alpha-synuclein aggregation, and selective dopaminergic neuron death. It models sporadic Parkinson's disease through mitochondrial dysfunction and is used in SH-SY5Y cells and rodent models.

## Question 4: Why are PINK1 and Parkin mutations associated with early-onset Parkinson's disease?

PINK1 and Parkin mutations cause loss of mitophagy. Damaged mitochondria accumulate in neurons. This leads to decreased ATP, increased ROS, oxidative damage, and alpha-synuclein aggregation. Dopaminergic neurons are especially vulnerable because they have high energy demands, long axons, and dopamine metabolism that produces ROS. Accumulation of damage leads to neuronal death and Parkinson's disease symptoms. Early onset, typically in the twenties to forties, occurs because inherited mutations completely block mitophagy from birth.

## Question 5: How does Parkin target damaged mitochondria for degradation?

Parkin ubiquitinates outer membrane proteins with K63-linked ubiquitin chains. Main targets are Mfn1 and Mfn2, which are fusion proteins. Their ubiquitination leads to degradation, blocking fusion and isolating the damaged mitochondrion. Parkin also ubiquitinates VDAC, TOM20, and Miro. The ubiquitin coat recruits autophagy receptors such as p62 and OPTN, which link to LC3 on autophagosomes. A feed-forward loop amplifies the signal as PINK1 phosphorylates newly added ubiquitin, recruiting more Parkin.

# Final Exam Focus

For the final exam, focus on understanding that membrane potential is the critical damage sensor. Know in detail how PINK1's fate depends on membrane potential: high potential leads to import, cleavage, and degradation; low potential leads to accumulation and signaling. Master the complete PINK1/Parkin mitophagy pathway from initial damage through final degradation. Understand rotenone's mechanism as a Complex I inhibitor and how it models Parkinson's disease. Remember that PINK1 and Parkin mutations cause early-onset Parkinson's disease through loss of mitophagy, and that Parkin mutations are the most common genetic cause of early-onset disease. Understanding these connections between mitochondrial dysfunction and neurodegeneration is essential.`,

BY4048 - Advanced Cell and Molecular Biology

# Table of Contents

# Lecture 11: Mitochondrial-Dependent Metabolism

## Complete Exam Study Notes

These notes explain mitochondrial metabolism and its connection to disease in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers how mitochondria process carbohydrates and lipids to generate ATP, the TCA cycle and anaplerotic reactions, beta-oxidation of fatty acids and the carnitine shuttle system, insulin signaling and diabetes, and the critical connection between type 2 diabetes and Alzheimer's disease. Understanding these metabolic pathways is essential because metabolic dysfunction contributes to neurodegeneration.

# 1. Overview of Metabolic Substrates

Mitochondria are the metabolic powerhouses that process carbohydrates, fats, and proteins to generate ATP. Cells can utilize different fuel sources depending on availability and metabolic state.

## 1.1 Three Main Fuel Sources

Carbohydrates, primarily in the form of glucose, serve as the primary fuel source providing quick energy. The metabolic pathway proceeds through glycolysis to produce pyruvate, which is converted to acetyl-CoA and enters the TCA cycle.

Fats, in the form of fatty acids, are energy-dense, providing nine kilocalories per gram compared to four kilocalories per gram for carbohydrates. Fatty acids are stored in lipid droplets. They undergo beta-oxidation to produce acetyl-CoA, which enters the TCA cycle.

Proteins, broken down into amino acids, are usually not a primary fuel source but are used during starvation. After deamination, carbon skeletons from amino acids can enter the TCA cycle at various points.

## 1.2 Metabolic Flexibility

Cells demonstrate metabolic flexibility by switching between substrates based on availability. In the fed state, cells primarily use glucose. In the fasted state, they switch primarily to fatty acids. During prolonged fasting or starvation, cells utilize ketones and amino acids.

# 2. Carbohydrate Metabolism

## 2.1 Glucose Uptake

Glucose enters cells through glucose transporters. GLUT1 mediates basal glucose uptake and is particularly important in the brain. GLUT4 is insulin-responsive and is found in muscle and fat tissue. GLUT4 translocates to the cell membrane in response to insulin and is the main target of insulin action for glucose uptake.

## 2.2 Glycolysis

Glycolysis occurs in the cytoplasm. This pathway converts one glucose molecule to two pyruvate molecules. The net products are two ATP molecules produced directly and two NADH molecules. Importantly, glycolysis is an anaerobic pathway, meaning it does not require oxygen.

## 2.3 Pyruvate to Acetyl-CoA Conversion

The conversion of pyruvate to acetyl-CoA occurs in the mitochondrial matrix and is catalyzed by the pyruvate dehydrogenase complex, abbreviated PDH. The reaction converts pyruvate plus CoA plus NAD+ to acetyl-CoA plus NADH plus carbon dioxide. This is an irreversible reaction that commits pyruvate to oxidation and represents a rate-limiting step in glucose metabolism.

The PDH complex is regulated by multiple factors. It is activated by calcium, CoA, and NAD+. It is inhibited by its products: acetyl-CoA, NADH, and ATP. Phosphorylation inactivates PDH, providing another layer of regulation.

# 3. The TCA Cycle

The TCA cycle, also known as the Krebs cycle, occurs in the mitochondrial matrix. It serves as the central metabolic hub of the cell.

## 3.1 Overview

The TCA cycle oxidizes acetyl-CoA to carbon dioxide. It generates reduced cofactors, NADH and FADH2, which feed electrons into the electron transport chain. It also provides biosynthetic precursors for various cellular processes.

## 3.2 Key Steps

The cycle begins when acetyl-CoA condenses with oxaloacetate to form citrate. This condensation reaction is catalyzed by citrate synthase. Citrate is then converted to isocitrate by the enzyme aconitase. Isocitrate is oxidized to alpha-ketoglutarate by isocitrate dehydrogenase. This step produces NADH and releases carbon dioxide. This is a rate-limiting step in the cycle.

Alpha-ketoglutarate is converted to succinyl-CoA by alpha-ketoglutarate dehydrogenase. This step also produces NADH and releases carbon dioxide. Succinyl-CoA is converted to succinate, producing GTP, which is equivalent to ATP. Succinate is oxidized to fumarate by succinate dehydrogenase, which is also Complex II of the electron transport chain. This step produces FADH2.

Fumarate is hydrated to malate by fumarase. Finally, malate is oxidized to oxaloacetate by malate dehydrogenase. This final step produces NADH and regenerates oxaloacetate for the next cycle.

## 3.3 Products and Energy Yield

Each acetyl-CoA that enters the TCA cycle produces three NADH molecules, one FADH2 molecule, one GTP or ATP molecule, and two carbon dioxide molecules.

The total ATP yield from one glucose molecule can be calculated by summing all stages. Glycolysis produces two ATP directly plus two NADH. The conversion of two pyruvate molecules to two acetyl-CoA produces two NADH. The two acetyl-CoA molecules going through the TCA cycle produce six NADH, two FADH2, and two ATP. The NADH and FADH2 feed into the electron transport chain to generate additional ATP. The total yield is approximately thirty to thirty-two ATP molecules per glucose, making this an extremely efficient energy-generating process.

# 4. Anaplerotic Reactions

The word anaplerotic means 'filling up'. Anaplerotic reactions replenish TCA cycle intermediates that are removed for biosynthetic purposes.

## 4.1 Why They Are Needed

TCA cycle intermediates are constantly being withdrawn for biosynthesis. Citrate is removed for fatty acid synthesis. Alpha-ketoglutarate is removed for amino acid synthesis, particularly glutamate. Succinyl-CoA is used for heme synthesis. Oxaloacetate is used for gluconeogenesis and amino acid synthesis. These intermediates must be replenished or the cycle will slow down and eventually stop.

## 4.2 Main Anaplerotic Reactions

The most important anaplerotic reaction is the conversion of pyruvate to oxaloacetate, catalyzed by pyruvate carboxylase. This reaction consumes pyruvate, carbon dioxide, and ATP to produce oxaloacetate, directly replenishing this critical TCA cycle intermediate.

Amino acids also serve anaplerotic functions. Glutamate can be converted to alpha-ketoglutarate. Aspartate can be converted to oxaloacetate. Various other amino acids can feed into the TCA cycle at different points. Additionally, propionate derived from odd-chain fatty acids can be converted to succinyl-CoA.

# 5. Lipid Metabolism: Fatty Acid Uptake

## 5.1 Fatty Acid Transport

In the extracellular space, fatty acids are bound to albumin in the blood for delivery to cells. At the cell membrane, CD36, also called fatty acid translocase or FAT, serves as the main fatty acid transporter, bringing fatty acids across the plasma membrane. FABPpm, which stands for fatty acid binding protein on the plasma membrane, also participates in uptake.

Once inside the cell, intracellular transport is mediated by FABPc, the cytoplasmic fatty acid binding protein. This protein chaperones fatty acids through the cytoplasm and delivers them to their destinations: mitochondria for beta-oxidation, the endoplasmic reticulum for lipid synthesis, or lipid droplets for storage.

Before fatty acids can be metabolized, they must be activated. The activation reaction, catalyzed by acyl-CoA synthetase enzymes such as ACS1 and FATP1, converts fatty acid plus CoA plus ATP to fatty acyl-CoA. This activation occurs on the outer mitochondrial membrane and makes the fatty acid ready for metabolism.

# 6. Beta-Oxidation of Fatty Acids

Beta-oxidation is the process that breaks down fatty acids to generate acetyl-CoA. It occurs in the mitochondrial matrix.

## 6.1 The Process

Each cycle of beta-oxidation removes two carbon atoms from the fatty acid chain. The cycle consists of four steps. First, oxidation is catalyzed by acyl-CoA dehydrogenase. This step produces FADH2 and creates a double bond in the fatty acid. Second, hydration adds water across the double bond. Third, another oxidation step produces NADH. Fourth, thiolysis cleaves the two-carbon unit as acetyl-CoA, leaving a shortened acyl-CoA. This cycle repeats until the fatty acid is completely oxidized.

## 6.2 Products and Energy Yield

Consider palmitate, a sixteen-carbon fatty acid, as an example. It undergoes seven cycles of beta-oxidation. This produces eight acetyl-CoA molecules, seven FADH2 molecules, and seven NADH molecules. The eight acetyl-CoA molecules then enter the TCA cycle. The total ATP yield from palmitate is approximately one hundred and six ATP molecules. This is much more than the thirty to thirty-two ATP produced from glucose, demonstrating why fats are such an energy-dense fuel source.

# 7. The Carnitine Shuttle System

Long-chain fatty acids cannot cross the inner mitochondrial membrane on their own. The carnitine shuttle system transports them into the mitochondrial matrix where beta-oxidation occurs.

## 7.1 The Transport System

The system operates in four steps. First, at the outer mitochondrial membrane, CPT-1, which stands for carnitine palmitoyltransferase I, catalyzes the reaction between acyl-CoA and carnitine to produce acylcarnitine and free CoA. CPT-1 is located on the outer membrane.

Second, acylcarnitine crosses the outer membrane and enters the intermembrane space. Third, at the inner mitochondrial membrane, CAT, which stands for carnitine-acylcarnitine translocase, acts as a transporter. This antiporter exchanges acylcarnitine moving into the matrix for free carnitine moving out.

Fourth, in the matrix, CPT-2, which stands for carnitine palmitoyltransferase II, catalyzes the reverse reaction. Acylcarnitine plus CoA produces acyl-CoA plus free carnitine. This regenerates acyl-CoA inside the mitochondrial matrix, where it is ready for beta-oxidation. The free carnitine is transported back out to be reused.

## 7.2 Regulation

CPT-1 is inhibited by malonyl-CoA. Malonyl-CoA is the first intermediate in fatty acid synthesis. This regulation is elegant: when the cell is synthesizing fatty acids in the fed state, malonyl-CoA levels are high. This inhibits CPT-1, blocking fatty acid oxidation. This prevents a futile cycle where the cell would simultaneously synthesize and oxidize fatty acids.

Conversely, when fasting or when glucose is low, malonyl-CoA levels decrease. CPT-1 becomes active, and fatty acid oxidation proceeds. This metabolic switch ensures that the cell uses the appropriate fuel source for its current state.

# 8. Lipid Storage in Droplets

Excess fatty acids are stored in lipid droplets, which are cellular organelles consisting of a neutral lipid core surrounded by a phospholipid monolayer. Proteins such as perilipins coat the droplet surface and regulate lipid storage and mobilization. When energy is needed, lipases break down stored triglycerides, releasing fatty acids for beta-oxidation.

# 9. Insulin Signaling

## 9.1 Insulin Overview

Insulin is a hormone produced by pancreatic beta-cells. It is released in response to high blood glucose levels. Insulin promotes glucose uptake and storage, helping to lower blood glucose.

## 9.2 The Insulin Signaling Pathway

The pathway begins when insulin binds to the insulin receptor, which is a tyrosine kinase. Binding causes the receptor to autophosphorylate. The phosphorylated receptor then phosphorylates insulin receptor substrate proteins, abbreviated IRS. Phosphorylated IRS recruits PI3K, which stands for phosphoinositide 3-kinase.

PI3K produces PIP3. PIP3 activates AKT, also known as protein kinase B or PKB. AKT is a central node in insulin signaling and phosphorylates many downstream targets. The most important effect is GLUT4 translocation to the cell membrane, enabling glucose uptake. AKT also activates glycogen synthase, promoting glycogen storage. It activates mTOR, promoting protein synthesis. It promotes lipogenesis, the synthesis of fats.

## 9.3 Insulin Resistance

Insulin resistance is a state where cells do not respond properly to insulin. Despite normal or even high insulin levels, glucose uptake is decreased.

Multiple factors cause insulin resistance. Obesity, especially accumulation of visceral fat, is a major cause. Chronic inflammation impairs insulin signaling. Lipid accumulation in muscle and liver, called ectopic lipid deposition, interferes with insulin action. ER stress, discussed in Lecture 8, contributes to insulin resistance. Mitochondrial dysfunction also plays a role.

The consequences of insulin resistance are severe. Hyperglycemia, or high blood glucose, results. This can progress to type 2 diabetes. The pancreatic beta-cells eventually become exhausted from overproducing insulin. Cardiovascular disease risk increases. Importantly, insulin resistance links to Alzheimer's disease, as will be discussed later.

# 10. Diabetes and Hyperglycemia

## 10.1 Type 2 Diabetes Progression

Type 2 diabetes progresses through predictable stages. Initially, insulin resistance develops. The pancreas compensates by producing more insulin. Eventually, beta-cells become exhausted and can no longer produce sufficient insulin. The combination of insufficient insulin production and insulin resistance leads to chronic hyperglycemia.

## 10.2 Advanced Glycation End Products

Hyperglycemia has particularly damaging consequences through the formation of advanced glycation end products, abbreviated AGEs. High glucose concentrations cause glucose to react with proteins through non-enzymatic glycation. These reactions form irreversible AGE modifications. AGEs accumulate in tissues over time.

AGEs bind to RAGE, the receptor for advanced glycation end products. RAGE activation triggers oxidative stress, activates the inflammatory transcription factor NF-kappaB, and causes endothelial dysfunction. AGEs damage blood vessels throughout the body. In the kidneys, they cause nephropathy. In the retina, they cause retinopathy. In peripheral nerves, they cause neuropathy. In the brain, they contribute to Alzheimer's disease.

# 11. Obesity and High-Fat Diet

Obesity, particularly visceral obesity, is a major driver of insulin resistance and type 2 diabetes. Adipose tissue, especially visceral fat, is metabolically active and secretes inflammatory cytokines called adipokines. Chronic inflammation from obesity impairs insulin signaling. High-fat diets contribute to obesity and can directly cause insulin resistance through lipid accumulation in non-adipose tissues such as muscle and liver. This ectopic lipid deposition interferes with normal insulin signaling pathways.

# 12. GLP-1 and Therapeutic Approaches

GLP-1, which stands for glucagon-like peptide-1, is an incretin hormone. It enhances insulin secretion in a glucose-dependent manner and inhibits glucagon secretion. GLP-1 agonists such as liraglutide are used as diabetes drugs. These drugs activate the GLP-1 receptor, improving glucose control. Importantly, GLP-1 agonists show therapeutic potential beyond diabetes, particularly for Alzheimer's disease, as will be discussed in the next section.

# 13. The Diabetes-Alzheimer's Connection

Type 2 diabetes is a major risk factor for Alzheimer's disease. Some researchers refer to Alzheimer's disease as 'Type 3 Diabetes' because of the strong metabolic connections.

## 13.1 Mechanisms Linking Diabetes to Alzheimer's

Multiple mechanisms connect diabetes to Alzheimer's disease. First, insulin resistance develops in the brain itself. The brain becomes resistant to insulin, leading to decreased glucose metabolism in neurons. This creates energy deficits and neuronal dysfunction.

Second, hyperglycemia leads to AGE formation. AGEs accumulate in the brain. RAGE activation causes inflammation and oxidative stress. AGEs promote tau hyperphosphorylation, as discussed in Lecture 5. They also promote amyloid-beta aggregation.

Third, aberrant insulin signaling occurs. Insulin is normally protective for neurons. Loss of proper insulin signaling makes neurons vulnerable. Tau becomes hyperphosphorylated. GSK-3beta, which is normally inhibited by insulin signaling through AKT, becomes overactive. Overactive GSK-3beta is a major kinase that phosphorylates tau.

Fourth, vascular damage occurs. Diabetes damages blood vessels throughout the body, including in the brain. Reduced cerebral blood flow contributes to neurodegeneration. This vascular component adds to the direct metabolic effects.

## 13.2 GLP-1 Agonists in Alzheimer's Disease

GLP-1 agonists such as liraglutide, which are diabetes drugs, show promise for treating Alzheimer's disease. In Alzheimer's disease models, these drugs prevent degenerative processes. They reduce amyloid-beta accumulation. They reduce tau pathology. They improve memory deficits.

The mechanisms appear to involve enhancing insulin signaling in the brain, providing neuroprotective effects, and reducing inflammation. By addressing the diabetes-Alzheimer's disease connection, GLP-1 agonists offer therapeutic potential. Clinical trials are ongoing to test these drugs specifically for Alzheimer's disease treatment.

# 14. Summary: Must-Know Facts

The three main fuel sources are carbohydrates, which go through glycolysis to pyruvate, then to acetyl-CoA, then to the TCA cycle; fats, which undergo beta-oxidation to acetyl-CoA, then to the TCA cycle; and proteins, which are deaminated to produce amino acids that enter the TCA cycle at various points.

The TCA cycle converts acetyl-CoA plus oxaloacetate to citrate and then through a series of steps back to oxaloacetate. The products per acetyl-CoA are three NADH, one FADH2, one ATP equivalent, and two carbon dioxide molecules. The TCA cycle is the central metabolic hub.

Anaplerotic reactions replenish TCA cycle intermediates. The most important is pyruvate to oxaloacetate, catalyzed by pyruvate carboxylase. These reactions are needed when intermediates are removed for biosynthesis.

Fatty acid metabolism involves uptake through CD36, FABPpm, and FABPc; activation by acyl-CoA synthetase on the outer mitochondrial membrane; transport via the carnitine shuttle with CPT-1 on the outer membrane, CAT in the inner membrane, and CPT-2 in the matrix; and beta-oxidation, which proceeds through four steps to produce acetyl-CoA, FADH2, and NADH. CPT-1 is inhibited by malonyl-CoA to prevent futile cycling.

Insulin signaling proceeds through insulin receptor, to IRS, to PI3K, to AKT. AKT promotes GLUT4 translocation for glucose uptake and promotes glucose storage and protein synthesis.

Type 2 diabetes results from insulin resistance plus beta-cell failure. Hyperglycemia leads to formation of AGEs, which bind RAGE and cause inflammation and oxidative stress. AGEs damage vessels, kidneys, nerves, and brain.

Diabetes is a major Alzheimer's disease risk factor. Mechanisms include brain insulin resistance, AGE formation, aberrant signaling with overactive GSK-3beta, and vascular damage. GLP-1 agonists such as liraglutide show promise in Alzheimer's disease by reducing amyloid-beta and tau pathology and improving memory.

# 15. Exam-Style Questions You Might See

## Question 1: Describe the carnitine shuttle system and why it is necessary.

Long-chain fatty acids cannot cross the inner mitochondrial membrane. The carnitine shuttle transports them. First, CPT-1 on the outer membrane converts acyl-CoA plus carnitine to acylcarnitine. Second, CAT transporter in the inner membrane exchanges acylcarnitine moving into the matrix for free carnitine moving out. Third, CPT-2 in the matrix converts acylcarnitine plus CoA back to acyl-CoA plus carnitine. This regenerates acyl-CoA inside for beta-oxidation. CPT-1 is inhibited by malonyl-CoA to prevent futile cycling when fatty acids are being synthesized.

## Question 2: What are anaplerotic reactions and why are they important?

Anaplerotic means 'filling up' and refers to reactions that replenish TCA cycle intermediates. TCA intermediates are removed for biosynthesis: citrate for fatty acids, alpha-ketoglutarate for amino acids, and oxaloacetate for gluconeogenesis. These must be replaced or the cycle slows. The main anaplerotic reaction is pyruvate to oxaloacetate, catalyzed by pyruvate carboxylase. Amino acids also feed in at various points.

## Question 3: Explain how diabetes increases Alzheimer's disease risk.

Multiple mechanisms link diabetes to Alzheimer's disease. First, brain insulin resistance develops, leading to decreased glucose metabolism and energy deficits. Second, hyperglycemia produces AGEs, which bind RAGE, causing inflammation and oxidative stress that promote tau hyperphosphorylation and amyloid-beta aggregation. Third, loss of insulin's neuroprotective effects allows GSK-3beta to become overactive, increasing tau phosphorylation. Fourth, vascular damage reduces cerebral blood flow. This connection has led some to call Alzheimer's disease 'Type 3 Diabetes'.

## Question 4: Describe beta-oxidation and its products.

Beta-oxidation breaks down fatty acids in the mitochondrial matrix. Each cycle consists of four steps: oxidation producing FADH2, hydration, oxidation producing NADH, and thiolysis releasing acetyl-CoA. The cycle repeats until the fatty acid is completely oxidized. For example, palmitate, a sixteen-carbon fatty acid, undergoes seven cycles producing eight acetyl-CoA, seven FADH2, and seven NADH. This yields approximately one hundred and six ATP total, which is much more efficient than glucose metabolism.

## Question 5: How does GLP-1 agonist treatment show promise for Alzheimer's disease?

GLP-1 agonists such as liraglutide are diabetes drugs that activate the GLP-1 receptor. In Alzheimer's disease models, they prevent degenerative processes, reduce amyloid-beta accumulation, reduce tau pathology, and improve memory deficits. The mechanism involves enhancing insulin signaling, providing neuroprotective effects, and reducing inflammation. By addressing the metabolic dysfunction that links diabetes to Alzheimer's disease, GLP-1 agonists offer therapeutic potential. Clinical trials are ongoing for Alzheimer's disease treatment.

# Final Exam Focus

For the final exam, focus on understanding the TCA cycle and its products: three NADH, one FADH2, one ATP, and two carbon dioxide per acetyl-CoA. Know anaplerotic reactions, particularly pyruvate to oxaloacetate by pyruvate carboxylase. Master the carnitine shuttle system with CPT-1, CAT, and CPT-2, and understand that CPT-1 is inhibited by malonyl-CoA. Understand beta-oxidation as a four-step cycle producing acetyl-CoA, FADH2, and NADH. Know the insulin signaling pathway from receptor through IRS, PI3K, and AKT to GLUT4 translocation. Understand the diabetes-Alzheimer's disease connection through brain insulin resistance, AGE formation, aberrant signaling with overactive GSK-3beta, and vascular damage. Remember that GLP-1 agonists show promise for Alzheimer's disease treatment.`,

# Table of Contents

# Lecture 12: Mitochondria-Associated ER Membranes

## Complete Exam Study Notes

These notes explain mitochondria-associated ER membranes in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points. This lecture covers MAMs as specialized contact sites where the ER and mitochondria communicate, the tethering proteins that maintain these contacts with particular emphasis on mitofusins and PACS2, calcium transfer from ER to mitochondria, and the critical roles of MAMs in ER stress, insulin resistance, and Alzheimer's disease. Understanding MAMs is essential because they represent a communication hub that coordinates cellular metabolism, stress responses, and cell fate decisions.

# 1. What Are MAMs?

MAMs, which stands for mitochondria-associated ER membranes, are specialized contact sites where the endoplasmic reticulum and mitochondria come into close proximity, separated by approximately ten to thirty nanometers.

## 1.1 Discovery and Definition

MAMs are contact sites between the ER and mitochondria where the two organelles are separated by a very small distance of approximately ten to thirty nanometers. Importantly, this is not membrane fusion; the organelles remain separate and distinct. MAMs are dynamic structures that can form and dissolve. Approximately five to twenty percent of the mitochondrial surface is in contact with the ER at any given time.

## 1.2 Why MAMs Matter

MAMs serve as a communication hub that allows the ER and mitochondria to communicate with each other. They coordinate cellular responses and are critical for both cell survival and cell death decisions.

MAMs perform multiple essential functions. They mediate calcium transfer from the ER to mitochondria. They are sites of lipid synthesis and transfer. They participate in autophagosome formation. They regulate apoptosis. They coordinate metabolism. They participate in mitochondrial dynamics, particularly fission.

## 1.3 Historical Context

MAMs were first observed by electron microscopy decades ago. Initially, they were thought to be artifacts of sample preparation. Now they are recognized as critical functional domains. MAMs represent lipid raft-like regions of the ER, connecting to concepts from Lecture 2.

# 2. MAM Structure and Composition

## 2.1 Physical Structure

At the ER-mitochondria interface, the ER membrane is closely apposed to the outer mitochondrial membrane. The gap between them is ten to thirty nanometers. This precise spacing is maintained by tethering proteins. The structure is dynamic and can form and dissolve in response to cellular needs.

## 2.2 Lipid Composition

MAMs have a lipid raft-like composition. They are enriched in cholesterol and sphingolipids, similar to the lipid rafts discussed in Lecture 2. This specialized lipid environment is important for MAM function.

## 2.3 Protein Enrichment

MAMs are enriched in specific proteins that mediate their functions. Tethering proteins include Mfn1 and Mfn2, which are mitofusins; the VAPB-PTPIP51 complex; and PACS2, which is a regulator.

Calcium-handling proteins are particularly abundant at MAMs. IP3R is the IP3 receptor and serves as the ER calcium release channel. VDAC1 is the voltage-dependent anion channel on the outer mitochondrial membrane. GRP75 is a chaperone that links IP3R to VDAC. MCU is the mitochondrial calcium uniporter.

Lipid synthesis enzymes are present, including PSS, which is phosphatidylserine synthase, and various enzymes for lipid metabolism. ER stress and UPR proteins are also enriched at MAMs, including GRP78, also called BiP, and the UPR sensors PERK and IRE1.

# 3. Tethering Proteins

Tethering proteins physically hold the ER and mitochondria together at MAMs, maintaining the close proximity required for their functions.

## 3.1 Major Tethering Complexes

The most studied MAM tethers are Mfn1 and Mfn2, the mitofusins. These proteins are located on the outer mitochondrial membrane. While they normally mediate mitochondrial fusion, at MAMs they tether the ER to mitochondria. They can interact with ER proteins to bridge the two organelles.

The VAPB-PTPIP51 complex represents another tethering mechanism. VAPB is on the ER membrane and PTPIP51 is on the outer mitochondrial membrane. Their physical interaction bridges the organelles.

The IP3R-GRP75-VDAC complex serves a dual function. IP3R is on the ER, GRP75 is a chaperone in the gap, and VDAC is on the outer mitochondrial membrane. This complex both tethers the membranes together and transfers calcium.

## 3.2 Regulation of Tethering

Tethering is a dynamic process. The extent of ER-mitochondria contact can increase or decrease. Regulation occurs through multiple mechanisms including PACS2, which promotes MAM formation, cellular stress responses, and metabolic state.

# 4. Mitofusins: Mfn1 and Mfn2

Mitofusins are the key MAM tethering proteins. They have a dual role, mediating both mitochondrial fusion and ER-mitochondria tethering.

## 4.1 Basics of Mfn1 and Mfn2

Mfn1 and Mfn2 are GTPases located on the outer mitochondrial membrane. They are paralogs, meaning they are similar proteins encoded by related genes. Transmembrane domains anchor them in the outer membrane while their GTPase domains extend into the cytoplasm.

## 4.2 Primary Function: Mitochondrial Fusion

The primary function of mitofusins is mediating mitochondrial fusion. Mfn1 and Mfn2 on one mitochondrion interact with Mfn1 and Mfn2 on another mitochondrion. GTP hydrolysis provides energy to drive membrane fusion. This fuses the outer membranes of adjacent mitochondria, creating interconnected mitochondrial networks.

## 4.3 Secondary Function: MAM Tethering

At MAMs, mitofusins serve a different function. Mfn2 on the outer mitochondrial membrane can interact with Mfn2 on the ER membrane. This creates an ER-mitochondria tether that maintains MAM structure. Mfn2 is more important than Mfn1 for MAM tethering.

## 4.4 Mfn2 Overexpression

Overexpression of Mfn2 increases MAM formation. This enhances ER-mitochondria contacts and improves calcium transfer. Depending on the context, this can be either protective or harmful.

In disease states, Mfn2 levels are altered. In insulin resistance, MAM disruption occurs. In Alzheimer's disease and Parkinson's disease, Mfn2 regulation is abnormal. Importantly, Parkin targets Mfn1 and Mfn2 for degradation during mitophagy, as discussed in Lecture 10.

## 4.5 Rotenone and Mitofusins

Rotenone, the Complex I inhibitor discussed in Lecture 10, decreases Mfn2 levels. Decreased Mfn2 leads to disrupted MAMs. This impairs ER-mitochondria communication and contributes to neurodegeneration in Parkinson's disease models.

# 5. PACS2: Master Regulator of MAMs

PACS2, which stands for phosphofurin acidic cluster sorting protein 2, is the master regulator of MAM formation.

## 5.1 PACS2 Function

PACS2 is the master regulator of MAM formation. It controls ER-mitochondria communication. PACS2 is localized to the ER and regulates the apposition, or closeness, of ER and mitochondria.

## 5.2 Mechanisms

PACS2 promotes MAM formation by increasing ER-mitochondria contacts. It recruits and stabilizes tethering proteins. It also regulates the localization of Bid, a pro-apoptotic protein, to MAMs.

## 5.3 PACS2 in Alzheimer's Disease

PACS2 is dysregulated in Alzheimer's disease models. PACS2 levels are altered, which disrupts the ER-mitochondria interface. This impairs calcium homeostasis. The consequences include ER stress, mitochondrial dysfunction, and neurodegeneration. These contribute to tau pathology and amyloid-beta accumulation.

PACS2 represents a therapeutic target. Modulating PACS2 levels could restore MAMs and normalize ER-mitochondria communication, offering potential as an Alzheimer's disease therapy.

# 6. Calcium Transfer at MAMs

MAMs are the critical sites for calcium transfer from the ER to mitochondria. This is one of the most important MAM functions.

## 6.1 Why Calcium Transfer Matters

The ER stores calcium at high concentrations, approximately 0.5 millimolar. The cytoplasm maintains low calcium, approximately 100 nanomolar. Mitochondria can take up calcium. Importantly, calcium regulates mitochondrial metabolism.

## 6.2 The Transfer Machinery

The first step is ER calcium release. The IP3 receptor, abbreviated IP3R, is located on the ER membrane. When IP3 signaling occurs, IP3R opens. Calcium flows from the ER lumen to the cytoplasm. At MAMs, this calcium is released into the narrow gap between ER and mitochondria.

The second step is transfer across the gap. The GRP75 chaperone physically links IP3R to VDAC. This creates a quasi-synapse that channels calcium toward the mitochondria.

The third step is mitochondrial uptake. Calcium enters through VDAC on the outer mitochondrial membrane. Then MCU, the mitochondrial calcium uniporter on the inner membrane, transports calcium into the mitochondrial matrix.

## 6.3 Effects of Mitochondrial Calcium

At physiological levels, mitochondrial calcium has beneficial effects. It activates TCA cycle dehydrogenases. This increases NADH production. ATP synthesis increases. Metabolic stimulation occurs.

However, excessive calcium is harmful. Calcium overload occurs. This triggers mitochondrial permeability transition, abbreviated MPT. Membrane potential collapses. Cytochrome c is released, triggering apoptosis. Cell death results.

## 6.4 ER Stress and Calcium

ER stress perturbs calcium handling at MAMs. Excessive calcium transfer to mitochondria occurs. Mitochondrial calcium overload results. GRP78 overexpression can protect against this by modulating calcium signaling at MAMs.

# 7. Lipid Synthesis and Transfer

MAMs are important sites for lipid synthesis and transfer between organelles. Phosphatidylserine is synthesized at MAMs and transferred to mitochondria where it is converted to phosphatidylethanolamine. This phosphatidylethanolamine can return to the ER or remain in mitochondria. Precursors for cardiolipin, the signature mitochondrial lipid, are also synthesized at MAMs. This lipid exchange is essential for maintaining the proper lipid composition of both organelles.

# 8. Autophagosome Formation

MAMs serve as platforms for autophagosome formation. The isolation membrane, which will develop into the autophagosome, forms at or near MAM sites. This makes sense because autophagosomes require membrane lipids, which are synthesized at MAMs. The close proximity of ER and mitochondria at MAMs facilitates the coordination needed for autophagy initiation.

# 9. Apoptotic Signaling

MAMs play critical roles in apoptosis regulation. Pro-apoptotic proteins such as Bid localize to MAMs, where they are positioned to trigger cell death when appropriate signals occur. Excessive calcium transfer from ER to mitochondria at MAMs can trigger the mitochondrial permeability transition, leading to cytochrome c release and caspase activation. This makes MAMs a critical decision point for cell death.

# 10. MAMs and ER Stress

## 10.1 ER-Mitochondria Crosstalk in Stress

During early ER stress, when the response is adaptive, MAMs coordinate calcium transfer to support metabolic adaptation. Increased ATP production helps the cell cope with stress. This represents a protective phase.

However, during prolonged ER stress, when the response becomes maladaptive, excessive calcium transfer occurs. This leads to mitochondrial dysfunction. Membrane potential decreases. ATP production falls. Energetic collapse occurs, leading to cell death.

## 10.2 Key Players

GRP78, also called BiP, localizes to MAMs. The UPR sensors PERK and IRE1, discussed in Lecture 8, also localize to MAMs. This allows UPR signals to be coordinated with mitochondrial function, creating an integrated stress response.

# 11. MAMs in Insulin Resistance

MAM disruption plays a central role in palmitic acid-induced insulin resistance, connecting metabolic dysfunction to organellar communication.

## 11.1 Palmitic Acid and MAMs

Palmitic acid is a saturated free fatty acid with sixteen carbons, designated 16:0. It is abundant in Western diets. At high levels, palmitic acid is toxic, a phenomenon called lipotoxicity.

Palmitic acid disrupts ER-mitochondria contacts. MAM integrity decreases. Calcium transfer is impaired. Mitochondrial dysfunction results.

## 11.2 Mfn2 and Insulin Resistance

Overexpression of Mfn2 restores MAMs. It improves ER-mitochondria communication. It protects against palmitic acid toxicity and prevents insulin resistance.

The mechanism involves Mfn2 tethering ER and mitochondria together, maintaining calcium homeostasis, preserving mitochondrial function, and maintaining proper insulin signaling.

## 11.3 Broader Implications

MAM dysfunction contributes to type 2 diabetes. High-fat diets lead to disrupted MAMs, which lead to insulin resistance. This links MAM biology to obesity and metabolic syndrome. MAMs represent a therapeutic target for metabolic disease.

# 12. MAMs in Alzheimer's Disease

## 12.1 MAM Dysfunction in Alzheimer's Disease

PACS2 dysregulation is a key feature. As discussed earlier, PACS2 controls the ER-mitochondria interface. PACS2 levels are altered in Alzheimer's disease models. This disrupts MAM formation and impairs organellar communication.

The consequences are severe. Calcium homeostasis is impaired. ER stress develops, as discussed in Lecture 8. Mitochondrial dysfunction occurs. Energy deficits develop. These changes contribute to tau pathology, amyloid-beta accumulation, and neurodegeneration.

## 12.2 Connections to Other Lectures

MAM biology connects to multiple topics covered in this course. It links to ER stress in Lecture 8 through GRP78 and the UPR sensors PERK and IRE1. It links to mitophagy in Lecture 10 because Parkin targets Mfn1 and Mfn2. It links to metabolism in Lecture 11 through calcium regulation of the TCA cycle. It links to lipid rafts in Lecture 2 because MAMs are lipid raft-like structures. This integration emphasizes how cellular functions are coordinated.

# 13. MAMs and Rotenone

Rotenone, the Complex I inhibitor discussed in Lecture 10, decreases Mfn2 expression. Decreased Mfn2 disrupts MAMs, impairing ER-mitochondria communication. This contributes to the neurotoxicity of rotenone in Parkinson's disease models. The connection demonstrates how mitochondrial dysfunction disrupts multiple levels of cellular organization, from electron transport to organellar communication.

# 14. Summary: Must-Know Facts

MAMs are mitochondria-associated ER membranes. They are contact sites where ER and mitochondria are approximately ten to thirty nanometers apart. They are dynamic structures comprising approximately five to twenty percent of the mitochondrial surface.

MAM functions include calcium transfer from ER to mitochondria, lipid synthesis and transfer, autophagosome formation, apoptosis regulation, and metabolic coordination.

Tethering proteins maintain MAM structure. The most important are Mfn1 and Mfn2, the mitofusins. Other tethers include the VAPB-PTPIP51 complex and the IP3R-GRP75-VDAC calcium transfer complex.

PACS2 is the master regulator of MAM formation. It controls ER-mitochondria communication and is dysregulated in Alzheimer's disease.

Calcium transfer occurs through a coordinated pathway. IP3R on the ER releases calcium. GRP75 links to VDAC on the outer mitochondrial membrane. MCU on the inner membrane imports calcium to the matrix. At physiological levels, this activates the TCA cycle and increases ATP. Excessive calcium causes overload, mitochondrial permeability transition, and apoptosis.

During early ER stress, MAMs coordinate an adaptive response. During prolonged stress, energetic collapse and dysfunction occur.

In disease, palmitic acid disrupts MAMs causing insulin resistance, while Mfn2 overexpression is protective. In Alzheimer's disease, PACS2 dysregulation impairs calcium homeostasis. In Parkinson's disease, rotenone decreases Mfn2 and Parkin targets Mfn1 and Mfn2.
