Complete Exam Study Notes - Readable Book-Style Version

BY4048 - Advanced Cell and Molecular Biology

Table of Contents

# Lecture 2: Lipid Rafts

## Complete Exam Study Notes

These notes explain lipid rafts in a more readable, book-style format while keeping the original study information intact. The aim is to make the topic easier to read as a continuous explanation, rather than as disconnected bullet points.

# 1. Definition

Lipid rafts are small membrane microdomains, approximately 70 nm in size, that are enriched in cholesterol, glycosphingolipids, gangliosides, and certain proteins. Compared with the surrounding membrane, lipid rafts have less fluidity. This means they are more tightly packed, more ordered, and more structurally stable than the more fluid regions of the plasma membrane.

A useful way to imagine lipid rafts is to think of the cell membrane as an ocean. Most of the membrane behaves like a fluid sea, but lipid rafts behave like floating patches of ice within that sea. These patches are still part of the membrane, but they are more rigid and more organized than the surrounding membrane.

In visual terms, a raft domain is tightly packed, ordered, and relatively thick. A non-raft domain is more loosely packed, disordered, and thinner. This difference in organization is important because lipid rafts create specialized areas where particular lipids and proteins can gather together and carry out specific cellular functions.

# 2. What Lipid Rafts Consist Of

Lipid rafts are made up of specific lipids and proteins. Their composition is what gives them their ordered structure and functional importance.

## 2.1 Lipids

### Cholesterol

Cholesterol is the most important lipid component of lipid rafts. It is a stiff steroid molecule, and more than 90% of cellular cholesterol is found in membranes. In lipid rafts, cholesterol fills the spaces between sphingolipids. This helps the raft become more rigid, thicker, and more stable than the surrounding membrane.

The main function of cholesterol in lipid rafts is to maintain raft integrity. It stabilizes the raft structure and helps recruit proteins into these membrane regions. Without enough cholesterol, lipid rafts lose their ordered structure and can dissolve into the surrounding membrane.

### Sphingomyelin

Sphingomyelin is another major lipid found in rafts. It is made of a ceramide backbone with a phosphocholine head group. A key feature of sphingomyelin is that it contains saturated fatty acid tails. These tails are straight because they do not contain double bonds, so they do not have kinks. This allows sphingomyelin molecules to pack tightly together with cholesterol.

Sphingomyelin is also common in myelin sheaths, which are lipid-rich structures that insulate neurons. Its ability to pack tightly is one reason it contributes strongly to the ordered nature of lipid rafts.

### Glycosphingolipids

Glycosphingolipids are made of a ceramide backbone with sugar chains attached. They are mainly located in the outer leaflet of the plasma membrane, meaning their sugar chains face the extracellular space. Because of this, glycosphingolipids can participate in interactions with extracellular molecules, pathogens, toxins, and receptors.

### Gangliosides

Gangliosides are a type of glycosphingolipid that contain one or more sialic acid groups. They are also found mainly in the outer leaflet of the membrane, where their sugar chains project outward into the extracellular environment.

GM1 is an important ganglioside because it binds cholera toxin and is commonly used as a marker to detect lipid rafts experimentally. GM3 is another important ganglioside found in raft-associated biology. Because gangliosides extend outward from the membrane, they can influence receptor signaling, pathogen binding, and protein organization at the cell surface.

### Ceramide

Ceramide is the backbone of all sphingolipids. It can accumulate during cellular stress and has major effects on raft structure and signaling. Ceramide is especially important in the context of Alzheimer’s disease because it can directly stimulate the enzyme BACE1. BACE1 is involved in amyloid precursor protein processing and amyloid-beta production, so ceramide accumulation can increase Alzheimer’s-related pathology.

## 2.2 Proteins

Lipid rafts also contain specific proteins. These proteins are not randomly distributed; many are targeted to rafts because of their lipid anchors, membrane-spanning regions, or signaling roles.

### GPI-anchored proteins

GPI-anchored proteins are attached to the outer surface of the membrane through a glycosylphosphatidylinositol anchor. They do not pass through the membrane. Instead, they are effectively attached or “glued” to the outside of the membrane.

Examples include the folate receptor, CD21, and the normal cellular prion protein, PrPC. These proteins are important because GPI anchors tend to associate with raft lipids, helping these proteins concentrate within lipid rafts.

### Transmembrane proteins

Transmembrane proteins pass through the entire membrane. Many important receptors and enzymes are enriched in lipid rafts. Examples include NMDA receptors, AMPA receptors, GPCRs, TrkB receptors, and mGluR5 receptors. Enzymes such as BACE1, gamma-secretase, and adenylyl cyclase can also localize to lipid rafts.

Caveolins, including CAV1, CAV2, and CAV3, are also important raft-associated proteins. They form caveolae, which are specialized invaginated forms of lipid rafts. Caveolae are involved in endocytosis, lipid trafficking, mechanosensing, and signaling.

### Cytoplasmic proteins

Some proteins associate with the inner side of lipid rafts. These include G-proteins with alpha, beta, and gamma subunits, protein kinase C, RhoGTPases, and Src family kinases. These proteins help connect the raft structure to intracellular signaling pathways.

## 2.3 What Is Not Usually Found in Rafts

Unsaturated phospholipids, such as phosphatidylcholine and phosphatidylethanolamine, are generally not enriched in lipid rafts. These lipids contain kinked fatty acid tails because of double bonds. The kinks prevent tight packing, so these lipids are more commonly found in the more fluid, non-raft regions of the membrane.

# 3. Functions of Lipid Rafts

Lipid rafts have several major functions. Their overall role is to organize the membrane into specialized signaling and trafficking regions.

## 3.1 Signaling Platforms

One of the most important functions of lipid rafts is that they act as signaling platforms. They bring receptors and their downstream effectors close together. This makes signaling faster, stronger, and more efficient.

For example, a GPCR, its associated G-protein, and adenylyl cyclase can all be located in the same raft. Because these molecules are close together, the GPCR can activate the G-protein efficiently, and the G-protein can quickly activate adenylyl cyclase. This leads to rapid production of cAMP.

## 3.2 Receptor Clustering

Lipid rafts help cluster receptors at the membrane. Important examples include NMDA receptors, AMPA receptors, TrkB receptors, and GPCRs. NMDA receptors are important for learning and memory. AMPA receptors mediate fast synaptic transmission. TrkB receptors are involved in growth and survival signaling. GPCRs respond to many hormones and neurotransmitters.

When receptors cluster in rafts, signals can be amplified. Rafts also allow different signaling pathways to interact with one another, creating signal crosstalk.

## 3.3 Endocytosis and Trafficking

Lipid rafts are involved in caveolar endocytosis, which is a clathrin-independent form of endocytosis. In this process, caveolae bud inward from the plasma membrane and form caveosomes. Caveosomes are neutral pH compartments, which makes them different from acidic endosomes in the clathrin-mediated pathway.

Raft-mediated endocytosis can internalize cholesterol, sphingolipids, receptors, and viruses. This is why many viruses exploit lipid rafts to enter cells.

## 3.4 Lipid Metabolism

Lipid rafts are also involved in lipid metabolism. Fatty acids can enter the cell through FAT/CD36, which is found in rafts. These fatty acids can then be transported to the endoplasmic reticulum and stored in lipid droplets. Caveolin-1 helps connect membrane cholesterol and caveolae to lipid droplet biology.

## 3.5 Immune and Adhesion Signaling

Lipid rafts participate in immune signaling and cell adhesion. They help cluster T-cell receptors, support integrin-mediated cell adhesion, organize cadherin-based cell-cell contacts, and contribute to immunoglobulin E signaling, which is important in allergic responses.

## 3.6 Mechanotransduction

Caveolae can sense mechanical stress. When the membrane is stretched, caveolae can flatten. This allows the cell to detect and respond to mechanical forces. In this way, caveolae act as a membrane reservoir and a mechanotransduction system.

## 3.7 Sphingolipid Metabolism Compartment

Lipid rafts are also sites of sphingolipid metabolism. Neutral sphingomyelinase can convert sphingomyelin into ceramide within raft regions. Gangliosides can also be modified by sialidases, which remove sialic acids. When ceramide accumulates, ceramide platforms can form within or near raft regions.

# 4. Why Lipid Rafts Are Formed

Lipid rafts form because certain lipids naturally pack together more tightly than others. Their formation is based on biophysical properties of membrane lipids and on the need for functional organization within the membrane.

## 4.1 Biophysical Basis

The main reason lipid rafts form is the tight packing between cholesterol and saturated sphingolipids. Sphingolipids have straight saturated fatty acid tails, and cholesterol is rigid and flat. These molecules fit together closely, almost like puzzle pieces. This produces a liquid-ordered phase.

A liquid-ordered phase is ordered but still liquid. The lipids are not frozen in place, but they are more tightly packed and less fluid than the surrounding membrane.

In contrast, unsaturated phospholipids have kinked tails because of double bonds. These kinks prevent tight packing with cholesterol. As a result, unsaturated phospholipids form a liquid-disordered phase, which is more fluid, less organized, and less tightly packed.

The final result is phase separation. Ordered lipids cluster together to form rafts, while disordered lipids remain in non-raft regions. This is similar to oil and water separating into different phases.

## 4.2 Protein Targeting to Rafts

Certain proteins are targeted to lipid rafts because of their structural features. Palmitoylation attaches a saturated fatty acid to a protein, which helps target that protein to raft regions. GPI anchors also contain saturated chains, so GPI-anchored proteins tend to partition into rafts. Some transmembrane proteins have thick hydrophobic domains that match the thickness of raft membranes. This is called hydrophobic matching.

## 4.3 Functional Necessity

Cells need organized signaling platforms. If all receptors and signaling molecules were randomly distributed across the membrane, signaling would be slower and less controlled. Lipid rafts allow cells to keep different signaling pathways organized and partly separated. For this reason, raft formation has been selected for because it improves cellular communication and regulation.

# 5. Possible Disruptions and Consequences

Lipid rafts can be disrupted in several ways. Changes in cholesterol, ceramide, gangliosides, omega-3 and omega-6 balance, or caveolin expression can all affect raft structure and function.

## 5.1 Cholesterol Depletion

Cholesterol depletion can occur experimentally or biologically. Methyl-beta-cyclodextrin, also called MbetaCD, extracts cholesterol from membranes. Statins inhibit cholesterol synthesis. Cholesterol oxidation during aging can produce oxysterols such as 24S-OHC.

When cholesterol is depleted, lipid rafts lose structural integrity and begin to dissolve. The proteins that were once clustered in rafts scatter into the bulk membrane. This disrupts signaling because receptors are no longer efficiently clustered with their effectors. GPCR-to-G-protein activation decreases, and cAMP production can also decrease.

Endocytosis is also affected. Caveolar endocytosis can fail, and cells may switch toward clathrin-mediated endocytosis. This changes which cargo is internalized and how it is trafficked inside the cell.

In neurons, cholesterol depletion can impair synaptic plasticity. Long-term potentiation can be reduced, NMDA and AMPA receptor function can decline, and cognitive dysfunction may follow.

Aging provides an important example. During aging, 24S-OHC can increase, cholesterol can become redistributed, GM1 ganglioside levels can fall, and caveolin-1 can decrease in rafts. These changes contribute to progressive neurodegeneration and memory loss. SynCav1, a synthetic caveolin-1-based treatment, can restore raft formation and rescue synaptic signaling in experimental contexts.

## 5.2 Ceramide Accumulation

Ceramide accumulation can occur when sphingomyelinase is activated. Neutral sphingomyelinase converts sphingomyelin into ceramide. Stress, inflammation, and aging can trigger this process. Ceramide can also increase through de novo synthesis.

When ceramide accumulates, ceramide-enriched platforms form. These are large, rigid membrane domains that are different from normal lipid rafts. Ceramide accumulation can activate pro-apoptotic signaling, stimulate caspases, contribute to mitochondrial dysfunction, and activate inflammatory pathways such as NF-kappaB.

Ceramide is especially important in Alzheimer’s disease. Ceramide directly stimulates BACE1. BACE1 cuts amyloid precursor protein, which increases amyloid-beta production. This creates a vicious cycle: amyloid-beta causes stress, stress increases ceramide, ceramide stimulates BACE1, and BACE1 produces more amyloid-beta.

## 5.3 Ganglioside Loss

Ganglioside loss can happen when sialidases such as Neu3 remove sialic acids or when glycohydrolases break down sugar chains. Genetic defects in ganglioside synthesis can also reduce ganglioside levels.

Loss of gangliosides can alter viral entry because some viruses depend on gangliosides such as GM1 for binding and entry. Ganglioside loss can also disrupt signaling because gangliosides modulate receptor function. In Alzheimer’s disease and aging, reduced GM1 in neurons is associated with synaptic dysfunction.

## 5.4 Omega-3 and Omega-6 Imbalance

Omega-3 and omega-6 fatty acids can affect membrane properties and inflammation. Omega-3 fatty acids, including EPA and DHA, increase membrane fluidity and can disturb ordered raft domains. They also produce anti-inflammatory molecules such as resolvins and protectins.

Omega-6 fatty acids, especially arachidonic acid, produce pro-inflammatory molecules. These include prostaglandins through COX1 and COX2, leukotrienes through lipoxygenase, and HETEs. A high omega-6 state increases inflammation and increases arachidonic acid in membranes, which can alter raft composition.

High omega-3 levels generally reduce inflammation and may disrupt rafts. This can be beneficial or harmful depending on the biological context.

## 5.5 Caveolin Dysfunction

Caveolins are needed to form caveolae. If caveolins are lost or dysfunctional, caveolae do not form properly. This impairs caveolar endocytosis, disrupts mechanosensing, and removes an important signaling scaffold.

Caveolin dysfunction is seen in aging, muscular dystrophy, and cancer. In many cancers, caveolin is downregulated, which can contribute to abnormal signaling and disease progression.

# 6. Diseases Associated with Lipid Rafts

Lipid rafts are involved in several major diseases because they organize signaling molecules, receptors, enzymes, and entry points for pathogens.

## 6.1 Alzheimer’s Disease

In Alzheimer’s disease, lipid rafts are important because BACE1 and gamma-secretase are enriched in rafts. APP, or amyloid precursor protein, can also localize to rafts. When these molecules are brought together, APP is more likely to be processed through the amyloidogenic pathway.

First, BACE1 makes the first cut in APP. Then gamma-secretase makes the second cut. This produces amyloid-beta peptide. Amyloid-beta monomers are released and can begin to aggregate. These monomers can form oligomers, then fibrils, and eventually plaques. The oligomers are considered the most toxic species.

Amyloid-beta oligomers can bind to raft-associated proteins such as PrPC, mGluR5, and NMDA receptors. This causes receptor dysfunction. Receptors can be redistributed away from synapses, internalized, or abnormally activated.

The consequences include inhibition of long-term potentiation, oxidative stress, apoptosis, calcium dysregulation, synapse loss, neuronal death, memory impairment, and cognitive decline.

Several raft lipids influence this process. High cholesterol can increase raft abundance and promote BACE1 and gamma-secretase activity, which increases amyloid-beta production. Lowering cholesterol with statins may reduce amyloid-beta production. Sphingolipids and gangliosides also influence amyloid-beta aggregation. GM1 can seed amyloid-beta aggregation, and changing ganglioside composition can affect amyloid-beta toxicity.

Ceramide is particularly important because it directly stimulates BACE1. Stress and aging can increase ceramide levels, which increases BACE1 activity and amyloid-beta production. This creates a vicious cycle in which stress and amyloid-beta promote further ceramide accumulation and more amyloid-beta formation.

Therapeutically, raft lipid composition could be targeted to reduce amyloid-beta. Inhibiting sphingomyelinase could reduce ceramide and therefore reduce BACE1 activity. Restoring normal ganglioside levels may also be useful.

## 6.2 HIV-Related Dementia

HIV can exploit lipid rafts during infection. The viral protein gp120 binds to the CD4 receptor, which is found in rafts. It also binds chemokine co-receptors such as CXCR4 or CCR5, which can also localize to raft regions.

Glycosphingolipids in rafts can act as co-receptors and enhance HIV binding and fusion. HIV infection can also trigger sphingomyelinase activity, converting sphingomyelin into ceramide. This leads to ceramide-enriched platforms.

Ceramide activates cell death pathways. HIV proteins such as Tat and gp120 are also neurotoxic, and infection promotes inflammation. Together, these effects can cause neuronal death, synaptic loss, and cognitive decline, contributing to HIV-related dementia.

Potential inhibition strategies include blocking sphingomyelin-to-ceramide conversion to reduce HIV fusion and disrupting raft integrity to prevent viral entry.

## 6.3 Viral Infections

Many viruses use lipid rafts as entry points because rafts concentrate receptors and support caveolar endocytosis.

Influenza virus binds sialic acid on gangliosides and can enter through caveolae. It requires raft integrity for efficient infection.

SARS-CoV-2, the virus that causes COVID-19, binds ACE2. ACE2 can localize to lipid rafts, and raft cholesterol is important for viral entry. Statins may reduce infection by disrupting raft cholesterol organization.

Simian Virus 40, or SV40, is a non-enveloped virus. It binds ganglioside GM1 and MHC class I, uses caveolar endocytosis, and traffics through caveosomes to the endoplasmic reticulum and then the nucleus.

Ebola and Marburg viruses can use folate receptor-alpha, a GPI-anchored protein found in rafts, for caveolar entry. Hepatitis B uses CD21, a complement receptor associated with rafts.

The common theme is that viruses hijack raft-mediated endocytosis because caveosomes have neutral pH, allowing viruses to avoid acidic early endosomes. Rafts also provide a direct route to specific cellular compartments and concentrate the receptors needed for viral binding and entry.

## 6.4 Prion Diseases

Prion diseases, such as Creutzfeldt-Jakob disease, are also connected to lipid rafts. The normal prion protein, PrPC, is a GPI-anchored protein that localizes to lipid rafts and is normally neuroprotective.

The misfolded scrapie form, PrPSc, can be converted from PrPC. This conversion occurs in lipid rafts. Raft composition affects the conversion rate. PrPSc acts as a template and converts more PrPC into PrPSc. Aggregates then form and contribute to neurodegeneration.

Rafts matter because they concentrate PrPC, making conversion easier. Cholesterol depletion can reduce prion propagation, so raft disruption may have therapeutic potential.

## 6.5 Aging and Neurodegeneration

During aging, lipid raft composition changes. Cholesterol oxidation increases, including oxysterols such as 24S-OHC and 27-OHC. Cholesterol can redistribute away from rafts. Ceramide synthesis increases. GM1 gangliosides decrease. Caveolin-1 levels fall. Overall membrane lipid raft formation decreases.

These changes reduce receptor clustering for NMDA receptors, AMPA receptors, and TrkB receptors. They also reduce calcium signaling and weaken pathways such as ERK1/2, CaMK-II, Akt, and cAMP signaling. As a result, synaptic plasticity and long-term potentiation decline. This contributes to progressive neurodegeneration, behavioral dysfunction, and memory loss.

SynCav1, a synthetic caveolin-1 treatment, can increase membrane lipid raft formation, restore receptor clustering, restore signaling pathways, and rescue synaptic plasticity. This supports the idea that restoring raft function can reverse some age-related deficits in experimental models.

## 6.6 Cancer

Cancer cells often show altered lipid raft composition. They may have altered ganglioside expression, changed caveolin levels, and modified cholesterol content. These changes can affect growth factor signaling, apoptosis, migration, invasion, and drug resistance.

Growth factor signaling involving receptors such as EGFR and TrkB can be altered. Apoptosis can become disrupted, making cancer cells harder to kill. Raft changes may also support migration and invasion. Drug resistance can occur if chemotherapy drugs do not reach their intended targets effectively.

Caveolin-1 is an important example. It is often downregulated in cancers and can act as a tumor suppressor. Loss of caveolin-1 can contribute to uncontrolled growth signaling.

# 7. Key Pathways in Lipid Rafts

Several important signaling and metabolic pathways are organized by lipid rafts.

## 7.1 PIP2 Signaling

PIP2 signaling occurs at the plasma membrane and can be organized within lipid rafts. PIP2, or phosphatidylinositol 4,5-bisphosphate, is present in the membrane. When a GPCR activates phospholipase C, PLC cleaves PIP2 into IP3 and DAG.

IP3 travels to the endoplasmic reticulum and opens calcium channels, allowing calcium to flood into the cytoplasm. DAG remains in the membrane and activates protein kinase C. PKC then phosphorylates target proteins and produces cellular responses.

Rafts matter because the GPCR, PLC, and PKC can all be positioned close together in the same raft region. This makes signaling rapid and efficient and can amplify calcium signaling.

## 7.2 Arachidonic Acid Cascade

The arachidonic acid cascade is an important inflammatory pathway that begins at the plasma membrane. Inflammatory stimuli increase intracellular calcium. Calcium activates phospholipase A2, which releases arachidonic acid from membrane phospholipids.

Arachidonic acid can then enter three major branches.

In the COX pathway, COX1 and COX2 convert arachidonic acid into prostaglandins. Prostaglandins contribute to pain, fever, and inflammation. Aspirin and NSAIDs block this pathway and therefore act as anti-inflammatory drugs.

In the LOX pathway, lipoxygenase converts arachidonic acid into leukotrienes and HETEs. Leukotrienes are important in asthma and allergic reactions. Zileuton blocks this pathway.

In the CYP450 pathway, CYP450 epoxygenase converts arachidonic acid into EETs, or epoxyeicosatrienoic acids. EETs promote vasodilation and regulate blood flow.

Omega-3 fatty acids such as EPA and DHA produce resolvins, protectins, and maresins. These molecules are anti-inflammatory, pro-resolving, and neuroprotective. The balance between omega-6 and omega-3 is important. A high omega-6 to omega-3 ratio promotes chronic inflammation, while a lower ratio is generally associated with better health.

## 7.3 APP Processing in Alzheimer’s Disease

APP processing is one of the most important lipid raft pathways for exam purposes. In the amyloidogenic pathway, APP is processed inside lipid rafts. BACE1, also called beta-secretase, cuts APP to produce sAPPbeta and the C99 fragment. Gamma-secretase then cuts C99 to produce amyloid-beta and AICD. Amyloid-beta is released into the extracellular space, where it can aggregate into oligomers, fibrils, and plaques.

Several factors enhance this pathway. Increased cholesterol can increase raft formation and therefore increase amyloidogenic processing. Increased ceramide stimulates BACE1 and increases amyloid-beta production. Gangliosides, especially GM1, can seed amyloid-beta aggregation.

The non-amyloidogenic pathway occurs outside rafts and prevents amyloid-beta formation. In this pathway, alpha-secretase, such as ADAM10, cuts APP in the middle of the amyloid-beta sequence. This prevents amyloid-beta from being produced. It instead generates sAPPalpha, which is neuroprotective, and the C83 fragment. Gamma-secretase then cuts C83 to produce the harmless p3 peptide.

The balance between these two pathways is critical. More processing in rafts promotes Alzheimer’s-related amyloid-beta production. More processing outside rafts is protective. Therapeutic strategies include reducing raft cholesterol to shift APP toward non-raft regions, inhibiting BACE1, inhibiting ceramide production, and enhancing alpha-secretase activity.

## 7.4 Sphingolipid Metabolism

Sphingolipid metabolism occurs in several compartments, but lipid rafts are key sites of active sphingolipid remodeling.

In de novo synthesis, the endoplasmic reticulum uses serine and palmitoyl-CoA to produce ceramide. Ceramide then moves to the Golgi, where it can be converted into sphingomyelin by adding a phosphocholine group, or into glycosphingolipids by adding sugars. Glycosphingolipids can then become gangliosides when sialic acids are added.

At the raft, neutral sphingomyelinase converts sphingomyelin back into ceramide. This process can create ceramide platforms, especially during stress or aging.

During degradation, sialidases such as Neu3 remove sialic acids from gangliosides, converting them toward glycosphingolipids. Glycohydrolases remove sugars and can eventually lead back toward ceramide.

The salvage pathway occurs in lysosomes. Degraded sphingolipids are broken down into sphingosine, and sphingosine can be recycled into new ceramide synthesis.

The key point is that lipid rafts are not static. They are active sites where sphingolipids are remodeled, and changes in ceramide, sphingomyelin, glycosphingolipids, and gangliosides can strongly affect raft composition and signaling.

## 7.5 Caveolar Endocytosis and Lipid Trafficking

Caveolar endocytosis occurs in caveolae, which are invaginated lipid raft domains. The process begins when cargo binds to a receptor in the caveola. Examples of cargo include folate, albumin, and cholesterol. Caveolin-1 oligomerizes, allowing the caveola to bud inward from the plasma membrane.

The internalized vesicle forms a caveosome, which has a neutral pH. From there, cargo can be trafficked to the endoplasmic reticulum, lipid droplets, the Golgi, or recycled back to the membrane.

This pathway is distinct from clathrin-mediated endocytosis because caveosomes do not acidify and remain around pH 7. They also send cargo to different intracellular destinations. Caveolar trafficking is slower but more selective.

Caveolae are closely linked to lipid metabolism. Fatty acids enter through FAT/CD36 in caveolae and bind to fatty acid binding proteins. They are transported to the endoplasmic reticulum and packaged into lipid droplets. Lipid droplets are coated by PAT proteins, including perilipin, adipophilin, and TIP47. Caveolin-1 connects surface caveolae to internal lipid droplets.

This pathway is relevant to disease. It can be dysregulated in obesity, where lipid storage is excessive. It can be altered in atherosclerosis, where cholesterol trafficking is disrupted. It is also used by viruses as an entry route.

## 7.6 Neurovascular Coupling

Neurovascular coupling links neuronal activity to blood flow. It is especially important in the brain, where active neurons require rapid delivery of oxygen and nutrients.

The process involves astrocyte endfeet, which contact blood vessels. When neurons are active, they release glutamate. Glutamate activates receptors on astrocytes, increasing calcium inside the astrocyte. Increased calcium activates phospholipase A2, which releases arachidonic acid.

Arachidonic acid is then metabolized in raft-associated pathways. COX1 can produce prostaglandin E2, CYP4A can produce 20-HETE, and lipoxygenase can produce additional metabolites.

The outcome depends on oxygen levels. When oxygen is high, 20-HETE increases and causes smooth muscle contraction, leading to vasoconstriction and reduced blood flow. This makes sense because extra oxygen is not needed. When oxygen is low, 20-HETE decreases, while prostaglandin E2 and adenosine increase. Smooth muscle relaxes, causing vasodilation and increased blood flow.

This system allows the brain to match blood flow to neuronal activity. If neurovascular coupling becomes dysfunctional, it can contribute to stroke, Alzheimer’s disease, and vascular dementia. Lipid rafts are important because they organize the enzymes needed for a rapid response.

# 8. Detection Methods for Lipid Rafts

Lipid rafts can be detected experimentally using several approaches. Each method has advantages and limitations.

## 8.1 Cholera Toxin B-Subunit Labeling

Cholera toxin B-subunit, or CTxB, binds specifically to the ganglioside GM1. Because GM1 is enriched in lipid rafts, fluorescently labeled CTxB can be used to visualize raft regions.

In this method, CTxB is conjugated to a fluorophore and added to cells. It binds GM1 in rafts, and the cells are then viewed under a fluorescence microscope. Bright clusters indicate GM1-rich raft regions.

The advantage of this method is that it is easy, specific, and widely used. The limitation is that it only detects GM1-containing rafts and therefore does not detect all types of lipid rafts.

## 8.2 FRET

FRET stands for Förster resonance energy transfer. It is based on the idea that if two fluorophores are very close together, usually less than 10 nm apart, energy can transfer from one fluorophore to the other.

To use FRET for raft detection, two raft components are labeled with different fluorophores, one donor and one acceptor. If the two molecules are in the same raft and close enough together, a FRET signal is produced.

The advantage of FRET is that it can measure protein-protein interactions or molecular proximity in rafts, and it can be quantitative. The limitation is that it is technically challenging and requires special equipment.

## 8.3 FLOT1 Labeling

Flotillin-1, also called FLOT1, is a protein that localizes to lipid rafts and can act as a raft marker. Cells can be made to express fluorescently tagged FLOT1. The tagged protein goes to raft regions, and fluorescence can be visualized.

The advantage of this method is that FLOT1 is a good general raft marker and does not require adding an external ligand such as cholera toxin. The limitation is that overexpressing FLOT1 may alter raft organization, and FLOT1 may not mark all raft types.

## 8.4 Biochemical Isolation of Detergent-Resistant Membranes

Lipid rafts can also be studied biochemically as detergent-resistant membranes, or DRMs. The principle is that rafts resist extraction by cold detergent.

In this method, cells are treated with cold Triton X-100. Non-raft membrane regions dissolve, while raft-like regions remain intact. The sample is then centrifuged on a sucrose gradient. Because rafts are lipid-rich and less dense, they float toward the top of the gradient. These raft fractions can then be collected and analyzed for their protein and lipid composition.

The advantage of this approach is that it allows biochemical analysis of raft composition. The limitations are important: detergents may alter raft structure, DRMs may not perfectly represent native lipid rafts, and cold temperature can change lipid properties.

# 9. Therapeutic Strategies Targeting Lipid Rafts

Because lipid rafts are involved in disease, several therapeutic strategies aim to modify raft structure, lipid composition, or raft-associated entry pathways.

## 9.1 Cholesterol Modulation

One strategy is to lower cholesterol. Statins inhibit HMG-CoA reductase, reducing cholesterol synthesis. Methyl-beta-cyclodextrin can extract cholesterol from membranes. Dietary changes can also reduce cholesterol intake.

Potential benefits include reduced raft formation, reduced BACE1 and gamma-secretase activity, and therefore reduced amyloid-beta production in Alzheimer’s disease. Cholesterol reduction may also reduce viral entry for viruses such as SARS-CoV-2 and influenza, and may reduce prion propagation.

However, there are risks. Too little cholesterol can impair normal signaling because cholesterol is required for healthy brain function and normal raft-mediated signaling.

## 9.2 Sphingolipid Modulation

Another strategy is to reduce ceramide production by inhibiting sphingomyelinases. This prevents sphingomyelin from being converted into ceramide. Lower ceramide can reduce BACE1 stimulation, reduce amyloid-beta production, and reduce apoptosis.

Tricyclic antidepressants such as desipramine can inhibit acid sphingomyelinase and are being investigated in relation to Alzheimer’s disease.

Ganglioside modulation is another possibility. Changing ganglioside composition may affect amyloid-beta aggregation and viral entry.

## 9.3 Restoring Raft Function in Aging

SynCav1 is a synthetic caveolin-1-based peptide. It mimics caveolin-1 and can increase raft formation. It can restore receptor clustering and rescue synaptic plasticity in aged neurons.

This strategy has potential for treating age-related cognitive decline and restoring memory function, although it is currently experimental.

## 9.4 Omega-3 Supplementation

Omega-3 fatty acids such as EPA and DHA can increase membrane fluidity and may disrupt excessive raft organization. They also produce anti-inflammatory resolvins.

Potential benefits include reduced inflammation in conditions such as Alzheimer’s disease and cardiovascular disease. Omega-3 fatty acids may also reduce amyloid-beta aggregation and support neuroprotection.

Mechanistically, omega-3 fatty acids can displace omega-6 fatty acids from membranes and shift the balance away from pro-inflammatory signaling.

## 9.5 Targeting Viral Entry

For SARS-CoV-2, statins may disrupt raft cholesterol organization and make viral entry more difficult. ACE2 blockers and cholesterol-lowering agents are also relevant to this strategy.

For influenza, sialidase inhibitors such as oseltamivir, also called Tamiflu, prevent viral release. Viral binding to sialic acids in rafts could also be targeted.

For HIV, CXCR4 and CCR5 antagonists can block co-receptors in rafts. Sphingomyelinase inhibitors may prevent ceramide formation and reduce viral fusion.

# 10. Summary: Must-Know Facts

The core definition to remember is that lipid rafts are approximately 70 nm membrane microdomains enriched in cholesterol, glycosphingolipids, gangliosides, and certain proteins, and they have less fluidity than the surrounding membrane.

The key components are cholesterol, sphingomyelin, glycosphingolipids, gangliosides such as GM1 and GM3, ceramide, GPI-anchored proteins, transmembrane receptors and enzymes, and caveolins. Cholesterol maintains raft integrity. Ceramide is especially important because it can stimulate BACE1.

The main functions of rafts are to act as signaling platforms, cluster receptors and effectors, support caveolar endocytosis, organize lipid metabolism, regulate immune and adhesion signaling, provide viral entry points, and support mechanotransduction.

Rafts form because cholesterol and saturated sphingolipids pack tightly together. This creates a liquid-ordered phase that separates from the liquid-disordered phase formed by unsaturated phospholipids. Proteins can be targeted to rafts through palmitoylation, GPI anchors, or hydrophobic matching.

The main disruptions are cholesterol depletion, ceramide accumulation, ganglioside loss, omega-6 to omega-3 imbalance, and caveolin dysfunction. Cholesterol depletion causes rafts to dissolve and signaling to fail. Ceramide accumulation stimulates BACE1 and increases amyloid-beta production. Ganglioside loss alters signaling and viral entry. Omega-6 to omega-3 imbalance affects inflammation. Caveolin dysfunction impairs caveolae and mechanosensing.

The major diseases linked to lipid rafts are Alzheimer’s disease, HIV-related dementia, viral infections, prion diseases, aging-related neurodegeneration, and cancer. Alzheimer’s disease is especially important because BACE1 and gamma-secretase localize to rafts and promote amyloid-beta production.

The key pathways to know are PIP2 signaling, the arachidonic acid cascade, APP processing, sphingolipid metabolism, caveolar endocytosis and lipid trafficking, and neurovascular coupling.

The main detection methods are cholera toxin B-subunit labeling of GM1, FRET, FLOT1 labeling, and biochemical isolation of detergent-resistant membranes.

The main therapeutic strategies are cholesterol modulation, sphingolipid modulation, restoring raft function with SynCav1, omega-3 supplementation, and blocking raft-dependent viral entry.

# 11. Exam-Style Questions You Might See

## Question 1: Define lipid rafts and explain their composition.

A strong answer should give the memorized definition and then explain that lipid rafts contain cholesterol, sphingolipids, gangliosides, and selected proteins. You should mention that cholesterol stabilizes rafts, sphingolipids provide saturated tails for tight packing, gangliosides such as GM1 and GM3 are important outer-leaflet components, and raft proteins include GPI-anchored proteins, transmembrane receptors and enzymes, and caveolins.

## Question 2: How does cholesterol depletion affect lipid rafts, and what are the consequences?

Cholesterol depletion causes lipid rafts to lose structural integrity and dissolve. This disperses raft-associated proteins into the bulk membrane. Signaling becomes less efficient because receptors and effectors are no longer clustered. GPCR signaling, G-protein activation, and cAMP production can decrease. Caveolar endocytosis can fail, and cells may switch toward clathrin-mediated pathways. In neurons, this can impair NMDA and AMPA receptor function, reduce long-term potentiation, and contribute to cognitive decline.

## Question 3: Explain the role of lipid rafts in Alzheimer’s disease.

In Alzheimer’s disease, lipid rafts bring APP, BACE1, and gamma-secretase into close proximity. BACE1 makes the first cut in APP, and gamma-secretase makes the second cut, producing amyloid-beta. Amyloid-beta aggregates into oligomers, fibrils, and plaques, with oligomers being the most toxic. Amyloid-beta oligomers can bind raft-associated PrPC, mGluR5, and NMDA receptors, causing synaptic dysfunction, calcium dysregulation, oxidative stress, apoptosis, and memory loss. Ceramide is critical because it directly stimulates BACE1, creating a vicious cycle of stress, ceramide accumulation, and more amyloid-beta production.

## Question 4: How do viruses exploit lipid rafts for cell entry? Give examples.

Viruses exploit lipid rafts because rafts concentrate receptors and support caveolar endocytosis. Influenza binds sialic acid on gangliosides. SARS-CoV-2 binds ACE2, which can localize to lipid rafts. SV40 binds GM1 and MHC class I and enters through caveolae. Ebola and Marburg viruses can use folate receptor-alpha, and hepatitis B can use CD21. Caveolar entry is useful for viruses because caveosomes have neutral pH and can help viruses avoid acidic early endosomes.

## Question 5: Describe the PIP2 signaling pathway in lipid rafts.

In PIP2 signaling, a GPCR activates phospholipase C. PLC cleaves PIP2 into IP3 and DAG. IP3 opens calcium channels in the endoplasmic reticulum, increasing cytoplasmic calcium. DAG activates protein kinase C, which phosphorylates target proteins and produces cellular responses. Lipid rafts make this pathway efficient by bringing the GPCR, PLC, and PKC close together.

## Question 6: What happens to lipid rafts during aging, and can it be reversed?

During aging, cholesterol oxidation increases, cholesterol redistributes away from rafts, ceramide synthesis increases, GM1 gangliosides decrease, caveolin-1 decreases, and membrane lipid raft formation declines. These changes reduce receptor clustering, calcium signaling, ERK1/2, CaMK-II, Akt, and cAMP signaling. This impairs long-term potentiation, synaptic plasticity, memory, and behavior. Experimental restoration with SynCav1 can increase raft formation, restore receptor clustering, rescue signaling pathways, and improve synaptic plasticity.

## Question 7: Compare omega-3 and omega-6 effects on lipid rafts.

Omega-3 fatty acids such as EPA and DHA increase membrane fluidity, can disturb ordered raft domains, and produce anti-inflammatory resolvins and protectins. Omega-6 fatty acids, especially arachidonic acid, produce pro-inflammatory molecules such as prostaglandins, leukotrienes, and HETEs. A high omega-6 to omega-3 ratio promotes chronic inflammation, while a lower ratio is generally healthier.

## Question 8: How would you experimentally detect lipid rafts in cells?

One common method is to use fluorescent cholera toxin B-subunit, which binds GM1 ganglioside in lipid rafts. The cells are viewed under a fluorescence microscope, and bright clusters indicate GM1-rich raft regions. Other methods include FRET to detect molecular proximity within rafts, FLOT1 labeling as a raft marker, and biochemical isolation of detergent-resistant membranes using cold Triton X-100 and sucrose gradient centrifugation.

# Final Exam Focus

For the final exam, the highest-priority material is the lipid raft definition, the Alzheimer’s disease pathway, the consequences of raft disruption, and the biophysical reason lipid rafts form. You should be able to explain how cholesterol and saturated sphingolipids create ordered membrane domains, how raft disruption affects signaling, and how raft-associated APP processing contributes to amyloid-beta production.`,
